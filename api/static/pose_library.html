<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿势资源库 - Wan2.2 Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 0;
            margin-bottom: 30px;
            border-radius: 12px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        .filters {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.9em;
            color: #999;
        }

        select, input {
            padding: 10px 15px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1em;
            min-width: 150px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
        }

        .btn-secondary:hover {
            background: #3a3a3a;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
        }

        .pose-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .pose-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: all 0.3s;
            cursor: pointer;
        }

        .pose-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .pose-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #2a2a2a;
        }

        .pose-info {
            padding: 15px;
        }

        .pose-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .pose-name-cn {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
        }

        .pose-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #999;
        }

        .pose-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 4px 10px;
            background: #2a2a2a;
            border-radius: 12px;
            font-size: 0.8em;
            color: #999;
        }

        .tag.lora-available {
            background: #667eea;
            color: white;
        }

        .pose-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 1200px;
            margin: 50px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal-close:hover {
            color: #fff;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            padding: 10px 15px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
        }

        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 姿势资源库</h1>
            <p class="subtitle">NSFW Pose Reference Library for Wan2.2</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalPoses">0</div>
                <div class="stat-label">姿势类型</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalImages">0</div>
                <div class="stat-label">参考图片</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="loraAvailable">0</div>
                <div class="stat-label">可用LoRA</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPerPose">0</div>
                <div class="stat-label">平均图片/姿势</div>
            </div>
        </div>

        <!-- 筛选器 -->
        <div class="filters">
            <div class="filter-group">
                <label>难度</label>
                <select id="difficultyFilter">
                    <option value="">全部</option>
                    <option value="basic">基础</option>
                    <option value="intermediate">中级</option>
                    <option value="advanced">高级</option>
                </select>
            </div>

            <div class="filter-group">
                <label>LoRA状态</label>
                <select id="loraFilter">
                    <option value="">全部</option>
                    <option value="available">已有LoRA</option>
                    <option value="unavailable">未有LoRA</option>
                </select>
            </div>

            <div class="filter-group">
                <label>搜索</label>
                <input type="text" id="searchInput" placeholder="搜索姿势名称...">
            </div>

            <button class="btn" onclick="applyFilters()">应用筛选</button>
            <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
        </div>

        <!-- 姿势网格 -->
        <div id="poseGrid" class="pose-grid">
            <div class="loading">加载中...</div>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 模态框 -->
    <div id="poseModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = '/api/v1';
        const API_KEY = localStorage.getItem('api_key') || '';

        // 姿势配置（从config加载）
        let poseConfig = {};
        let currentPage = 1;
        const pageSize = 12;

        // 初始化
        async function init() {
            await loadPoseConfig();
            await loadStats();
            await loadPoses();
        }

        // 加载姿势配置
        async function loadPoseConfig() {
            try {
                const response = await fetch('/config/pose_collection_config.json');
                poseConfig = await response.json();
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }

        // 加载统计数据
        async function loadStats() {
            const poses = Object.keys(poseConfig.pose_categories || {});
            const loraCount = poses.filter(p => poseConfig.pose_categories[p].lora_available).length;
            const totalTarget = poses.reduce((sum, p) => sum + (poseConfig.pose_categories[p].target_count || 0), 0);

            document.getElementById('totalPoses').textContent = poses.length;
            document.getElementById('loraAvailable').textContent = loraCount;
            document.getElementById('totalImages').textContent = totalTarget;
            document.getElementById('avgPerPose').textContent = Math.round(totalTarget / poses.length);
        }

        // 加载姿势列表
        async function loadPoses() {
            const grid = document.getElementById('poseGrid');
            grid.innerHTML = '';

            const poses = Object.entries(poseConfig.pose_categories || {});

            if (poses.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <h2>暂无姿势数据</h2>
                        <p>请先运行收集脚本</p>
                    </div>
                `;
                return;
            }

            poses.forEach(([key, pose]) => {
                const card = createPoseCard(key, pose);
                grid.appendChild(card);
            });
        }

        // 创建姿势卡片
        function createPoseCard(key, pose) {
            const card = document.createElement('div');
            card.className = 'pose-card';
            card.onclick = () => openPoseDetail(key, pose);

            card.innerHTML = `
                <div class="pose-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 3em;">
                    ${pose.name_cn.charAt(0)}
                </div>
                <div class="pose-info">
                    <div class="pose-name">${key}</div>
                    <div class="pose-name-cn">${pose.name_cn}</div>
                    <div class="pose-stats">
                        <span>目标: ${pose.target_count}张</span>
                        <span>${pose.difficulty}</span>
                    </div>
                    <div class="pose-tags">
                        ${pose.lora_available ? '<span class="tag lora-available">LoRA可用</span>' : ''}
                        ${pose.angles.map(a => `<span class="tag">${a}</span>`).join('')}
                    </div>
                    <div class="pose-actions">
                        <button class="btn btn-small" onclick="event.stopPropagation(); collectPose('${key}')">收集图片</button>
                        <button class="btn btn-small btn-secondary" onclick="event.stopPropagation(); viewImages('${key}')">查看</button>
                    </div>
                </div>
            `;

            return card;
        }

        // 打开姿势详情
        function openPoseDetail(key, pose) {
            const modal = document.getElementById('poseModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <h2>${pose.name_cn} (${key})</h2>
                <p style="color: #999; margin: 10px 0 20px 0;">${pose.description}</p>

                <h3 style="margin-top: 20px;">基本信息</h3>
                <div style="background: #2a2a2a; padding: 15px; border-radius: 8px; margin: 10px 0;">
                    <p><strong>目标数量:</strong> ${pose.target_count} 张</p>
                    <p><strong>难度:</strong> ${pose.difficulty}</p>
                    <p><strong>角度要求:</strong> ${pose.angles.join(', ')}</p>
                    <p><strong>LoRA状态:</strong> ${pose.lora_available ? '✓ 可用' : '✗ 未训练'}</p>
                </div>

                ${pose.lora_available ? `
                    <h3 style="margin-top: 20px;">可用LoRA文件</h3>
                    <div style="background: #2a2a2a; padding: 15px; border-radius: 8px; margin: 10px 0;">
                        ${pose.lora_files.map(f => `<p>• ${f}</p>`).join('')}
                    </div>
                ` : ''}

                <h3 style="margin-top: 20px;">搜索标签</h3>
                <div style="background: #2a2a2a; padding: 15px; border-radius: 8px; margin: 10px 0;">
                    ${pose.tags.map(t => `<span class="tag" style="margin: 5px;">${t}</span>`).join('')}
                </div>

                <div style="margin-top: 30px; display: flex; gap: 10px;">
                    <button class="btn" onclick="collectPose('${key}')">开始收集</button>
                    <button class="btn btn-secondary" onclick="viewImages('${key}')">查看已收集</button>
                </div>
            `;

            modal.style.display = 'block';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('poseModal').style.display = 'none';
        }

        // 收集姿势图片
        async function collectPose(key) {
            if (!confirm(`确定要开始收集 ${key} 的图片吗？\n\n这将调用收集脚本，可能需要几分钟时间。`)) {
                return;
            }

            alert('收集功能需要在服务器端运行脚本\n\n请在终端执行:\npython scripts/collect_pose_images.py --pose ' + key);
        }

        // 查看已收集图片
        function viewImages(key) {
            alert('查看功能开发中...\n\n图片保存在: data/pose_references/' + key);
        }

        // 应用筛选
        function applyFilters() {
            // TODO: 实现筛选逻辑
            loadPoses();
        }

        // 重置筛选
        function resetFilters() {
            document.getElementById('difficultyFilter').value = '';
            document.getElementById('loraFilter').value = '';
            document.getElementById('searchInput').value = '';
            loadPoses();
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('poseModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
