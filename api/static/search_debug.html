<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索调试 - AI Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1600px;margin:0 auto}
h1{text-align:center;color:#7c83ff;margin-bottom:24px;font-size:1.8em}
.back-link{display:inline-block;margin-bottom:16px;color:#7c83ff;text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.search-panel{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.search-row{display:flex;gap:12px;margin-bottom:16px;align-items:flex-end}
.search-field{flex:1}
.search-field label{display:block;margin-bottom:6px;font-size:13px;color:#aaa}
.search-field input,.search-field select,.search-field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.search-field textarea{resize:vertical;min-height:80px}
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:#7c83ff;color:#fff}
.btn-primary:hover{background:#5a62e0}
.btn-primary:disabled{background:#444;cursor:not-allowed}
.btn-secondary{background:#16213e;color:#7c83ff;border:1px solid #7c83ff}
.btn-secondary:hover{background:#1a4a7a}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 20px;background:#16213e;border:1px solid #444;border-radius:6px 6px 0 0;cursor:pointer;color:#aaa;font-size:13px}
.tab.active{background:#0f3460;border-color:#7c83ff;color:#fff}
.debug-section{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.debug-section h2{font-size:16px;color:#7c83ff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.debug-section h2 .badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#0f3460;color:#4ade80;font-weight:600}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.info-item{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:12px}
.info-label{font-size:11px;color:#666;margin-bottom:4px}
.info-value{font-size:14px;color:#e0e0e0;font-weight:600}
.info-value.highlight{color:#4ade80}
.code-block{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;color:#ccc;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.timeline{position:relative;padding-left:30px}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item:before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:#7c83ff;border:2px solid #16213e}
.timeline-item:after{content:'';position:absolute;left:-17px;top:18px;width:2px;height:calc(100% - 12px);background:#333}
.timeline-item:last-child:after{display:none}
.timeline-time{font-size:11px;color:#666;margin-bottom:4px}
.timeline-content{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:10px}
.timeline-title{font-size:13px;color:#7c83ff;margin-bottom:6px;font-weight:600}
.timeline-desc{font-size:12px;color:#aaa}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.result-card{background:#0a0a23;border:1px solid #333;border-radius:8px;padding:14px;transition:border-color .2s}
.result-card:hover{border-color:#7c83ff}
.result-header{display:flex;gap:12px;margin-bottom:10px}
.result-preview{width:80px;height:80px;border-radius:6px;object-fit:cover;background:#1a1a2e;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-title{font-size:14px;font-weight:600;color:#e0e0e0;margin-bottom:4px;word-break:break-word}
.result-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.result-tag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.result-tag.similarity{background:#1b4d3d;color:#6ee7b7}
.result-tag.type{background:#2d1b69;color:#a78bfa}
.result-description{font-size:12px;color:#aaa;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-triggers{font-size:11px;color:#7c83ff;margin-top:8px}
.loading{text-align:center;padding:40px;color:#aaa}
.error{background:#4a1a1a;border:1px solid #f87171;border-radius:6px;padding:16px;color:#f87171;margin-bottom:20px}
.empty{text-align:center;padding:60px;color:#666;font-size:14px}
.stats-bar{display:flex;gap:20px;padding:12px;background:#0f3460;border-radius:6px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:11px;color:#aaa}
.stat-value{font-size:18px;color:#4ade80;font-weight:600}
.vector-viz{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:12px;margin-top:12px}
.vector-row{display:flex;gap:2px;margin-bottom:4px}
.vector-cell{width:4px;height:20px;border-radius:1px}
</style>
</head>
<body>
<div class="container">
<h1>🔍 搜索调试工具</h1>

<div class="search-panel">
<div class="search-row">
<div class="search-field" style="flex:2">
<label>搜索Prompt</label>
<textarea id="searchPrompt" placeholder="输入要搜索的prompt，例如：a woman in sexy pose"></textarea>
</div>
<div class="search-field">
<label>搜索类型</label>
<select id="searchType">
<option value="resources">搜索资源 (Images)</option>
<option value="loras">搜索LORA</option>
<option value="recommend">智能推荐 (综合)</option>
</select>
</div>
<div class="search-field">
<label>模式筛选</label>
<select id="searchMode">
<option value="">全部</option>
<option value="I2V">I2V</option>
<option value="T2V">T2V</option>
</select>
</div>
<div class="search-field">
<label>返回数量</label>
<input type="number" id="topK" value="10" min="1" max="50">
</div>
<div class="search-field">
<label>相似度阈值</label>
<input type="number" id="minSimilarity" value="0.6" min="0" max="1" step="0.1">
</div>
</div>
<div style="display:flex;gap:10px;align-items:center;margin-top:10px">
<label style="display:flex;align-items:center;gap:6px;color:#e0e0e0;font-size:13px">
<input type="checkbox" id="onlyEnabled" checked style="width:18px;height:18px;accent-color:#7c83ff">
仅搜索已启用的LORA
</label>
<span style="color:#666;font-size:12px;margin-left:10px">
ℹ️ 图片搜索范围：已收藏的资源 (134个)
</span>
</div>
<div style="display:flex;gap:10px;margin-top:10px">
<button class="btn btn-primary" onclick="executeSearch()">🔍 执行搜索</button>
<button class="btn btn-secondary" onclick="clearDebug()">清空</button>
<button class="btn btn-secondary" onclick="checkIndexStats()">📊 索引统计</button>
</div>
</div>

<div id="errorBox" class="error" style="display:none"></div>

<div class="tabs">
<div class="tab active" data-tab="process">搜索过程</div>
<div class="tab" data-tab="results">搜索结果</div>
<div class="tab" data-tab="raw">原始数据</div>
</div>

<div id="tab-process" class="debug-section">
<h2>🔄 搜索过程追踪</h2>
<div id="processTimeline" class="timeline">
<div class="empty">点击"执行搜索"开始</div>
</div>
</div>

<div id="tab-results" class="debug-section" style="display:none">
<h2>📋 搜索结果 <span class="badge" id="resultCount">0</span></h2>
<div id="resultsStats" class="stats-bar" style="display:none"></div>
<div id="resultsGrid" class="results-grid">
<div class="empty">暂无结果</div>
</div>
</div>

<div id="tab-raw" class="debug-section" style="display:none">
<h2>📄 原始JSON数据</h2>
<div id="rawData" class="code-block">暂无数据</div>
</div>

</div>

<script>
const API_KEY = localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me';
const API_BASE = '/api/v1';

let searchStartTime = 0;
let searchData = null;

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.debug-section').forEach(s => s.style.display = 'none');
    tab.classList.add('active');
    document.getElementById('tab-' + target).style.display = 'block';
  });
});

function addTimelineItem(title, description, data = null) {
  const timeline = document.getElementById('processTimeline');
  if (timeline.querySelector('.empty')) {
    timeline.innerHTML = '';
  }

  const elapsed = Date.now() - searchStartTime;
  const item = document.createElement('div');
  item.className = 'timeline-item';
  item.innerHTML = `
    <div class="timeline-time">+${elapsed}ms</div>
    <div class="timeline-content">
      <div class="timeline-title">${title}</div>
      <div class="timeline-desc">${description}</div>
      ${data ? `<div class="code-block" style="margin-top:8px;font-size:11px">${JSON.stringify(data, null, 2)}</div>` : ''}
    </div>
  `;
  timeline.appendChild(item);
}

async function executeSearch() {
  const prompt = document.getElementById('searchPrompt').value.trim();
  const searchType = document.getElementById('searchType').value;
  const mode = document.getElementById('searchMode').value;
  const topK = parseInt(document.getElementById('topK').value);
  const onlyEnabled = document.getElementById('onlyEnabled').checked;
  const minSimilarity = parseFloat(document.getElementById('minSimilarity').value);

  if (!prompt) {
    showError('请输入搜索Prompt');
    return;
  }

  // Reset
  searchStartTime = Date.now();
  document.getElementById('processTimeline').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '<div class="loading">搜索中...</div>';
  document.getElementById('rawData').textContent = '搜索中...';
  document.getElementById('errorBox').style.display = 'none';

  addTimelineItem('🚀 开始搜索', `Prompt: "${prompt}"\n类型: ${searchType}\n模式: ${mode || '全部'}\nTop-K: ${topK}\n相似度阈值: ${minSimilarity}\n仅已启用: ${onlyEnabled ? '是' : '否'}`);

  try {
    let endpoint, body;

    if (searchType === 'resources') {
      endpoint = '/search/resources';
      body = { query: prompt, top_k: topK };
      addTimelineItem('📡 调用API', `POST ${API_BASE}${endpoint}`, body);
    } else if (searchType === 'loras') {
      endpoint = '/search/loras';
      body = { query: prompt, mode: mode || null, top_k: topK, only_enabled: onlyEnabled, min_similarity: minSimilarity };
      addTimelineItem('📡 调用API', `POST ${API_BASE}${endpoint}`, body);
    } else if (searchType === 'recommend') {
      endpoint = '/recommend';
      body = {
        prompt: prompt,
        mode: mode || null,
        include_images: true,
        include_loras: true,
        top_k_images: topK,
        top_k_loras: topK,
        only_enabled: onlyEnabled,
        min_similarity: minSimilarity
      };
      addTimelineItem('📡 调用API', `POST ${API_BASE}${endpoint}`, body);
    }

    const response = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': API_KEY
      },
      body: JSON.stringify(body)
    });

    addTimelineItem('📥 收到响应', `状态码: ${response.status}\nContent-Type: ${response.headers.get('content-type')}`);

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.detail || '搜索失败');
    }

    const data = await response.json();
    searchData = data;

    addTimelineItem('✅ 解析成功', `返回数据类型: ${Array.isArray(data) ? 'Array' : 'Object'}\n数据大小: ${JSON.stringify(data).length} bytes`);

    // Process results
    if (searchType === 'recommend') {
      addTimelineItem('🔍 处理推荐结果', `图片: ${data.images?.length || 0}个\nLORA: ${data.loras?.length || 0}个`);
      renderRecommendResults(data);
    } else if (searchType === 'resources') {
      addTimelineItem('🔍 处理资源结果', `找到 ${data.length} 个相似资源`);
      renderResourceResults(data);
    } else if (searchType === 'loras') {
      addTimelineItem('🔍 处理LORA结果', `找到 ${data.length} 个相似LORA`);
      renderLoraResults(data);
    }

    // Show raw data
    document.getElementById('rawData').textContent = JSON.stringify(data, null, 2);

    addTimelineItem('🎉 搜索完成', `总耗时: ${Date.now() - searchStartTime}ms`);

  } catch (err) {
    console.error(err);
    addTimelineItem('❌ 搜索失败', err.message);
    showError(err.message);
    document.getElementById('resultsGrid').innerHTML = '<div class="empty">搜索失败</div>';
    document.getElementById('rawData').textContent = 'Error: ' + err.message;
  }
}

function renderRecommendResults(data) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  const stats = document.getElementById('resultsStats');
  stats.style.display = 'flex';
  stats.innerHTML = `
    <div class="stat">
      <div class="stat-label">相似图片</div>
      <div class="stat-value">${data.images?.length || 0}</div>
    </div>
    <div class="stat">
      <div class="stat-label">推荐LORA</div>
      <div class="stat-value">${data.loras?.length || 0}</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均相似度</div>
      <div class="stat-value">${calculateAvgSimilarity(data)}%</div>
    </div>
  `;

  document.getElementById('resultCount').textContent = (data.images?.length || 0) + (data.loras?.length || 0);

  // Render images
  if (data.images && data.images.length > 0) {
    data.images.forEach(img => {
      grid.appendChild(createResourceCard(img));
    });
  }

  // Render LORAs
  if (data.loras && data.loras.length > 0) {
    data.loras.forEach(lora => {
      grid.appendChild(createLoraCard(lora));
    });
  }

  if (grid.children.length === 0) {
    grid.innerHTML = '<div class="empty">无推荐结果</div>';
  }
}

function renderResourceResults(data) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  document.getElementById('resultCount').textContent = data.length;

  const stats = document.getElementById('resultsStats');
  stats.style.display = 'flex';
  stats.innerHTML = `
    <div class="stat">
      <div class="stat-label">结果数量</div>
      <div class="stat-value">${data.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均相似度</div>
      <div class="stat-value">${calculateAvgSimilarity({images: data})}%</div>
    </div>
  `;

  data.forEach(item => {
    grid.appendChild(createResourceCard(item));
  });

  if (data.length === 0) {
    grid.innerHTML = '<div class="empty">无搜索结果</div>';
  }
}

function renderLoraResults(data) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  document.getElementById('resultCount').textContent = data.length;

  const stats = document.getElementById('resultsStats');
  stats.style.display = 'flex';
  stats.innerHTML = `
    <div class="stat">
      <div class="stat-label">结果数量</div>
      <div class="stat-value">${data.length}</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均相似度</div>
      <div class="stat-value">${calculateAvgSimilarity({loras: data})}%</div>
    </div>
  `;

  data.forEach(item => {
    grid.appendChild(createLoraCard(item));
  });

  if (data.length === 0) {
    grid.innerHTML = '<div class="empty">无搜索结果</div>';
  }
}

function createResourceCard(resource) {
  const card = document.createElement('div');
  card.className = 'result-card';

  // Check if resource is video or image
  const isVideo = resource.url && (resource.url.endsWith('.mp4') || resource.url.endsWith('.webm') || resource.url.includes('/video/'));
  const previewHtml = isVideo
    ? `<video class="result-preview" src="${resource.url}" loop muted playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>`
    : `<img class="result-preview" src="${resource.url}" crossorigin="anonymous" onerror="this.src='/static/placeholder.svg'" alt="Resource">`;

  card.innerHTML = `
    <div class="result-header">
      ${previewHtml}
      <div class="result-info">
        <div class="result-title">资源 #${resource.resource_id}</div>
        <div class="result-meta">
          <span class="result-tag similarity">相似度: ${(resource.similarity * 100).toFixed(1)}%</span>
          <span class="result-tag type">Resource</span>
        </div>
      </div>
    </div>
    ${resource.search_keywords ? `<div style="font-size:11px;color:#4ade80;margin-bottom:4px;line-height:1.4;word-break:break-word">🔍 Search: ${resource.search_keywords}</div>` : ''}
    ${resource.prompt ? `<div class="result-description">Prompt: ${resource.prompt}</div>` : ''}
  `;
  return card;
}

function createLoraCard(lora) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const triggerWords = Array.isArray(lora.trigger_words) ? lora.trigger_words.join(', ') : '';

  // Check if preview is video
  const isVideo = lora.preview_url && (lora.preview_url.endsWith('.mp4') || lora.preview_url.endsWith('.webm'));
  const previewHtml = isVideo
    ? `<video class="result-preview" src="${lora.preview_url}" loop muted playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>`
    : `<img class="result-preview" src="${lora.preview_url || '/static/placeholder.svg'}" onerror="this.src='/static/placeholder.svg'" alt="${lora.name}">`;

  card.innerHTML = `
    <div class="result-header">
      ${previewHtml}
      <div class="result-info">
        <div class="result-title">${lora.name}</div>
        <div class="result-meta">
          <span class="result-tag similarity">相似度: ${(lora.similarity * 100).toFixed(1)}%</span>
          <span class="result-tag type">LORA</span>
        </div>
      </div>
    </div>
    ${lora.search_keywords ? `<div style="font-size:11px;color:#4ade80;margin-bottom:4px;line-height:1.4;word-break:break-word">🔍 Search: ${lora.search_keywords}</div>` : ''}
    ${lora.trigger_prompt ? `<div style="font-size:11px;color:#f59e0b;margin-bottom:4px;line-height:1.4;word-break:break-word">✨ Trigger: ${lora.trigger_prompt}</div>` : ''}
    ${lora.description ? `<div class="result-description">描述: ${lora.description}</div>` : ''}
    ${triggerWords ? `<div class="result-triggers">触发词: ${triggerWords}</div>` : ''}
  `;
  return card;
}

function calculateAvgSimilarity(data) {
  let total = 0;
  let count = 0;

  if (data.images) {
    data.images.forEach(img => {
      total += img.similarity;
      count++;
    });
  }

  if (data.loras) {
    data.loras.forEach(lora => {
      total += lora.similarity;
      count++;
    });
  }

  return count > 0 ? ((total / count) * 100).toFixed(1) : 0;
}

async function checkIndexStats() {
  addTimelineItem('📊 查询索引统计', 'GET /api/v1/admin/embeddings/stats');

  try {
    const response = await fetch(API_BASE + '/admin/embeddings/stats', {
      headers: { 'X-API-Key': API_KEY }
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.detail || '查询失败');
    }

    const stats = await response.json();
    addTimelineItem('✅ 索引统计',
      `总数: ${stats.total_count}\n资源: ${stats.resource_count}\nLORA: ${stats.lora_count}\n模型: ${stats.model_name}\n维度: ${stats.dimension}`,
      stats
    );
  } catch (err) {
    addTimelineItem('❌ 查询失败', err.message);
    showError(err.message);
  }
}

function clearDebug() {
  document.getElementById('processTimeline').innerHTML = '<div class="empty">点击"执行搜索"开始</div>';
  document.getElementById('resultsGrid').innerHTML = '<div class="empty">暂无结果</div>';
  document.getElementById('rawData').textContent = '暂无数据';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resultsStats').style.display = 'none';
  searchData = null;
}

function showError(message) {
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = '错误: ' + message;
  errorBox.style.display = 'block';
}
</script>
</body>
</html>
