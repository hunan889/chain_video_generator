<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow 历史记录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{color:#7c83ff;margin-bottom:20px;font-size:1.4em}
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.toolbar input{padding:8px 12px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;width:260px}
.toolbar input:focus{outline:none;border-color:#7c83ff}
.btn{padding:8px 18px;background:#7c83ff;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#5a62e0}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#e05a5a}
.btn-danger:hover{background:#c04444}
.stats{margin-left:auto;font-size:12px;color:#888}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:#16213e;border:1px solid #333;border-radius:10px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#7c83ff}
.card-thumb{position:relative;width:100%;aspect-ratio:9/16;background:#0a0a23;overflow:hidden;cursor:pointer}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb video{width:100%;height:100%;object-fit:cover;display:none}
.card-thumb .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);font-size:36px;opacity:0;transition:opacity .2s}
.card-thumb:hover .play-btn{opacity:1}
.card-thumb.playing video{display:block}
.card-thumb.playing img{display:none}
.card-thumb.playing .play-btn{display:none}
.card-body{padding:12px}
.card-status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:8px}
.status-completed{background:#1a4a2e;color:#4caf50}
.status-running{background:#1a3a5c;color:#64b5f6}
.status-failed{background:#4a1a1a;color:#ef5350}
.status-queued{background:#2a2a1a;color:#ffb74d}
.card-prompt{font-size:12px;color:#ccc;margin-bottom:8px;line-height:1.4;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.card-mode{background:#0f3460;padding:2px 8px;border-radius:4px;color:#aaa;font-size:10px}
.card-actions{display:flex;gap:6px;margin-top:10px}
.card-error{font-size:11px;color:#ef5350;margin-top:6px;background:#2a1a1a;padding:6px;border-radius:4px;word-break:break-all}
.empty{text-align:center;padding:80px 20px;color:#555;font-size:15px}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin:24px 0;flex-wrap:wrap}
.pagination .btn-sm{min-width:36px;background:#16213e;border:1px solid #333}
.pagination .btn-sm:hover:not(:disabled){background:#7c83ff;border-color:#7c83ff}
.pagination .btn-sm.active{background:#7c83ff;border-color:#7c83ff}
.pagination .btn-sm:disabled{opacity:.35;cursor:default}
.page-ellipsis{color:#555;padding:0 4px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-inner{background:#16213e;border:1px solid #444;border-radius:12px;max-width:90vw;max-height:90vh;overflow:auto;padding:24px;position:relative;min-width:340px}
.modal-close{position:absolute;top:12px;right:16px;font-size:22px;cursor:pointer;color:#aaa}
.modal-close:hover{color:#fff}
.modal-video{width:100%;border-radius:8px;max-height:70vh}
.modal-title{font-size:14px;color:#7c83ff;margin-bottom:14px;font-weight:700;padding-right:30px}
.detail-row{display:flex;gap:10px;margin-bottom:8px;font-size:12px}
.detail-label{color:#888;min-width:100px;flex-shrink:0}
.detail-value{color:#ddd;word-break:break-all}
.loading{text-align:center;padding:60px;color:#555}
.frame-row{display:flex;gap:12px;margin-bottom:12px}
.frame-item{flex:1;text-align:center}
.frame-item img{width:100%;border-radius:6px;max-height:200px;object-fit:cover}
.frame-item p{font-size:11px;color:#888;margin-top:4px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:4px 14px;border-radius:14px;border:1px solid #444;background:transparent;color:#aaa;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:#7c83ff;color:#fff;border-color:#7c83ff}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #333;border-top-color:#7c83ff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
</style>
</head>
<body>
<div class="container">
<h1>📋 Workflow 历史记录</h1>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="搜索 prompt 或 ID..." oninput="filterCards()">
  <button class="btn btn-sm" onclick="loadHistory()">刷新</button>
  <a href="/static/advanced_workflow_v2.html"><button class="btn btn-sm" style="background:#333">+ 新建</button></a>
  <span class="stats" id="statsText"></span>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-status="all" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn" data-status="completed" onclick="setFilter('completed',this)">已完成</button>
  <button class="filter-btn" data-status="running" onclick="setFilter('running',this)">进行中</button>
  <button class="filter-btn" data-status="failed" onclick="setFilter('failed',this)">失败</button>
</div>

<div id="grid" class="grid"><div class="loading"><span class="spinner"></span>加载中...</div></div>
<div id="pagination"></div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal" onclick="closeModal(event)">
<div class="modal-inner" id="modalInner">
  <span class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">✕</span>
  <div id="modalContent"></div>
</div>
</div>

<script>
const API_KEY = localStorage.getItem('wan22_api_key') || localStorage.getItem('api_key') || 'wan22-default-key-change-me';
let allWorkflows = [];
let currentFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 24;

async function loadHistory(silent = false) {
  if (!silent) {
    document.getElementById('grid').innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
    document.getElementById('pagination').innerHTML = '';
  }
  try {
    const headers = API_KEY ? {'X-API-Key': API_KEY} : {};
    const res = await fetch('/api/v1/workflow/history?page=1&page_size=200', {headers});
    if (res.status === 401 || res.status === 403) {
      const key = prompt('请输入 API Key:');
      if (key) { localStorage.setItem('api_key', key); location.reload(); }
      return;
    }
    const data = await res.json();
    allWorkflows = data.workflows || [];
    renderGrid();
  } catch(e) {
    if (!silent) {
      document.getElementById('grid').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
    }
  }
}

function setFilter(status, btn) {
  currentFilter = status;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterCards() {
  currentPage = 1;
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allWorkflows.filter(w => {
    const matchStatus = currentFilter === 'all' || w.status === currentFilter;
    const matchQ = !q || (w.user_prompt||'').toLowerCase().includes(q) || (w.workflow_id||'').toLowerCase().includes(q);
    return matchStatus && matchQ;
  });

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('statsText').textContent = `共 ${allWorkflows.length} 条，显示 ${filtered.length} 条`;

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">暂无记录</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('grid').innerHTML = pageItems.map(w => cardHtml(w)).join('');
  renderPagination(currentPage, totalPages);
}

function renderPagination(page, totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  const range = [];
  for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) range.push(i);
  let html = '<div class="pagination">';
  html += `<button class="btn btn-sm" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>&#8249; 上一页</button>`;
  if (range[0] > 1) {
    html += `<button class="btn btn-sm page-btn" onclick="goPage(1)">1</button>`;
    if (range[0] > 2) html += '<span class="page-ellipsis">…</span>';
  }
  range.forEach(i => {
    html += `<button class="btn btn-sm page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  });
  if (range[range.length-1] < totalPages) {
    if (range[range.length-1] < totalPages - 1) html += '<span class="page-ellipsis">…</span>';
    html += `<button class="btn btn-sm page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  }
  html += `<button class="btn btn-sm" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页 &#8250;</button>`;
  html += `<span style="color:#888;font-size:12px">第 ${page}/${totalPages} 页</span>`;
  html += '</div>';
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderGrid();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function cardHtml(w) {
  const thumb = w.edited_frame_url || w.first_frame_url || '';
  const hasVideo = !!w.final_video_url;
  const statusClass = 'status-' + (w.status || 'queued');
  const statusLabel = {completed:'已完成', running:'生成中', failed:'失败', queued:'排队中'}[w.status] || w.status;
  const timeStr = w.created_at ? new Date(w.created_at * 1000).toLocaleString('zh-CN') : '-';
  const modeLabel = {full_body_reference:'全身换脸', face_reference:'换脸', first_frame:'首帧'}[w.mode] || w.mode || '-';

  return `<div class="card">
    <div class="card-thumb" id="thumb_${w.workflow_id}" data-video="${w.final_video_url||''}" onclick="playOrOpen('${w.workflow_id}')">
      ${thumb ? `<img src="${thumb}" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:12px">无预览图</div>'}
      <video id="vid_${w.workflow_id}" loop muted preload="none"></video>
      <div class="play-btn">${hasVideo ? '▶' : '🖼'}</div>
    </div>
    <div class="card-body">
      <span class="card-status ${statusClass}">${statusLabel}</span>
      <div class="card-wfid" style="font-size:11px;color:#666;margin-bottom:4px;display:flex;align-items:center;gap:4px">
        <span style="font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${w.workflow_id}">${w.workflow_id}</span>
        <button onclick="event.stopPropagation();copyWfId('${w.workflow_id}')" style="background:none;border:1px solid #444;border-radius:3px;color:#888;font-size:10px;padding:1px 5px;cursor:pointer;flex-shrink:0" title="复制ID">📋</button>
      </div>
      <div class="card-prompt" title="${(w.user_prompt||'').replace(/"/g,'&quot;')}">${w.user_prompt || '(无 prompt)'}</div>
      <div class="card-meta">
        <span>${timeStr}</span>
        <span class="card-mode">${modeLabel}</span>
      </div>
      ${w.error ? `<div class="card-error">错误: ${w.error}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-sm" onclick="showDetail('${w.workflow_id}')">详情</button>
        ${hasVideo ? `<a href="${w.final_video_url}" download><button class="btn btn-sm" style="background:#2a4a2e">下载</button></a>` : ''}
      </div>
    </div>
  </div>`;
}

function playOrOpen(wfId) {
  const thumb = document.getElementById('thumb_' + wfId);
  const videoUrl = thumb.dataset.video;
  if (!videoUrl) return;
  const vid = document.getElementById('vid_' + wfId);
  if (thumb.classList.contains('playing')) {
    vid.pause();
    vid.removeAttribute('src');
    thumb.classList.remove('playing');
  } else {
    document.querySelectorAll('.card-thumb.playing').forEach(t => {
      const v = t.querySelector('video');
      if (v) { v.pause(); v.removeAttribute('src'); }
      t.classList.remove('playing');
    });
    vid.src = videoUrl;
    vid.load();
    vid.play().catch(() => {});
    thumb.classList.add('playing');
  }
}

function showDetail(wfId) {
  const w = allWorkflows.find(x => x.workflow_id === wfId);
  if (!w) return;
  const timeStr = w.created_at ? new Date(w.created_at * 1000).toLocaleString('zh-CN') : '-';
  const modeLabel = {full_body_reference:'全身换脸', face_reference:'换脸', first_frame:'首帧'}[w.mode] || w.mode || '-';
  const statusLabel = {completed:'已完成', running:'生成中', failed:'失败', queued:'排队中'}[w.status] || w.status;

  let html = `<div class="modal-title">Workflow 详情</div>`;

  if (w.final_video_url) {
    html += `<video class="modal-video" src="${w.final_video_url}" controls autoplay loop muted></video>`;
  }

  if (w.edited_frame_url || w.first_frame_url) {
    html += `<div class="frame-row" style="margin-top:12px">`;
    if (w.first_frame_url) html += `<div class="frame-item"><img src="${w.first_frame_url}"><p>首帧</p></div>`;
    if (w.edited_frame_url) html += `<div class="frame-item"><img src="${w.edited_frame_url}"><p>编辑后帧</p></div>`;
    html += `</div>`;
  }

  const rows = [
    ['ID', w.workflow_id],
    ['状态', statusLabel],
    ['模式', modeLabel],
    ['时间', timeStr],
    ['Prompt', w.user_prompt || '-'],
    ['视频', w.final_video_url ? `<a href="${w.final_video_url}" target="_blank" style="color:#7c83ff">${w.final_video_url}</a>` : '-'],
  ];
  if (w.error) rows.push(['错误', `<span style="color:#ef5350">${w.error}</span>`]);

  html += rows.map(([l,v]) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`).join('');

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function copyWfId(wfId) {
  navigator.clipboard.writeText(wfId).then(() => {
    const btns = document.querySelectorAll('.card-wfid button');
    btns.forEach(b => { if (b.getAttribute('onclick').includes(wfId)) { b.textContent = '✓'; setTimeout(() => b.textContent = '📋', 1500); } });
  }).catch(() => {
    // Fallback for non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = wfId;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('open');
  }
}

loadHistory();
setInterval(() => loadHistory(true), 30000);
</script>
</body>
</html>
