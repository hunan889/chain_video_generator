<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成历史</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{color:#7c83ff;margin-bottom:20px;font-size:1.4em}
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.toolbar input{padding:8px 12px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;width:260px;transition:border-color .2s}
.toolbar input:focus{outline:none;border-color:#7c83ff}
.btn{padding:8px 18px;background:#7c83ff;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:background .2s,transform .1s}
.btn:hover{background:#5a62e0}
.btn:active{transform:scale(0.97)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#e05a5a}
.btn-danger:hover{background:#c04444}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:linear-gradient(135deg,#16213e 0%,#1a2744 100%);border:1px solid #333;border-radius:8px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:#7c83ff;box-shadow:0 4px 16px rgba(124,131,255,.15)}
.card-thumb{position:relative;width:100%;aspect-ratio:3/4;background:#0a0a23;overflow:hidden;cursor:pointer}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s}
.card-thumb:hover .play-btn{opacity:1}
.play-icon{width:40px;height:40px;background:rgba(124,131,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.no-video .play-icon{background:rgba(100,100,100,.7);font-size:14px}
.card-body{padding:10px}
.card-status{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:4px}
.status-completed{background:#1a4a2e;color:#4caf50}
.status-running{background:#1a3a5c;color:#64b5f6}
.status-failed{background:#4a1a1a;color:#ef5350}
.status-queued{background:#2a2a1a;color:#ffb74d}
.running-indicator{display:inline-flex;align-items:center;gap:3px;margin-left:4px;font-size:9px;color:#64b5f6}
.running-dot{width:5px;height:5px;border-radius:50%;background:#64b5f6;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card-prompt{font-size:11px;color:#bbb;margin-bottom:6px;line-height:1.3;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:10px;color:#666;display:flex;justify-content:space-between;align-items:center;gap:4px}
.card-mode{background:#0f3460;padding:1px 6px;border-radius:3px;color:#aaa;font-size:9px}
.card-actions{display:flex;gap:4px;margin-top:6px}
.card-actions .btn-sm{padding:3px 8px;font-size:11px}
.card-error{font-size:10px;color:#ef5350;margin-top:4px;background:#2a1a1a;padding:4px;border-radius:3px;word-break:break-all;max-height:40px;overflow:hidden}
.card-wfid{font-size:10px;color:#555;margin-bottom:3px;display:flex;align-items:center;gap:3px}
.card-wfid span{font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-wfid button{background:none;border:1px solid #444;border-radius:3px;color:#888;font-size:9px;padding:0px 4px;cursor:pointer;flex-shrink:0}
.empty{text-align:center;padding:80px 20px;color:#555;font-size:15px}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin:24px 0;flex-wrap:wrap}
.pagination .btn-sm{min-width:36px;background:#16213e;border:1px solid #333}
.pagination .btn-sm:hover:not(:disabled){background:#7c83ff;border-color:#7c83ff}
.pagination .btn-sm.active{background:#7c83ff;border-color:#7c83ff}
.pagination .btn-sm:disabled{opacity:.35;cursor:default}
.page-ellipsis{color:#555;padding:0 4px}

/* Video Player Overlay */
.player-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1100;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.player-overlay.open{display:flex}
.player-overlay video{max-width:90vw;max-height:80vh;border-radius:10px;background:#000}
.player-close{position:fixed;top:16px;right:20px;font-size:28px;cursor:pointer;color:#aaa;z-index:1101;transition:color .2s}
.player-close:hover{color:#fff}
.player-actions{display:flex;gap:10px;align-items:center}
.player-actions a{color:#7c83ff;font-size:13px;text-decoration:none;padding:6px 14px;border:1px solid #7c83ff;border-radius:6px;transition:all .2s}
.player-actions a:hover{background:#7c83ff;color:#fff}

/* Detail Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-inner{background:#16213e;border:1px solid #444;border-radius:12px;max-width:90vw;max-height:90vh;overflow:auto;padding:24px;position:relative;min-width:340px;width:700px}
.modal-close{position:absolute;top:12px;right:16px;font-size:22px;cursor:pointer;color:#aaa;transition:color .2s}
.modal-close:hover{color:#fff}
.modal-video{width:100%;border-radius:8px;max-height:70vh}
.modal-title{font-size:14px;color:#7c83ff;margin-bottom:14px;font-weight:700;padding-right:30px}
.detail-row{display:flex;gap:10px;margin-bottom:8px;font-size:12px}
.detail-label{color:#888;min-width:100px;flex-shrink:0}
.detail-value{color:#ddd;word-break:break-all}
.loading{text-align:center;padding:60px;color:#555}
.frame-row{display:flex;gap:12px;margin-bottom:12px;justify-content:center}
.frame-item{text-align:center;flex:0 1 auto;max-width:200px}
.frame-item img{max-width:100%;border-radius:6px;max-height:280px;object-fit:contain;background:#0a0a23}
.frame-item p{font-size:11px;color:#888;margin-top:4px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:4px 14px;border-radius:14px;border:1px solid #444;background:transparent;color:#aaa;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:#7c83ff;color:#fff;border-color:#7c83ff}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #333;border-top-color:#7c83ff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
.detail-section{margin-top:16px;border:1px solid #333;border-radius:8px;overflow:hidden}
.detail-section-title{background:#0f3460;padding:8px 12px;font-size:12px;font-weight:700;color:#7cb3ff;cursor:pointer;display:flex;align-items:center;gap:6px}
.detail-section-title:hover{background:#143a6e}
.detail-section-body{padding:12px;background:#0a0a23;font-size:12px}
.stage-row{border-bottom:1px solid #222;padding:8px 0}
.stage-row:last-child{border-bottom:none}
.stage-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.stage-header:hover .stage-name{color:#7cb3ff}
.stage-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stage-dot.completed{background:#4caf50}
.stage-dot.running{background:#64b5f6;animation:pulse 1s infinite}
.stage-dot.failed{background:#ef5350}
.stage-dot.pending{background:#555}
.stage-name{flex:1;color:#ddd;font-size:12px}
.stage-status-text{color:#888;font-size:11px}
.stage-toggle{color:#555;font-size:10px;transition:transform .2s}
.stage-body{margin-top:8px;margin-left:20px;padding:8px 10px;background:#111;border-radius:6px;font-size:11px;display:none}
.stage-body.open{display:block}
.stage-body .s-row{display:flex;padding:3px 0;gap:8px}
.stage-body .s-label{color:#888;min-width:80px;flex-shrink:0}
.stage-body .s-value{color:#ccc;word-break:break-word}
.stage-body .s-pre{background:#0a0a23;padding:6px;border-radius:4px;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow:auto;font-family:monospace;font-size:11px;color:#aaa;margin-top:4px;line-height:1.4}
.lora-tag{display:inline-block;background:#1b3d69;color:#7cb3ff;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px}
.detail-pre{background:#111;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;font-family:monospace;font-size:11px;color:#ccc;line-height:1.5}
</style>
</head>
<body>
<div class="container">
<h1>生成历史</h1>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="搜索 prompt 或 ID...">
  <button class="btn btn-sm" onclick="loadHistory()">刷新</button>
  <a href="/static/advanced_workflow_v2.html"><button class="btn btn-sm" style="background:#333">+ 新建</button></a>
</div>

<div class="filter-bar" id="categoryBar">
  <button class="filter-btn active" onclick="setCategory('',this)">全部</button>
  <button class="filter-btn" onclick="setCategory('local',this)">本地生成</button>
  <button class="filter-btn" onclick="setCategory('thirdparty',this)">三方接口</button>
  <button class="filter-btn" onclick="setCategory('postprocess',this)">后处理</button>
</div>

<div class="filter-bar" id="statusBar">
  <button class="filter-btn active" data-status="" onclick="setFilter('',this)">全部</button>
  <button class="filter-btn" data-status="completed" onclick="setFilter('completed',this)">已完成</button>
  <button class="filter-btn" data-status="running" onclick="setFilter('running',this)">进行中</button>
  <button class="filter-btn" data-status="failed" onclick="setFilter('failed',this)">失败</button>
</div>

<div id="grid" class="grid"><div class="loading"><span class="spinner"></span>加载中...</div></div>
<div id="pagination"></div>
</div>

<!-- Video Player Overlay -->
<div class="player-overlay" id="playerOverlay" onclick="closePlayer(event)">
  <span class="player-close" onclick="closePlayerForce()">✕</span>
  <video id="playerVideo" controls autoplay loop></video>
  <div class="player-actions">
    <a id="playerDownload" href="#" download>下载视频</a>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal" onclick="closeModal(event)">
<div class="modal-inner" id="modalInner">
  <span class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">✕</span>
  <div id="modalContent"></div>
</div>
</div>

<script>
const API_KEY = localStorage.getItem('wan22_api_key') || localStorage.getItem('api_key') || 'wan22-default-key-change-me';
let currentFilter = '';
let currentCategory = '';
let currentPage = 1;
let currentSearch = '';
let totalFromServer = 0;
let totalPagesFromServer = 1;
let currentPageData = [];
let pollTimer = null;
let prevFingerprints = {};  // {wfId: fingerprint} for diff-based updates
const PAGE_SIZE = 24;

// --- Debounced search ---
let searchTimeout = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearch = document.getElementById('searchInput').value.trim();
      currentPage = 1;
      loadHistory();
    }, 300);
  });
});

// --- Escape key closes overlays ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('playerOverlay').classList.contains('open')) {
      closePlayerForce();
    } else {
      document.getElementById('detailModal').classList.remove('open');
    }
  }
});

// --- Visibility-based polling ---
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearTimeout(pollTimer);
  } else {
    schedulePoll();
  }
});

function schedulePoll() {
  clearTimeout(pollTimer);
  const hasRunning = currentPageData.some(w => w.status === 'running' || w.status === 'queued');
  const delay = hasRunning ? 5000 : 30000;
  pollTimer = setTimeout(() => loadHistory(true), delay);
}

// --- Relative time ---
function relativeTime(ts) {
  if (!ts) return '-';
  const now = Date.now() / 1000;
  const diff = now - ts;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + '天前';
  return new Date(ts * 1000).toLocaleDateString('zh-CN');
}

// --- Video Player ---
function openPlayer(videoUrl) {
  const overlay = document.getElementById('playerOverlay');
  const vid = document.getElementById('playerVideo');
  const dl = document.getElementById('playerDownload');
  vid.src = videoUrl;
  dl.href = videoUrl;
  overlay.classList.add('open');
  vid.play().catch(() => {});
}

function closePlayer(e) {
  if (e.target === document.getElementById('playerOverlay')) {
    closePlayerForce();
  }
}

function closePlayerForce() {
  const overlay = document.getElementById('playerOverlay');
  const vid = document.getElementById('playerVideo');
  vid.pause();
  vid.removeAttribute('src');
  vid.load();
  overlay.classList.remove('open');
}

// --- Fingerprint for diff detection ---
function cardFingerprint(w) {
  return [w.status, w.final_video_url||'', w.edited_frame_url||'', w.first_frame_url||'', w.error||''].join('|');
}

// --- Server-side fetch ---
async function loadHistory(silent = false) {
  clearTimeout(pollTimer);
  if (!silent) {
    document.getElementById('grid').innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
    document.getElementById('pagination').innerHTML = '';
  }
  try {
    const headers = API_KEY ? {'X-API-Key': API_KEY} : {};
    const params = new URLSearchParams({
      page: currentPage,
      page_size: PAGE_SIZE,
    });
    if (currentFilter) params.set('status', currentFilter);
    if (currentCategory) params.set('category', currentCategory);
    if (currentSearch) params.set('q', currentSearch);

    const res = await fetch('/api/v1/workflow/history?' + params.toString(), {headers});
    if (res.status === 401 || res.status === 403) {
      const key = prompt('请输入 API Key:');
      if (key) { localStorage.setItem('api_key', key); location.reload(); }
      return;
    }
    const data = await res.json();
    currentPageData = data.workflows || [];
    totalFromServer = data.total || 0;
    totalPagesFromServer = data.total_pages || 1;
    currentPage = data.page || 1;
    if (silent) {
      patchGrid();
    } else {
      renderGrid();
    }
  } catch(e) {
    if (!silent) {
      document.getElementById('grid').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
    }
  }
  schedulePoll();
}

function setFilter(status, btn) {
  currentFilter = status;
  currentPage = 1;
  document.querySelectorAll('#statusBar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
}

function setCategory(cat, btn) {
  currentCategory = cat;
  currentPage = 1;
  document.querySelectorAll('#categoryBar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
}

function renderGrid() {
  if (!currentPageData.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">暂无记录</div>';
    document.getElementById('pagination').innerHTML = '';
    prevFingerprints = {};
    return;
  }

  document.getElementById('grid').innerHTML = currentPageData.map(w => cardHtml(w)).join('');
  renderPagination(currentPage, totalPagesFromServer, totalFromServer);
  // Save fingerprints for future diff
  prevFingerprints = {};
  currentPageData.forEach(w => { prevFingerprints[w.workflow_id] = cardFingerprint(w); });
}

function patchGrid() {
  const grid = document.getElementById('grid');
  const newIds = currentPageData.map(w => w.workflow_id);
  const oldCards = grid.querySelectorAll('.card[data-wfid]');
  const oldIds = [...oldCards].map(el => el.dataset.wfid);

  // If list of IDs changed (new items, removed items, reordered), full re-render
  if (newIds.length !== oldIds.length || newIds.some((id, i) => id !== oldIds[i])) {
    console.log('[patchGrid] ID list changed, full re-render', {newLen: newIds.length, oldLen: oldIds.length});
    renderGrid();
    return;
  }

  // Patch only changed cards
  const newFingerprints = {};
  let changed = 0;
  currentPageData.forEach(w => {
    const fp = cardFingerprint(w);
    newFingerprints[w.workflow_id] = fp;
    if (fp !== prevFingerprints[w.workflow_id]) {
      const el = grid.querySelector(`.card[data-wfid="${w.workflow_id}"]`);
      if (el) {
        const tmp = document.createElement('div');
        tmp.innerHTML = cardHtml(w);
        el.replaceWith(tmp.firstElementChild);
        changed++;
      }
    }
  });
  prevFingerprints = newFingerprints;
  if (changed) renderPagination(currentPage, totalPagesFromServer, totalFromServer);
  console.log(`[patchGrid] ${changed}/${newIds.length} cards updated`);
}

function renderPagination(page, totalPages, total) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) {
    el.innerHTML = total > 0
      ? `<div class="pagination"><span style="color:#888;font-size:12px">共 ${total} 条</span></div>`
      : '';
    return;
  }
  const range = [];
  for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) range.push(i);
  let html = '<div class="pagination">';
  html += `<button class="btn btn-sm" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>&#8249; 上一页</button>`;
  if (range[0] > 1) {
    html += `<button class="btn btn-sm page-btn" onclick="goPage(1)">1</button>`;
    if (range[0] > 2) html += '<span class="page-ellipsis">…</span>';
  }
  range.forEach(i => {
    html += `<button class="btn btn-sm page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  });
  if (range[range.length-1] < totalPages) {
    if (range[range.length-1] < totalPages - 1) html += '<span class="page-ellipsis">…</span>';
    html += `<button class="btn btn-sm page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  }
  html += `<button class="btn btn-sm" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页 &#8250;</button>`;
  html += `<span style="color:#888;font-size:12px">共 ${total} 条 · 第 ${page}/${totalPages} 页</span>`;
  html += '</div>';
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  loadHistory();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function cardHtml(w) {
  const thumb = w.edited_frame_url || w.first_frame_url || '';
  const hasVideo = !!w.final_video_url;
  const statusClass = 'status-' + (w.status || 'queued');
  const statusLabel = {completed:'已完成', running:'生成中', failed:'失败', queued:'排队中'}[w.status] || w.status;
  const timeStr = relativeTime(w.created_at);
  const modeLabel = {
    t2v:'文生视频', i2v:'图生视频', extend:'续写', chain:'长视频',
    wan26_t2v:'万象T2V', wan26_i2v:'万象I2V',
    seedance_t2v:'Seedance T2V', seedance_i2v:'Seedance I2V',
    clothoff:'Clothoff',
    interpolate:'插帧', upscale:'超分', audio:'音频', faceswap:'换脸',
    full_body_reference:'全身换脸', face_reference:'换脸', first_frame:'首帧',
    vace_ref2v:'VACE参考', vace_v2v:'VACE编辑',
  }[w.mode] || w.mode || '-';
  const categoryLabels = {local:'本地', thirdparty:'三方', postprocess:'后处理'};
  const categoryBadge = w.category && categoryLabels[w.category]
    ? `<span class="card-mode" style="background:#2a1a4a;color:#b39ddb;margin-left:4px">${categoryLabels[w.category]}</span>`
    : '';

  let runningHtml = '';
  if (w.status === 'running') {
    runningHtml = '<span class="running-indicator"><span class="running-dot"></span></span>';
  }

  const thumbClick = hasVideo
    ? `onclick="openPlayer('${w.final_video_url}')"`
    : '';

  return `<div class="card" data-wfid="${w.workflow_id}">
    <div class="card-thumb ${hasVideo ? '' : 'no-video'}" ${thumbClick}>
      ${thumb ? `<img src="${thumb}" loading="lazy" onerror="this.style.display='none'">` : (hasVideo ? `<video src="${w.final_video_url}" preload="metadata" muted style="width:100%;height:100%;object-fit:cover;pointer-events:none"></video>` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px">无预览</div>')}
      ${hasVideo ? '<div class="play-btn"><div class="play-icon">▶</div></div>' : ''}
    </div>
    <div class="card-body">
      <span class="card-status ${statusClass}">${statusLabel}</span>${runningHtml}
      <div class="card-wfid">
        <span title="${w.workflow_id}">${w.workflow_id}</span>
        <button onclick="event.stopPropagation();copyWfId('${w.workflow_id}')" title="复制ID">📋</button>
      </div>
      <div class="card-prompt" title="${(w.user_prompt||'').replace(/"/g,'&quot;')}">${w.user_prompt || '(无 prompt)'}</div>
      <div class="card-meta">
        <span title="${w.created_at ? new Date(w.created_at * 1000).toLocaleString('zh-CN') : ''}">${timeStr}</span>
        <span class="card-mode">${modeLabel}</span>${categoryBadge}
      </div>
      ${w.error ? `<div class="card-error">${w.error}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-sm" onclick="showDetail('${w.workflow_id}')">详情</button>
        ${hasVideo ? `<a href="${w.final_video_url}" download><button class="btn btn-sm" style="background:#2a4a2e">下载</button></a>` : ''}
        <button class="btn btn-sm" style="background:#5a4a1a" onclick="regenerate('${w.workflow_id}', this)">重新生成</button>
      </div>
    </div>
  </div>`;
}

async function showDetail(wfId) {
  const mc = document.getElementById('modalContent');
  mc.innerHTML = '<div class="loading"><span class="spinner"></span>加载详情...</div>';
  document.getElementById('detailModal').classList.add('open');

  try {
    const headers = API_KEY ? {'X-API-Key': API_KEY} : {};
    const res = await fetch(`/api/v1/workflow/status/${wfId}?detail=true`, {headers});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    const modeLabels = {full_body_reference:'全身换脸', face_reference:'换脸', first_frame:'首帧', t2v:'文生视频'};
    const statusLabels = {completed:'已完成', running:'生成中', failed:'失败', queued:'排队中'};
    const stageLabels = {prompt_analysis:'Prompt 分析', first_frame_acquisition:'首帧获取', seedream_edit:'SeeDream 编辑', video_generation:'视频生成'};

    const timeStr = d.created_at ? new Date(d.created_at * 1000).toLocaleString('zh-CN') : '-';
    const completedStr = d.completed_at ? new Date(d.completed_at * 1000).toLocaleString('zh-CN') : '-';
    const elapsedStr = d.elapsed_time ? (d.elapsed_time < 60 ? d.elapsed_time.toFixed(1) + 's' : (d.elapsed_time / 60).toFixed(1) + 'min') : '-';

    let html = `<div class="modal-title">任务详情</div>`;

    // Video player
    if (d.final_video_url) {
      html += `<video class="modal-video" src="${d.final_video_url}" controls autoplay loop></video>`;
    }

    // Frame comparison
    if (d.edited_frame_url || d.first_frame_url || d.reference_image) {
      html += `<div class="frame-row" style="margin-top:12px">`;
      if (d.reference_image) html += `<div class="frame-item"><img src="${d.reference_image}" loading="lazy" onerror="this.parentElement.style.display='none'"><p>参考图</p></div>`;
      if (d.first_frame_url) html += `<div class="frame-item"><img src="${d.first_frame_url}" loading="lazy"><p>首帧</p></div>`;
      if (d.edited_frame_url) html += `<div class="frame-item"><img src="${d.edited_frame_url}" loading="lazy"><p>编辑后</p></div>`;
      html += `</div>`;
    }

    // Basic info
    const allModeLabels = {
      full_body_reference:'全身换脸', face_reference:'换脸', first_frame:'首帧',
      t2v:'文生视频', i2v:'图生视频', extend:'续写', chain:'长视频',
      wan26_t2v:'万象T2V', wan26_i2v:'万象I2V',
      seedance_t2v:'Seedance T2V', seedance_i2v:'Seedance I2V',
      clothoff:'Clothoff', interpolate:'插帧', upscale:'超分', audio:'音频', faceswap:'换脸',
    };
    const rows = [
      ['ID', `<span style="font-family:monospace">${d.workflow_id}</span>`],
      ['状态', `<span class="card-status status-${d.status}" style="font-size:12px">${statusLabels[d.status] || d.status}</span>`],
      ['模式', allModeLabels[d.mode] || modeLabels[d.mode] || d.mode || '-'],
      ['模型', d.model || '-'],
      ['创建时间', timeStr],
      ['完成时间', completedStr],
      ['耗时', elapsedStr],
    ];
    if (d.user_prompt) rows.push(['Prompt', `<div style="white-space:pre-wrap;max-height:120px;overflow-y:auto;font-size:12px;color:#ccc">${escHtml(d.user_prompt)}</div>`]);
    if (d.error) rows.push(['错误', `<span style="color:#ef5350">${escHtml(d.error)}</span>`]);
    // Task params for non-workflow tasks
    if (d.params && !d.stages) {
      const p = d.params;
      const paramParts = [];
      if (p.width && p.height) paramParts.push(`${p.width}×${p.height}`);
      if (p.steps) paramParts.push(`${p.steps} steps`);
      if (p.cfg) paramParts.push(`cfg=${p.cfg}`);
      if (p.fps) paramParts.push(`${p.fps} fps`);
      if (p.num_frames) paramParts.push(`${p.num_frames} frames`);
      if (p.seed && p.seed !== -1) paramParts.push(`seed=${p.seed}`);
      if (paramParts.length) rows.push(['参数', paramParts.join(' · ')]);
    }
    html += rows.map(([l,v]) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`).join('');

    // Stage progress with inline details (for workflow tasks only)
    const sd = d.stage_details || {};
    const ar = d.analysis_result || {};
    const statusMap = {completed:'完成', running:'进行中', failed:'失败', pending:'等待'};

    const hasStages = d.stages && d.stages.length > 0;
    html += `<div class="detail-section"><div class="detail-section-title">${hasStages ? '阶段详情' : '任务信息'}</div><div class="detail-section-body">`;
    if (!hasStages) {
      // For non-workflow tasks, show a simple progress display
      if (d.status === 'running') {
        const pct = ((d.progress || 0) * 100).toFixed(1);
        html += `<div style="padding:8px 0"><div style="display:flex;align-items:center;gap:8px"><span style="color:#aaa;font-size:12px">进度</span><div style="flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#7c83ff,#4ade80);border-radius:3px;transition:width .5s"></div></div><span style="color:#7c83ff;font-size:12px">${pct}%</span></div></div>`;
      } else if (d.status === 'completed') {
        html += `<div style="padding:8px 0;color:#4ade80;font-size:12px">✓ 任务已完成</div>`;
      } else if (d.status === 'failed') {
        html += `<div style="padding:8px 0;color:#ef5350;font-size:12px">✗ 任务失败</div>`;
      } else {
        html += `<div style="padding:8px 0;color:#888;font-size:12px">等待中...</div>`;
      }
    }

    for (const s of d.stages || []) {
      const stageData = sd[s.name] || {};
      const hasData = Object.keys(stageData).length > 0;
      const stageId = 'stage_' + s.name + '_' + Math.random().toString(36).slice(2,8);

      html += `<div class="stage-row">`;
      html += `<div class="stage-header" ${hasData ? `onclick="document.getElementById('${stageId}').classList.toggle('open')"` : ''}>
        <div class="stage-dot ${s.status}"></div>
        <span class="stage-name">${stageLabels[s.name] || s.name}</span>
        <span class="stage-status-text">${statusMap[s.status] || s.status}</span>
        ${hasData ? '<span class="stage-toggle">▸</span>' : ''}
      </div>`;

      if (s.error) {
        html += `<div style="margin-left:20px;margin-top:4px;color:#ef5350;font-size:11px">${escHtml(s.error)}</div>`;
      }

      if (hasData) {
        html += `<div class="stage-body" id="${stageId}">`;
        html += renderStageDetails(s.name, stageData, ar, d);
        html += `</div>`;
      }

      html += `</div>`;
    }
    html += `</div></div>`;

    mc.innerHTML = html;
  } catch (e) {
    mc.innerHTML = `<div style="color:#ef5350;padding:20px">加载失败: ${e.message}</div>`;
  }
}

function renderStageDetails(name, data, ar, d) {
  let h = '';
  const row = (l, v) => `<div class="s-row"><span class="s-label">${l}</span><span class="s-value">${v}</span></div>`;

  if (name === 'prompt_analysis') {
    h += row('用户 Prompt', escHtml(data.original_prompt || d.user_prompt || '-'));
    if (data.optimized_prompt) h += row('优化 Prompt', `<div class="s-pre">${escHtml(data.optimized_prompt)}</div>`);
    const optT2i = ar.optimized_t2i_prompt;
    if (optT2i && optT2i !== data.optimized_prompt) h += row('T2I Prompt', `<div class="s-pre">${escHtml(optT2i)}</div>`);
    const vLoras = data.video_loras || ar.video_loras || [];
    const iLoras = data.image_loras || ar.image_loras || [];
    if (vLoras.length) {
      h += `<div class="s-row"><span class="s-label">视频 LoRA</span><span class="s-value">`;
      for (const l of vLoras) {
        h += `<span class="lora-tag">${escHtml(l.name)} (${l.weight || 0.8})</span> `;
        if (l.trigger_words && l.trigger_words.length) h += `<span style="color:#888;font-size:10px">[${l.trigger_words.join(', ')}]</span> `;
      }
      h += `</span></div>`;
    }
    if (iLoras.length) {
      h += `<div class="s-row"><span class="s-label">图片 LoRA</span><span class="s-value">`;
      for (const l of iLoras) h += `<span class="lora-tag">${escHtml(l.name || l.file || 'unknown')}</span> `;
      h += `</span></div>`;
    }
    if (data.pose_keys && data.pose_keys.length) h += row('关联姿势', data.pose_keys.map(p => `<span class="lora-tag">${escHtml(p)}</span>`).join(' '));
    if (data.images && data.images.length) {
      h += `<div class="s-row"><span class="s-label">选择图片</span><span class="s-value">`;
      for (const img of data.images) h += `<a href="${escHtml(img.url)}" target="_blank"><img src="${escHtml(img.url)}" loading="lazy" style="max-height:80px;border-radius:4px;margin:2px;object-fit:contain" onerror="this.style.display='none'"></a>`;
      h += `</span></div>`;
    }
  }

  else if (name === 'first_frame_acquisition') {
    const sourceMap = {select_existing:'选择已有', generate:'生成', upload:'上传', pose_reference:'姿势参考', t2v_fallback:'T2V回退'};
    h += row('来源', sourceMap[data.source] || data.source || '-');
    if (data.url) h += row('首帧图片', `<a href="${escHtml(data.url)}" target="_blank"><img src="${escHtml(data.url)}" loading="lazy" style="max-height:140px;max-width:100%;border-radius:4px;object-fit:contain;background:#0a0a23" onerror="this.parentElement.innerHTML='<span style=color:#888>图片加载失败</span>'"></a>`);
    h += row('换脸', data.face_swapped ? `<span style="color:#4caf50">是</span> (强度: ${data.face_swap_strength || '-'})` : '否');
  }

  else if (name === 'seedream_edit') {
    h += row('模式', data.mode || '-');
    const toggles = [];
    if (data.swap_face) toggles.push('换脸');
    if (data.swap_accessories) toggles.push('配饰');
    if (data.swap_expression) toggles.push('表情');
    if (data.swap_clothing) toggles.push('衣服');
    h += row('编辑开关', toggles.length ? toggles.join(', ') : '无');
    h += row('强度', data.strength || '-');
    h += row('尺寸', data.size || '-');
    h += row('模型', data.model || '-');
    h += row('API状态', data.api_status === 'success' ? '<span style="color:#4caf50">成功</span>' : (data.api_status || '-'));
    h += row('Reactor换脸', data.face_swapped ? '是' : (data.enable_reactor ? '启用(未执行)' : '否'));
    if (data.url) h += row('编辑结果', `<a href="${escHtml(data.url)}" target="_blank"><img src="${escHtml(data.url)}" loading="lazy" style="max-height:140px;max-width:100%;border-radius:4px;object-fit:contain;background:#0a0a23" onerror="this.parentElement.innerHTML='<span style=color:#888>链接已过期</span>'"></a>`);
    if (data.prompt) h += row('编辑 Prompt', `<div class="s-pre">${escHtml(data.prompt)}</div>`);
  }

  else if (name === 'video_generation') {
    h += row('模型', data.model || '-');
    h += row('分辨率', data.resolution || '-');
    h += row('时长', data.duration || '-');
    const postProcess = [
      data.upscale_enabled ? '放大' : null,
      data.interpolation_enabled ? '插帧' : null,
      data.mmaudio_enabled ? '音频' : null,
    ].filter(Boolean).join(', ') || '无';
    h += row('后处理', postProcess);
    h += row('换脸', data.face_swap_enabled ? '是' : '否');
    if (data.prompt) h += row('生成 Prompt', `<div class="s-pre">${escHtml(data.prompt)}</div>`);
    if (data.loras && data.loras.length) {
      h += `<div class="s-row"><span class="s-label">使用 LoRA</span><span class="s-value">`;
      for (const l of data.loras) h += `<span class="lora-tag">${escHtml(l.name)} (${l.strength || l.weight || '-'})</span> `;
      h += `</span></div>`;
    }
    if (data.chain_id) h += row('Chain ID', `<span style="font-family:monospace">${escHtml(data.chain_id)}</span>`);
    if (data.video_url) h += row('视频链接', `<a href="${escHtml(data.video_url)}" target="_blank" style="color:#7c83ff;word-break:break-all">${escHtml(data.video_url)}</a>`);
    if (data.error) h += row('错误', `<span style="color:#ef5350">${escHtml(data.error)}</span>`);
  }

  // Fallback: show raw JSON for any unhandled stage
  if (!h) {
    h = `<div class="s-pre">${escHtml(JSON.stringify(data, null, 2))}</div>`;
  }

  return h;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyWfId(wfId) {
  navigator.clipboard.writeText(wfId).then(() => {
    const btns = document.querySelectorAll('.card-wfid button');
    btns.forEach(b => { if (b.getAttribute('onclick').includes(wfId)) { b.textContent = '✓'; setTimeout(() => b.textContent = '📋', 1500); } });
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = wfId;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('open');
  }
}

async function regenerate(wfId, btn) {
  if (!confirm('确认以相同参数重新生成？')) return;
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '提交中...';
  try {
    const headers = {'Content-Type': 'application/json'};
    if (API_KEY) headers['X-API-Key'] = API_KEY;
    const res = await fetch(`/api/v1/workflow/${wfId}/regenerate`, {method: 'POST', headers});
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    btn.textContent = '已提交';
    btn.style.background = '#2a4a2e';
    setTimeout(() => loadHistory(), 1000);
  } catch (e) {
    alert('重新生成失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = origText;
  }
}

loadHistory();
</script>
