<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关键词对照编辑器 - AI Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{text-align:center;color:#7c83ff;margin-bottom:24px;font-size:1.8em}
.toolbar{background:#16213e;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:#7c83ff;color:#fff}
.btn-primary:hover{background:#5a62e0}
.btn-success{background:#4ade80;color:#fff}
.btn-success:hover{background:#3ac770}
.btn-danger{background:#f87171;color:#fff}
.btn-danger:hover{background:#ef4444}
.btn-secondary{background:#16213e;color:#7c83ff;border:1px solid #7c83ff}
.btn-secondary:hover{background:#1a4a7a}
.search-box{flex:1;min-width:200px}
.search-box input{width:100%;padding:8px 12px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.editor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px}
.keyword-card{background:#16213e;border:1px solid #333;border-radius:8px;padding:16px;transition:border-color .2s}
.keyword-card:hover{border-color:#7c83ff}
.keyword-card.new{border-color:#4ade80}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:16px;font-weight:600;color:#7c83ff}
.card-actions{display:flex;gap:8px}
.btn-icon{background:transparent;border:none;color:#aaa;cursor:pointer;font-size:18px;padding:4px 8px;transition:color .2s}
.btn-icon:hover{color:#7c83ff}
.btn-icon.delete:hover{color:#f87171}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field textarea:focus{outline:none;border-color:#7c83ff}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{background:#0a0a23;padding:4px 10px;border-radius:4px;font-size:11px;border:1px solid #444;display:flex;align-items:center;gap:6px}
.tag .remove{cursor:pointer;color:#f87171;font-weight:bold}
.tag .remove:hover{color:#ff6a6a}
.add-tag-input{display:flex;gap:6px;margin-top:8px}
.add-tag-input input{flex:1;padding:6px 8px;background:#0a0a23;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:12px}
.add-tag-input button{padding:6px 12px;background:#7c83ff;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px}
.add-tag-input button:hover{background:#5a62e0}
.stats{background:#0f3460;border-radius:6px;padding:12px;margin-bottom:20px;display:flex;gap:24px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:11px;color:#aaa}
.stat-value{font-size:20px;color:#4ade80;font-weight:600}
.loading{text-align:center;padding:60px;color:#666}
.empty{text-align:center;padding:60px;color:#666}
.success-msg{background:#1a4a2e;border:1px solid:#4ade80;border-radius:6px;padding:12px;color:#4ade80;margin-bottom:20px;display:none}
.error-msg{background:#4a1a1a;border:1px solid #f87171;border-radius:6px;padding:12px;color:#f87171;margin-bottom:20px;display:none}
</style>
</head>
<body>
<div class="container">
<h1>🔤 关键词对照编辑器</h1>

<div id="successMsg" class="success-msg"></div>
<div id="errorMsg" class="error-msg"></div>

<div class="stats">
<div class="stat">
<div class="stat-label">总关键词数</div>
<div class="stat-value" id="totalCount">0</div>
</div>
<div class="stat">
<div class="stat-label">已修改</div>
<div class="stat-value" id="modifiedCount">0</div>
</div>
<div class="stat">
<div class="stat-label">新增</div>
<div class="stat-value" id="newCount">0</div>
</div>
</div>

<div class="toolbar">
<div class="search-box">
<input type="text" id="searchInput" placeholder="搜索关键词...">
</div>
<button class="btn btn-primary" onclick="addNewKeyword()">➕ 新增关键词</button>
<button class="btn btn-success" onclick="saveAll()">💾 保存全部</button>
<button class="btn btn-secondary" onclick="loadKeywords()">🔄 重新加载</button>
<button class="btn btn-secondary" onclick="exportJSON()">📥 导出JSON</button>
</div>

<div id="editorGrid" class="editor-grid">
<div class="loading">加载中...</div>
</div>
</div>

<script>
const API_KEY = localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me';
let keywords = {};
let modifiedKeys = new Set();
let newKeys = new Set();

async function loadKeywords() {
  try {
    const response = await fetch('/api/v1/admin/keywords', {
      headers: { 'X-API-Key': API_KEY }
    });

    if (!response.ok) {
      throw new Error('加载失败');
    }

    keywords = await response.json();
    modifiedKeys.clear();
    newKeys.clear();
    renderKeywords();
    updateStats();
  } catch (error) {
    showError('加载关键词失败: ' + error.message);
    document.getElementById('editorGrid').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function renderKeywords(filter = '') {
  const grid = document.getElementById('editorGrid');
  grid.innerHTML = '';

  const entries = Object.entries(keywords).filter(([key]) =>
    key.toLowerCase().includes(filter.toLowerCase())
  );

  if (entries.length === 0) {
    grid.innerHTML = '<div class="empty">无匹配的关键词</div>';
    return;
  }

  entries.forEach(([key, data]) => {
    const card = createKeywordCard(key, data);
    grid.appendChild(card);
  });
}

function createKeywordCard(key, data) {
  const card = document.createElement('div');
  card.className = 'keyword-card';
  if (newKeys.has(key)) card.classList.add('new');

  const synonyms = data.synonyms || [];
  const relatedWords = data.related_words || [];

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${key}</div>
      <div class="card-actions">
        <button class="btn-icon delete" onclick="deleteKeyword('${key}')" title="删除">🗑️</button>
      </div>
    </div>
    <div class="field">
      <label>中文翻译</label>
      <input type="text" id="translation-${key}" value="${data.translation || ''}"
             onchange="markModified('${key}')" placeholder="输入中文翻译">
    </div>
    <div class="field">
      <label>描述</label>
      <textarea id="description-${key}" onchange="markModified('${key}')"
                placeholder="输入描述">${data.description || ''}</textarea>
    </div>
    <div class="field">
      <label>同义词</label>
      <div class="tag-list" id="synonyms-${key}">
        ${synonyms.map(s => `<span class="tag">${s}<span class="remove" onclick="removeTag('${key}', 'synonyms', '${s}')">×</span></span>`).join('')}
      </div>
      <div class="add-tag-input">
        <input type="text" id="new-synonym-${key}" placeholder="添加同义词">
        <button onclick="addTag('${key}', 'synonyms')">添加</button>
      </div>
    </div>
    <div class="field">
      <label>相关词</label>
      <div class="tag-list" id="related-${key}">
        ${relatedWords.map(r => `<span class="tag">${r}<span class="remove" onclick="removeTag('${key}', 'related_words', '${r}')">×</span></span>`).join('')}
      </div>
      <div class="add-tag-input">
        <input type="text" id="new-related-${key}" placeholder="添加相关词">
        <button onclick="addTag('${key}', 'related_words')">添加</button>
      </div>
    </div>
  `;

  return card;
}

function markModified(key) {
  modifiedKeys.add(key);
  updateStats();
}

function addTag(key, type) {
  const inputId = type === 'synonyms' ? `new-synonym-${key}` : `new-related-${key}`;
  const input = document.getElementById(inputId);
  const value = input.value.trim();

  if (!value) return;

  if (!keywords[key][type]) {
    keywords[key][type] = [];
  }

  if (!keywords[key][type].includes(value)) {
    keywords[key][type].push(value);
    markModified(key);
    renderKeywords(document.getElementById('searchInput').value);
  }

  input.value = '';
}

function removeTag(key, type, value) {
  if (keywords[key][type]) {
    keywords[key][type] = keywords[key][type].filter(v => v !== value);
    markModified(key);
    renderKeywords(document.getElementById('searchInput').value);
  }
}

function deleteKeyword(key) {
  if (!confirm(`确定删除关键词 "${key}" 吗？`)) return;

  delete keywords[key];
  modifiedKeys.delete(key);
  newKeys.delete(key);
  renderKeywords(document.getElementById('searchInput').value);
  updateStats();
}

function addNewKeyword() {
  const key = prompt('输入新关键词（英文）:');
  if (!key || !key.trim()) return;

  const normalizedKey = key.trim().toLowerCase();
  if (keywords[normalizedKey]) {
    alert('该关键词已存在');
    return;
  }

  keywords[normalizedKey] = {
    translation: '',
    description: '',
    synonyms: [],
    related_words: []
  };

  newKeys.add(normalizedKey);
  modifiedKeys.add(normalizedKey);
  renderKeywords(document.getElementById('searchInput').value);
  updateStats();
}

async function saveAll() {
  // Collect all data
  Object.keys(keywords).forEach(key => {
    const translationEl = document.getElementById(`translation-${key}`);
    const descriptionEl = document.getElementById(`description-${key}`);

    if (translationEl) keywords[key].translation = translationEl.value.trim();
    if (descriptionEl) keywords[key].description = descriptionEl.value.trim();
  });

  try {
    const response = await fetch('/api/v1/admin/keywords', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': API_KEY
      },
      body: JSON.stringify(keywords)
    });

    if (!response.ok) {
      throw new Error('保存失败');
    }

    showSuccess('保存成功！');
    modifiedKeys.clear();
    newKeys.clear();
    updateStats();
    renderKeywords(document.getElementById('searchInput').value);
  } catch (error) {
    showError('保存失败: ' + error.message);
  }
}

function exportJSON() {
  const dataStr = JSON.stringify(keywords, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'keywords.json';
  a.click();
  URL.revokeObjectURL(url);
}

function updateStats() {
  document.getElementById('totalCount').textContent = Object.keys(keywords).length;
  document.getElementById('modifiedCount').textContent = modifiedKeys.size;
  document.getElementById('newCount').textContent = newKeys.size;
}

function showSuccess(message) {
  const el = document.getElementById('successMsg');
  el.textContent = message;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function showError(message) {
  const el = document.getElementById('errorMsg');
  el.textContent = message;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  renderKeywords(e.target.value);
});

// Initialize
loadKeywords();
</script>
</body>
</html>
