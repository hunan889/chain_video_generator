<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏 - AI Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{text-align:center;color:#7c83ff;margin-bottom:24px;font-size:1.6em}

/* Navigation */
.nav{display:flex;gap:12px;margin-bottom:20px;justify-content:center}
.nav-btn{padding:10px 24px;background:#16213e;border:1px solid #333;border-radius:8px;color:#aaa;cursor:pointer;font-size:14px;transition:all 0.2s}
.nav-btn:hover{border-color:#7c83ff;color:#7c83ff}
.nav-btn.active{background:#0f3460;border-color:#7c83ff;color:#fff}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.tab{padding:10px 24px;background:#16213e;border:1px solid #333;border-radius:8px;cursor:pointer;color:#aaa;font-size:14px;transition:all 0.2s}
.tab:hover{border-color:#7c83ff;color:#7c83ff}
.tab.active{background:#0f3460;border-color:#7c83ff;color:#fff}

/* Stats */
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#16213e;border:1px solid #333;border-radius:8px;padding:16px 24px;text-align:center}
.stat-number{font-size:28px;font-weight:600;color:#7c83ff;margin-bottom:4px}
.stat-label{font-size:12px;color:#aaa;text-transform:uppercase}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}

/* Card */
.resource-card{position:relative;background:#16213e;border:2px solid #333;border-radius:12px;overflow:hidden;transition:all 0.3s ease}
.resource-card:hover{border-color:#7c83ff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,131,255,0.3)}

.btn-favorite{position:absolute;top:8px;left:8px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.btn-favorite:hover{transform:scale(1.1)}
.btn-favorite[data-favorited="true"]{background:#ff9e4a}
.btn-favorite[data-favorited="true"] .heart-icon{fill:white}
.btn-favorite[data-favorited="false"] .heart-icon{fill:none;stroke:white;stroke-width:2}
.heart-icon{width:18px;height:18px}

.card-badges{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px;flex-direction:column;align-items:flex-end}
.badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-image{background:#4ade80;color:#000}
.badge-video{background:#f87171;color:#fff}
.badge-lora{background:#fbbf24;color:#000}
.badge-pose{background:#a78bfa;color:#fff}

.card-media{position:relative;width:100%;padding-top:133.33%;background:#0a0a23;overflow:hidden}
.card-media img,.card-media video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}

.card-body{padding:12px}
.card-title{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-prompt{font-size:11px;color:#aaa;line-height:1.4;max-height:2.8em;overflow:hidden;margin-bottom:8px}
.card-meta{font-size:10px;color:#666;margin-top:8px}

/* Edit Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.edit-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:600px;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:20px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{color:#7c83ff;font-size:1.2em;margin:0}
.modal-close{background:transparent;border:none;color:#aaa;font-size:28px;cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:color 0.2s}
.modal-close:hover{color:#fff}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.edit-field{margin-bottom:16px}
.edit-field label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
.edit-field input,.edit-field textarea{width:100%;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;font-family:inherit}
.edit-field textarea{min-height:80px;resize:vertical}
.edit-field input:focus,.edit-field textarea:focus{outline:none;border-color:#7c83ff}
.modal-footer{padding:16px 20px;border-top:1px solid #333;display:flex;justify-content:flex-end;gap:12px}
.btn-secondary{padding:10px 24px;background:#16213e;border:1px solid #444;border-radius:8px;color:#aaa;font-size:14px;cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{border-color:#7c83ff;color:#7c83ff}
.btn-primary{padding:10px 24px;background:#7c83ff;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:#6b72e0}
.btn-ai{padding:8px 16px;background:#4ade80;border:none;border-radius:6px;color:#000;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:8px}
.btn-ai:hover{background:#3bc970}

/* Pose Association Modal */
.pose-association-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column}
.pose-search{width:100%;padding:10px 14px;background:#0a0a23;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:16px}
.pose-search:focus{outline:none;border-color:#7c83ff}
.pose-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.pose-card{position:relative;padding:16px;background:#16213e;border:2px solid #333;border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s}
.pose-card:hover{border-color:#7c83ff;transform:translateY(-2px)}
.pose-card.associated{border-color:#4ade80;background:#1a4a2e}
.pose-card-name{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:4px}
.pose-card-key{font-size:11px;color:#aaa}
.check-mark{position:absolute;top:4px;right:4px;width:24px;height:24px;background:#4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:bold}
.association-summary{font-size:13px;color:#aaa}
.card-poses{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;cursor:pointer}
.card-poses.expanded{max-height:none}
.pose-badge{padding:3px 8px;background:#0a0a23;border:1px solid #444;border-radius:4px;font-size:10px;color:#7c83ff}
.pose-badge.more{cursor:pointer;background:#16213e;border-color:#7c83ff}
.pose-badge.more:hover{background:#1a2540}

/* Card Actions */
.card-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #333}
.btn-action{flex:1;padding:8px 12px;background:#16213e;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-action:hover{border-color:#7c83ff;color:#7c83ff;background:#1a2540}

/* Pose Association */
.pose-association-inline{margin-top:12px;padding-top:12px;border-top:1px solid #333}
.pose-association-inline label{display:block;font-size:11px;color:#aaa;margin-bottom:6px}
.btn-manage-poses{width:100%;padding:8px;background:#16213e;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:12px;cursor:pointer;transition:all 0.2s}
.btn-manage-poses:hover{border-color:#7c83ff;background:#1a2540}
.pose-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:800px;max-height:85vh;display:flex;flex-direction:column}
.pose-search{width:100%;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;margin-bottom:16px}
.pose-search:focus{outline:none;border-color:#7c83ff}
.selected-poses{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;min-height:32px}
.selected-pose-tag{padding:6px 12px;background:#0f3460;border:1px solid #7c83ff;border-radius:6px;font-size:12px;color:#fff;display:flex;align-items:center;gap:6px}
.selected-pose-tag button{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:0;width:16px;height:16px}
.pose-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;max-height:400px;overflow-y:auto}
.pose-item{padding:8px;background:#16213e;border:2px solid #333;border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s;overflow:hidden}
.pose-item:hover{border-color:#7c83ff;transform:translateY(-2px)}
.pose-item.selected{border-color:#4ade80;background:#1a4a2e}
.pose-item-thumb{width:100%;aspect-ratio:3/4;background:#0a0a23;border-radius:4px;margin-bottom:6px;overflow:hidden}
.pose-item-thumb img,.pose-item-thumb video{width:100%;height:100%;object-fit:cover}
.pose-item-name{font-size:12px;color:#e0e0e0;margin-top:4px}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:24px}
.page-btn{padding:8px 16px;background:#16213e;border:1px solid #333;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px;transition:all 0.2s}
.page-btn:hover:not(:disabled){border-color:#7c83ff;color:#7c83ff}
.page-btn:disabled{opacity:0.5;cursor:not-allowed}
.page-btn.active{background:#0f3460;border-color:#7c83ff;color:#fff}
.page-info{color:#aaa;font-size:13px}

.empty{text-align:center;padding:60px 20px;color:#666;font-size:16px}
.loading{text-align:center;padding:60px 20px;color:#7c83ff;font-size:16px}

/* Toolbar */
.toolbar{display:flex;justify-content:flex-end;margin-bottom:12px;gap:8px}
.btn-upload{padding:8px 18px;background:#0f3460;border:1px solid #7c83ff;border-radius:8px;color:#7c83ff;cursor:pointer;font-size:13px;transition:all 0.2s}
.btn-upload:hover{background:#1a4a80;color:#fff}

/* Upload Modal */
.upload-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:560px;display:flex;flex-direction:column}
.drop-zone{border:2px dashed #444;border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s;color:#888;font-size:14px;margin-bottom:16px}
.drop-zone.drag-over{border-color:#7c83ff;background:rgba(124,131,255,0.08);color:#7c83ff}
.drop-zone.has-file{border-color:#4ade80;background:rgba(74,222,128,0.06);color:#4ade80}
.upload-progress{margin-top:12px;display:none}
.progress-bar-wrap{background:#0a0a23;border-radius:6px;height:8px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:8px;background:#7c83ff;border-radius:6px;transition:width 0.3s;width:0%}
.upload-prompt-input{width:100%;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;resize:vertical;min-height:60px;margin-top:12px}
.upload-prompt-input:focus{outline:none;border-color:#7c83ff}

/* LORA Download Modal */
.lora-dl-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:560px;display:flex;flex-direction:column}
.lora-dl-input{width:100%;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;margin-bottom:12px}
.lora-dl-input:focus{outline:none;border-color:#7c83ff}
.lora-type-select{width:100%;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;margin-bottom:12px}
.lora-type-select:focus{outline:none;border-color:#7c83ff}
.dl-progress-wrap{margin-top:8px;display:none}
.dl-status-text{font-size:12px;color:#aaa;margin-top:6px}

/* Pose-associated badge */
.pose-assoc-badge{display:inline-block;padding:2px 7px;background:#1a3a2e;border:1px solid #4ade80;border-radius:4px;font-size:11px;color:#4ade80;margin-right:4px;margin-bottom:4px}
</style>
</head>
<body>
<div class="container">

<!-- Stats -->
<div class="stats" id="stats"></div>

<!-- Tabs -->
<div class="tabs">
<div class="tab active" data-type="all" onclick="switchType('all')">全部</div>
<div class="tab" data-type="image" onclick="switchType('image')">图片</div>
<div class="tab" data-type="video" onclick="switchType('video')">视频</div>
<div class="tab" data-type="pose_image" onclick="switchType('pose_image')">姿势图片</div>
<div class="tab" data-type="video_lora" onclick="switchType('video_lora')">视频LORA</div>
<div class="tab" data-type="image_lora" onclick="switchType('image_lora')">图片LORA</div>
<div class="tab" data-type="pose_associated" onclick="switchType('pose_associated')">姿势关联图片</div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar"></div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="upload-modal">
    <div class="modal-header">
      <h3 id="uploadModalTitle">上传文件</h3>
      <button class="modal-close" onclick="closeUploadModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div id="dropZoneText">点击或拖拽文件到此处</div>
        <input type="file" id="fileInput" style="display:none" onchange="onFileSelected(event)">
      </div>
      <textarea class="upload-prompt-input" id="uploadPrompt" placeholder="输入prompt描述（可选）"></textarea>
      <div class="upload-progress" id="uploadProgress">
        <div style="font-size:12px;color:#aaa" id="uploadProgressText">上传中...</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="uploadProgressBar"></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeUploadModal()">取消</button>
      <button class="btn-primary" id="uploadConfirmBtn" onclick="confirmUpload()">上传</button>
    </div>
  </div>
</div>

<!-- LORA Download Modal -->
<div class="modal-overlay" id="loraDownloadModal">
  <div class="lora-dl-modal">
    <div class="modal-header">
      <h3>从链接添加 LORA</h3>
      <button class="modal-close" onclick="closeLoraDownloadModal()">&times;</button>
    </div>
    <div class="modal-body">
      <label style="font-size:12px;color:#aaa;display:block;margin-bottom:6px">下载链接（支持 CivitAI 及任意直链）</label>
      <input class="lora-dl-input" id="loraDownloadUrl" type="text" placeholder="https://civitai.com/models/...">
      <label style="font-size:12px;color:#aaa;display:block;margin-bottom:6px">LORA 类型</label>
      <select class="lora-type-select" id="loraDownloadType">
        <option value="video">视频 LORA</option>
        <option value="image">图片 LORA</option>
      </select>
      <label style="font-size:12px;color:#aaa;display:block;margin-bottom:6px">自定义名称（可选，默认从链接解析）</label>
      <input class="lora-dl-input" id="loraDownloadName" type="text" placeholder="留空自动命名">
      <div class="dl-progress-wrap" id="dlProgressWrap">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="dlProgressBar"></div></div>
        <div class="dl-status-text" id="dlStatusText">准备下载...</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeLoraDownloadModal()">取消</button>
      <button class="btn-primary" id="loraDownloadBtn" onclick="startLoraDownload()">开始下载</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="edit-modal">
    <div class="modal-header">
      <h3 id="editModalTitle">编辑</h3>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body" id="editModalBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Pose Association Modal -->
<div class="modal-overlay" id="poseModal">
  <div class="pose-modal">
    <div class="modal-header">
      <h3>关联姿势</h3>
      <button class="modal-close" onclick="closePoseModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="text" class="pose-search" id="poseSearch" placeholder="搜索姿势..." onkeyup="filterPoses()">
      <div class="selected-poses" id="selectedPoses"></div>
      <div class="pose-grid" id="poseGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closePoseModal()">取消</button>
      <button class="btn-primary" onclick="savePoseSelection()">保存</button>
    </div>
  </div>
</div>

<script>
const API_KEY = 'wan22-default-key-change-me';
let currentType = 'all';
let currentPage = 1;
const pageSize = 24;
let totalPages = 1;
let stats = {};
let allPoses = [];
let currentPoseResourceId = null;
let currentPoseResourceType = null;
let selectedPoseKeys = new Set();

async function loadStats() {
  try {
    const response = await fetch('/api/v1/favorites/stats', {
      headers: { 'X-API-Key': API_KEY }
    });
    stats = await response.json();
    renderStats();
  } catch (error) {
    console.error('Failed to load stats:', error);
  }
}

function renderStats() {
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="stat-number">${stats.total || 0}</div>
      <div class="stat-label">总收藏</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${stats.image || 0}</div>
      <div class="stat-label">图片</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${stats.video || 0}</div>
      <div class="stat-label">视频</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${stats.pose_image || 0}</div>
      <div class="stat-label">姿势图片</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${stats.video_lora || 0}</div>
      <div class="stat-label">视频LORA</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${stats.image_lora || 0}</div>
      <div class="stat-label">图片LORA</div>
    </div>
  `;
}

function switchType(type) {
  currentType = type;
  currentPage = 1;

  document.querySelectorAll('.tab').forEach(t => {
    if (t.dataset.type === type) {
      t.classList.add('active');
    } else {
      t.classList.remove('active');
    }
  });

  renderToolbar();
  loadFavorites();
}

async function loadFavorites() {
  if (currentType === 'pose_associated') {
    return loadPoseAssociated();
  }

  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading">加载中...</div>';

  try {
    // Ensure poses are loaded first
    if (allPoses.length === 0) await loadAllPoses();

    const params = new URLSearchParams({
      page: currentPage,
      page_size: pageSize
    });

    if (currentType !== 'all') {
      params.append('favorite_type', currentType);
    }

    const response = await fetch(`/api/v1/favorites/all?${params}`, {
      headers: { 'X-API-Key': API_KEY }
    });

    const data = await response.json();
    totalPages = data.total_pages;

    renderFavorites(data.favorites);
    renderPagination();
  } catch (error) {
    grid.innerHTML = `<div class="empty">加载失败: ${error.message}</div>`;
  }
}

function renderFavorites(favorites) {
  const grid = document.getElementById('grid');

  if (favorites.length === 0) {
    grid.innerHTML = '<div class="empty">暂无收藏</div>';
    return;
  }

  grid.innerHTML = favorites.map(fav => createCard(fav)).join('');

  // Render pose badges for each card
  favorites.forEach(fav => {
    const poseKeys = fav.pose_keys || [];
    const poseNames = poseKeys.map(key => {
      const pose = allPoses.find(p => p.pose_key === key);
      return pose ? (pose.name_cn || pose.name_en) : key;
    });

    let containerId;
    if (fav.type === 'resource') {
      containerId = `pose-badges-${fav.resource_id}`;
    } else if (fav.type === 'pose_image') {
      const safeId = fav.resource_path.replace(/[^a-zA-Z0-9]/g, '_');
      containerId = `pose-badges-pose-${safeId}`;
    } else if (fav.type === 'video_lora' || fav.type === 'image_lora') {
      containerId = `pose-badges-lora-${fav.lora_id}`;
    }

    const container = document.getElementById(containerId);
    if (container) {
      container.dataset.poseKeys = JSON.stringify(poseKeys);
      container.dataset.poseNames = JSON.stringify(poseNames);
      if (poseNames.length > 0) {
        const badges = poseNames.slice(0, 3).map(name =>
          `<span class="pose-badge">${escapeHtml(name)}</span>`
        ).join('');
        const more = poseNames.length > 3
          ? `<span class="pose-badge more" onclick="expandPoseBadges('${containerId}')">+${poseNames.length - 3}</span>`
          : '';
        container.innerHTML = badges + more;
      }
    }
  });
}

async function loadResourcePoseBadges(resourceId) {
  try {
    const response = await fetch(`/api/v1/resources/${resourceId}/poses`, {
      headers: { 'X-API-Key': API_KEY }
    });
    const data = await response.json();
    const associations = data.associations || [];

    const container = document.getElementById(`pose-badges-${resourceId}`);
    if (container && associations.length > 0) {
      const badges = associations.slice(0, 3).map(a =>
        `<span class="pose-badge">${escapeHtml(a.pose_name)}</span>`
      ).join('');
      const more = associations.length > 3 ? `<span class="pose-badge">+${associations.length - 3}</span>` : '';
      container.innerHTML = badges + more;
    }
  } catch (error) {
    console.error('Failed to load resource pose badges:', error);
  }
}

function createCard(fav) {
  if (fav.type === 'resource') {
    return createResourceCard(fav);
  } else if (fav.type === 'pose_image') {
    return createPoseImageCard(fav);
  } else if (fav.type === 'video_lora' || fav.type === 'image_lora') {
    return createLoraCard(fav);
  }
  return '';
}

function createResourceCard(resource) {
  const isVideo = resource.resource_type === 'video' || resource.resource_type === 'generated_video';
  const mediaHtml = isVideo
    ? `<video src="${escapeHtml(resource.url)}" muted loop preload="none" onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
    : `<img src="${escapeHtml(resource.url)}" alt="Resource" loading="lazy">`;

  return `
    <div class="resource-card">
      <button class="btn-favorite" data-resource-id="${resource.resource_id}" data-favorited="true" onclick="toggleResourceFavorite(${resource.resource_id}, event)">
        <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <div class="card-badges">
        <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
      </div>
      <div class="card-media">${mediaHtml}</div>
      <div class="card-body">
        <div class="card-title">Resource #${resource.resource_id}</div>
        <div class="card-prompt">${escapeHtml(resource.prompt || '')}</div>
        <div class="card-poses" id="pose-badges-${resource.resource_id}"></div>
        <div class="card-meta">收藏于 ${formatDate(resource.created_at)}</div>
        <div class="card-poses" id="pose-badges-${resource.resource_id}"></div>
        <div class="pose-association-inline">
          <label>🎭 关联姿势</label>
          <button class="btn-manage-poses" onclick="openPoseModal(${resource.resource_id}, 'resource')">管理关联</button>
        </div>
      </div>
    </div>
  `;
}

function createPoseImageCard(poseImage) {
  const isVideo = poseImage.resource_type === 'video';
  const mediaHtml = isVideo
    ? `<video src="${escapeHtml(poseImage.url)}" muted loop preload="none" onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
    : `<img src="${escapeHtml(poseImage.url)}" alt="Pose" loading="lazy">`;

  const safeResourcePath = poseImage.resource_path.replace(/'/g, "\\'");
  const safeId = poseImage.resource_path.replace(/[^a-zA-Z0-9]/g, '_');

  return `
    <div class="resource-card">
      <button class="btn-favorite" data-resource-path="${escapeHtml(poseImage.resource_path)}" data-favorited="true" onclick="togglePoseFavorite('${safeResourcePath}', event)">
        <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <div class="card-badges">
        <span class="badge badge-pose">POSE</span>
        <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
      </div>
      <div class="card-media">${mediaHtml}</div>
      <div class="card-body">
        <div class="card-title">${escapeHtml(poseImage.pose)}</div>
        <div class="card-prompt">${escapeHtml(poseImage.filename)}</div>
        <div class="card-poses" id="pose-badges-pose-${safeId}"></div>
        <div class="card-meta">收藏于 ${formatDate(poseImage.created_at)}</div>
        <div class="card-poses" id="pose-badges-pose-${safeId}"></div>
        <div class="pose-association-inline">
          <label>🎭 关联姿势</label>
          <button class="btn-manage-poses" data-resource-path="${escapeHtml(poseImage.resource_path)}" onclick="openPoseModalByData(this, 'pose_image')">管理关联</button>
        </div>
      </div>
    </div>
  `;
}

function createLoraCard(lora) {
  const isVideo = lora.lora_type === 'video';
  const previewHtml = lora.preview_url
    ? (lora.preview_url.endsWith('.mp4')
      ? `<video src="${escapeHtml(lora.preview_url)}" muted loop preload="none" onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
      : `<img src="${escapeHtml(lora.preview_url)}" alt="LORA Preview" loading="lazy">`)
    : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">No Preview</div>`;

  const tw = Array.isArray(lora.trigger_words) ? lora.trigger_words.join(', ')
    : (typeof lora.trigger_words === 'string' ? (() => { try { return JSON.parse(lora.trigger_words).join(', '); } catch(e) { return lora.trigger_words || ''; } })()
    : '');
  const loraType = lora.lora_type === 'video' ? 'video_lora' : 'image_lora';

  return `
    <div class="resource-card">
      <div class="card-badges">
        <span class="badge badge-lora">LORA</span>
        <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
      </div>
      <div class="card-media">${previewHtml}</div>
      <div class="card-body">
        <div class="card-title">${escapeHtml(lora.name || `LORA #${lora.lora_id}`)}</div>
        <div style="margin-bottom:6px">
          <label style="font-size:11px;color:#9ca3af;display:block;margin-bottom:3px">Trigger Words</label>
          <input type="text" value="${escapeHtml(tw)}" placeholder="逗号分隔，如: titJob, paizuri"
            style="width:100%;padding:5px 7px;background:#0a0a23;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px"
            onchange="saveLoraField(${lora.lora_id}, 'trigger_words', this.value)">
        </div>
        <div style="margin-bottom:6px">
          <label style="font-size:11px;color:#9ca3af;display:block;margin-bottom:3px">Trigger Prompt</label>
          <textarea placeholder="触发提示词..."
            style="width:100%;padding:5px 7px;background:#0a0a23;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px;min-height:60px;resize:vertical;font-family:inherit"
            onchange="saveLoraField(${lora.lora_id}, 'trigger_prompt', this.value)">${escapeHtml(lora.trigger_prompt || '')}</textarea>
        </div>
        <div class="card-poses" id="pose-badges-lora-${lora.lora_id}"></div>
        <div class="pose-association-inline">
          <label>🎭 关联姿势</label>
          <button class="btn-manage-poses" onclick="openPoseModal(${lora.lora_id}, 'lora')">管理关联</button>
        </div>
      </div>
    </div>
  `;
}

function renderPagination() {
  const paginationEl = document.getElementById('pagination');

  if (totalPages <= 1) {
    paginationEl.innerHTML = '';
    return;
  }

  const prevDisabled = currentPage === 1;
  const nextDisabled = currentPage === totalPages;

  paginationEl.innerHTML = `
    <button class="page-btn" ${prevDisabled ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一页</button>
    <span class="page-info">第 ${currentPage} / ${totalPages} 页</span>
    <button class="page-btn" ${nextDisabled ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一页</button>
    <input type="number" id="jumpPage" min="1" max="${totalPages}" placeholder="跳转" style="width:60px;padding:8px;background:#16213e;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:13px;text-align:center;margin-left:8px">
    <button class="page-btn" onclick="jumpToPage()">跳转</button>
  `;
}

function jumpToPage() {
  const input = document.getElementById('jumpPage');
  const page = parseInt(input.value);
  if (page >= 1 && page <= totalPages) {
    changePage(page);
  }
}

function changePage(page) {
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  loadFavorites();
  window.scrollTo(0, 0);
}

function expandPoseBadges(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const poseNames = JSON.parse(container.dataset.poseNames || '[]');
  const badges = poseNames.map(name =>
    `<span class="pose-badge">${escapeHtml(name)}</span>`
  ).join('');
  container.innerHTML = badges;
  container.classList.add('expanded');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

let currentEditId = null;
let currentEditType = null;

function openEditModal(id, type) {
  currentEditId = id;
  currentEditType = type;

  const modal = document.getElementById('editModal');
  const title = document.getElementById('editModalTitle');
  const body = document.getElementById('editModalBody');

  if (type === 'resource') {
    title.textContent = '编辑资源';
    loadResourceEdit(id, body);
  } else if (type === 'video_lora' || type === 'image_lora') {
    title.textContent = '编辑 LORA';
    loadLoraEdit(id, body);
  }

  modal.classList.add('active');
}

async function loadResourceEdit(resourceId, container) {
  try {
    const response = await fetch(`/api/v1/resources/${resourceId}`, {
      headers: { 'X-API-Key': API_KEY }
    });
    const resource = await response.json();

    container.innerHTML = `
      <div class="edit-field">
        <label>资源信息</label>

      </div>
    `;
  } catch (error) {
    container.innerHTML = `<div style="color:#f87171">加载失败: ${error.message}</div>`;
  }
}

async function loadLoraEdit(loraId, container) {
  try {
    const response = await fetch(`/api/v1/admin/loras/${loraId}`, {
      headers: { 'X-API-Key': API_KEY }
    });
    const lora = await response.json();

    const tw = Array.isArray(lora.trigger_words) ? lora.trigger_words.join(', ') :
      (typeof lora.trigger_words === 'string' ? JSON.parse(lora.trigger_words || '[]').join(', ') : '');
    container.innerHTML = `

      </div>
    `;
  } catch (error) {
    container.innerHTML = `<div style="color:#f87171">加载失败: ${error.message}</div>`;

async function saveEdit() {
  if (!currentEditId || !currentEditType) return;

  try {
    if (currentEditType === 'resource') {
      await saveResourceEdit();
    } else if (currentEditType === 'video_lora' || currentEditType === 'image_lora') {
      await saveLoraEdit();
    }

    closeEditModal();
    await loadFavorites();
  } catch (error) {
    alert('保存失败: ' + error.message);
  }
}

async function saveResourceEdit() {
  // 资源编辑已简化，无需保存
  return;
}

async function saveLoraField(loraId, field, value) {
  const body = {};
  if (field === 'trigger_words') {
    body.trigger_words = value ? value.split(',').map(s => s.trim()).filter(s => s) : [];
  } else {
    body[field] = value;
  }
  try {
    const res = await fetch(`/api/v1/admin/loras/${loraId}`, {
      method: 'PATCH',
      headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('保存失败');
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function saveLoraEdit() {
  const triggerPrompt = document.getElementById('edit-trigger-prompt').value.trim();
  const twRaw = document.getElementById('edit-trigger-words').value.trim();
  const triggerWords = twRaw ? twRaw.split(',').map(s => s.trim()).filter(s => s) : [];

  const response = await fetch(`/api/v1/admin/loras/${currentEditId}`, {
    method: 'PATCH',
    headers: {
      'X-API-Key': API_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      trigger_prompt: triggerPrompt,
      trigger_words: triggerWords
    })
  });

  if (!response.ok) throw new Error('保存失败');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  currentEditId = null;
  currentEditType = null;
}

async function openPoseModal(id, type) {
  currentPoseResourceId = id;
  currentPoseResourceType = type;

  if (allPoses.length === 0) await loadAllPoses();

  // Load thumbnails if not already loaded
  if (allPoses.length > 0 && !allPoses[0].hasOwnProperty('thumbnail')) {
    loadPoseThumbnails(); // Load in background
  }

  // Get pose_keys from the card's data attribute
  let poseKeys = [];
  if (type === 'resource') {
    const container = document.getElementById(`pose-badges-${id}`);
    poseKeys = container ? JSON.parse(container.dataset.poseKeys || '[]') : [];
  } else if (type === 'lora') {
    const container = document.getElementById(`pose-badges-lora-${id}`);
    poseKeys = container ? JSON.parse(container.dataset.poseKeys || '[]') : [];
  }

  selectedPoseKeys = new Set(poseKeys);
  renderPoseGrid();
  renderSelectedPoses();
  document.getElementById('poseModal').classList.add('active');
}

async function openPoseModalByData(btn, type) {
  currentPoseResourceId = btn.dataset.resourcePath;
  currentPoseResourceType = type;

  if (allPoses.length === 0) await loadAllPoses();

  // Load thumbnails if not already loaded
  if (allPoses.length > 0 && !allPoses[0].hasOwnProperty('thumbnail')) {
    loadPoseThumbnails(); // Load in background
  }

  const safeId = currentPoseResourceId.replace(/[^a-zA-Z0-9]/g, '_');
  const container = document.getElementById(`pose-badges-pose-${safeId}`);
  const poseKeys = container ? JSON.parse(container.dataset.poseKeys || '[]') : [];

  selectedPoseKeys = new Set(poseKeys);
  renderPoseGrid();
  renderSelectedPoses();
  document.getElementById('poseModal').classList.add('active');
}

function renderPoseGrid() {
  const grid = document.getElementById('poseGrid');
  const search = document.getElementById('poseSearch').value.toLowerCase();

  const filtered = allPoses.filter(p =>
    !search || p.pose_key.toLowerCase().includes(search) ||
    (p.name_cn && p.name_cn.toLowerCase().includes(search)) ||
    (p.name_en && p.name_en.toLowerCase().includes(search))
  );

  grid.innerHTML = filtered.map(pose => {
    const thumbHtml = pose.thumbnail
      ? (pose.thumbnail.endsWith('.mp4') || pose.thumbnail.endsWith('.webm')
        ? `<video src="${escapeHtml(pose.thumbnail)}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
        : `<img src="${escapeHtml(pose.thumbnail)}" alt="${escapeHtml(pose.name_cn || pose.name_en)}">`)
      : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:32px;">🎭</div>`;

    return `
      <div class="pose-item ${selectedPoseKeys.has(pose.pose_key) ? 'selected' : ''}" onclick="togglePose('${pose.pose_key}')">
        <div class="pose-item-thumb">${thumbHtml}</div>
        <div class="pose-item-name">${escapeHtml(pose.name_cn || pose.name_en)}</div>
      </div>
    `;
  }).join('');
}

function renderSelectedPoses() {
  const container = document.getElementById('selectedPoses');
  const selected = allPoses.filter(p => selectedPoseKeys.has(p.pose_key));

  container.innerHTML = selected.map(pose => `
    <div class="selected-pose-tag">
      ${escapeHtml(pose.name_cn || pose.name_en)}
      <button onclick="togglePose('${pose.pose_key}')">&times;</button>
    </div>
  `).join('') || '<span style="color:#666;font-size:12px">未选择姿势</span>';
}

function togglePose(poseKey) {
  if (selectedPoseKeys.has(poseKey)) {
    selectedPoseKeys.delete(poseKey);
  } else {
    selectedPoseKeys.add(poseKey);
  }
  renderPoseGrid();
  renderSelectedPoses();
}

function filterPoses() {
  renderPoseGrid();
}

async function savePoseSelection() {
  const poses = Array.from(selectedPoseKeys);

  try {
    let response;
    if (currentPoseResourceType === 'resource') {
      response = await fetch(`/api/v1/resources/${currentPoseResourceId}/poses`, {
        method: 'PUT',
        headers: {'X-API-Key': API_KEY, 'Content-Type': 'application/json'},
        body: JSON.stringify({pose_keys: poses})
      });
    } else if (currentPoseResourceType === 'lora') {
      response = await fetch(`/api/v1/admin/loras/${currentPoseResourceId}/poses`, {
        method: 'PUT',
        headers: {'X-API-Key': API_KEY, 'Content-Type': 'application/json'},
        body: JSON.stringify({pose_keys: poses})
      });
    } else if (currentPoseResourceType === 'pose_image') {
      response = await fetch(`/api/v1/pose-images/associations`, {
        method: 'PUT',
        headers: {'X-API-Key': API_KEY, 'Content-Type': 'application/json'},
        body: JSON.stringify({resource_path: currentPoseResourceId, pose_keys: poses})
      });
    }

    if (!response.ok) throw new Error('保存失败');

    // Update local badge display
    let containerId;
    if (currentPoseResourceType === 'resource') {
      containerId = `pose-badges-${currentPoseResourceId}`;
    } else if (currentPoseResourceType === 'lora') {
      containerId = `pose-badges-lora-${currentPoseResourceId}`;
    } else if (currentPoseResourceType === 'pose_image') {
      const safeId = currentPoseResourceId.replace(/[^a-zA-Z0-9]/g, '_');
      containerId = `pose-badges-pose-${safeId}`;
    }

    const container = document.getElementById(containerId);
    if (container) {
      container.dataset.poseKeys = JSON.stringify(poses);
      const poseNames = poses.map(key => {
        const pose = allPoses.find(p => p.pose_key === key);
        return pose ? (pose.name_cn || pose.name_en) : key;
      });
      if (poseNames.length > 0) {
        const badges = poseNames.slice(0, 3).map(name =>
          `<span class="pose-badge">${escapeHtml(name)}</span>`
        ).join('');
        const more = poseNames.length > 3 ? `<span class="pose-badge">+${poseNames.length - 3}</span>` : '';
        container.innerHTML = badges + more;
      } else {
        container.innerHTML = '';
      }
    }

    closePoseModal();
  } catch (error) {
    alert('保存失败: ' + error.message);
  }
}

function closePoseModal() {
  document.getElementById('poseModal').classList.remove('active');
  currentPoseResourceId = null;
  currentPoseResourceType = null;
  selectedPoseKeys.clear();
}

async function loadAllPoses() {
  try {
    const response = await fetch('/api/v1/poses', {headers: {'X-API-Key': API_KEY}});
    const data = await response.json();
    allPoses = data.poses || [];
  } catch (error) {
    console.error('Failed to load poses:', error);
  }
}

async function loadPoseThumbnails() {
  for (const pose of allPoses) {
    try {
      const res = await fetch(`/api/v1/poses/${pose.pose_key}/thumbnail`, {headers: {'X-API-Key': API_KEY}});
      if (res.ok) {
        const thumbData = await res.json();
        pose.thumbnail = thumbData.url;
      }
    } catch (e) {
      // No thumbnail available
    }
  }
}

async function loadResourceAssociations(resourceId) {
  try {
    const response = await fetch(`/api/v1/resources/${resourceId}/poses`, {
      headers: { 'X-API-Key': API_KEY }

}

async function savePoseAssociationInlineByData(btn, type) {
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    const resourcePath = btn.dataset.resourcePath;
    const safeId = resourcePath.replace(/[^a-zA-Z0-9]/g, '_');
    const select = document.getElementById(`pose-select-pose-${safeId}`);

    if (!select) throw new Error('Select not found');

    const poses = Array.from(select.selectedOptions).map(opt => opt.value);

    const response = await fetch(`/api/v1/pose-images/associations`, {
      method: 'PUT',
      headers: {
        'X-API-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        resource_path: resourcePath,
        pose_keys: poses
      })
    });

    if (!response.ok) throw new Error('保存失败');

    btn.textContent = '✓ 已保存';
    setTimeout(() => {
      btn.textContent = '保存关联';
      btn.disabled = false;
    }, 2000);

    await loadFavorites();
  } catch (error) {
    alert('保存失败: ' + error.message);
    btn.textContent = '保存关联';
    btn.disabled = false;
  }
}

async function loadPoseThumbnails() {
  for (const pose of allPoses) {
    try {
      const res = await fetch(`/api/v1/poses/${pose.pose_key}/thumbnail`, {headers: {'X-API-Key': API_KEY}});
      if (res.ok) {
        const thumbData = await res.json();
        pose.thumbnail = thumbData.url;
      }
    } catch (e) {
      // No thumbnail available
    }
  }
}

// ─── Toolbar ──────────────────────────────────────────────────────
function renderToolbar() {
  const tb = document.getElementById('toolbar');
  if (!tb) return;
  if (currentType === 'image' || currentType === 'video') {
    tb.innerHTML = `<button class="btn-upload" onclick="openUploadModal('${currentType}')">+ 上传${currentType === 'image' ? '图片' : '视频'}</button>`;
  } else if (currentType === 'video_lora' || currentType === 'image_lora') {
    const lt = currentType === 'video_lora' ? 'video' : 'image';
    tb.innerHTML = `<button class="btn-upload" onclick="openLoraDownloadModal('${lt}')">+ 从链接添加 LORA</button>`;
  } else {
    tb.innerHTML = '';
  }
}

// ─── Upload Modal ─────────────────────────────────────────────────
let _uploadResourceType = 'image';
let _selectedFile = null;

function openUploadModal(resourceType) {
  _uploadResourceType = resourceType;
  _selectedFile = null;
  document.getElementById('uploadModalTitle').textContent = resourceType === 'image' ? '上传图片' : '上传视频';
  const accept = resourceType === 'image' ? '.jpg,.jpeg,.png,.webp,.gif' : '.mp4,.webm,.mov';
  document.getElementById('fileInput').accept = accept;
  document.getElementById('fileInput').value = '';
  document.getElementById('dropZoneText').textContent = '点击或拖拽文件到此处';
  document.getElementById('dropZone').className = 'drop-zone';
  document.getElementById('uploadPrompt').value = '';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('uploadProgressBar').style.width = '0%';
  document.getElementById('uploadConfirmBtn').disabled = false;
  document.getElementById('uploadModal').classList.add('active');
  setupDropZone();
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('active');
  _selectedFile = null;
}

function setupDropZone() {
  const dz = document.getElementById('dropZone');
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setSelectedFile(f);
  };
}

function onFileSelected(event) {
  const f = event.target.files[0];
  if (f) setSelectedFile(f);
}

function setSelectedFile(f) {
  _selectedFile = f;
  const dz = document.getElementById('dropZone');
  dz.classList.add('has-file');
  document.getElementById('dropZoneText').textContent = `已选择: ${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`;
}

async function confirmUpload() {
  if (!_selectedFile) { alert('请先选择文件'); return; }
  const btn = document.getElementById('uploadConfirmBtn');
  btn.disabled = true;
  const progress = document.getElementById('uploadProgress');
  const bar = document.getElementById('uploadProgressBar');
  const text = document.getElementById('uploadProgressText');
  progress.style.display = 'block';
  text.textContent = '上传中...';
  bar.style.width = '10%';

  try {
    const formData = new FormData();
    formData.append('file', _selectedFile);
    formData.append('resource_type', _uploadResourceType);
    const prompt = document.getElementById('uploadPrompt').value.trim();
    if (prompt) formData.append('prompt', prompt);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/v1/resources/upload');
    xhr.setRequestHeader('X-API-Key', API_KEY);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) bar.style.width = Math.round(e.loaded / e.total * 90) + '%';
    };
    await new Promise((resolve, reject) => {
      xhr.onload = () => xhr.status < 300 ? resolve(JSON.parse(xhr.responseText)) : reject(new Error(xhr.responseText));
      xhr.onerror = () => reject(new Error('网络错误'));
      xhr.send(formData);
    });
    bar.style.width = '100%';
    text.textContent = '上传成功！';
    setTimeout(() => {
      closeUploadModal();
      loadStats();
      loadFavorites();
    }, 800);
  } catch (e) {
    text.textContent = '上传失败: ' + e.message;
    bar.style.width = '0%';
    btn.disabled = false;
  }
}

// ─── LORA Download Modal ──────────────────────────────────────────
let _loraDownloadTaskId = null;
let _loraDownloadTimer = null;

function openLoraDownloadModal(loraType) {
  document.getElementById('loraDownloadUrl').value = '';
  document.getElementById('loraDownloadName').value = '';
  document.getElementById('loraDownloadType').value = loraType;
  document.getElementById('dlProgressWrap').style.display = 'none';
  document.getElementById('dlProgressBar').style.width = '0%';
  document.getElementById('dlStatusText').textContent = '准备下载...';
  document.getElementById('loraDownloadBtn').disabled = false;
  document.getElementById('loraDownloadBtn').textContent = '开始下载';
  document.getElementById('loraDownloadModal').classList.add('active');
  _loraDownloadTaskId = null;
  if (_loraDownloadTimer) clearInterval(_loraDownloadTimer);
}

function closeLoraDownloadModal() {
  document.getElementById('loraDownloadModal').classList.remove('active');
  if (_loraDownloadTimer) clearInterval(_loraDownloadTimer);
  _loraDownloadTimer = null;
  _loraDownloadTaskId = null;
}

async function startLoraDownload() {
  const url = document.getElementById('loraDownloadUrl').value.trim();
  if (!url) { alert('请输入下载链接'); return; }
  const loraType = document.getElementById('loraDownloadType').value;
  const name = document.getElementById('loraDownloadName').value.trim() || null;

  const btn = document.getElementById('loraDownloadBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';
  document.getElementById('dlProgressWrap').style.display = 'block';
  document.getElementById('dlStatusText').textContent = '正在提交下载任务...';

  try {
    const resp = await fetch('/api/v1/loras/download-url', {
      method: 'POST',
      headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, lora_type: loraType, name })
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    _loraDownloadTaskId = data.task_id;
    btn.textContent = '下载中...';
    _loraDownloadTimer = setInterval(pollLoraDownload, 1500);
  } catch (e) {
    document.getElementById('dlStatusText').textContent = '提交失败: ' + e.message;
    btn.disabled = false;
    btn.textContent = '重试';
  }
}

async function pollLoraDownload() {
  if (!_loraDownloadTaskId) return;
  try {
    const resp = await fetch(`/api/v1/loras/download-url/${_loraDownloadTaskId}`, {
      headers: { 'X-API-Key': API_KEY }
    });
    if (!resp.ok) return;
    const task = await resp.json();
    const bar = document.getElementById('dlProgressBar');
    const statusText = document.getElementById('dlStatusText');

    if (task.progress >= 0) {
      bar.style.width = task.progress + '%';
    } else {
      // Unknown size — animate
      const cur = parseFloat(bar.style.width) || 0;
      bar.style.width = Math.min(cur + 2, 90) + '%';
    }

    const mb = task.downloaded ? (task.downloaded / 1024 / 1024).toFixed(1) : '0';
    const total = task.total_size ? (task.total_size / 1024 / 1024).toFixed(1) : '?';
    const fname = task.filename ? task.filename : '';
    statusText.textContent = task.status === 'done'
      ? `下载完成: ${fname}`
      : task.status === 'error'
      ? `下载失败: ${task.error}`
      : `${fname ? fname + ' — ' : ''}${mb} / ${total} MB`;

    if (task.status === 'done') {
      clearInterval(_loraDownloadTimer);
      _loraDownloadTimer = null;
      bar.style.width = '100%';
      document.getElementById('loraDownloadBtn').textContent = '完成';
      loadStats();
      setTimeout(() => { closeLoraDownloadModal(); loadFavorites(); }, 2000);
    } else if (task.status === 'error') {
      clearInterval(_loraDownloadTimer);
      _loraDownloadTimer = null;
      document.getElementById('loraDownloadBtn').disabled = false;
      document.getElementById('loraDownloadBtn').textContent = '重试';
    }
  } catch (e) {
    console.error('Poll error:', e);
  }
}

// ─── Pose-Associated Tab ──────────────────────────────────────────
async function loadPoseAssociated() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
    const resp = await fetch(`/api/v1/favorites/pose-associated?${params}`, {
      headers: { 'X-API-Key': API_KEY }
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    totalPages = data.total_pages;
    renderPoseAssociated(data.items);
    renderPagination();
  } catch (e) {
    grid.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function renderPoseAssociated(items) {
  const grid = document.getElementById('grid');
  if (!items.length) { grid.innerHTML = '<div class="empty">暂无关联姿势的图片</div>'; return; }
  grid.innerHTML = items.map(item => {
    const isVideo = item.resource_type === 'video';
    const poseNameBadges = (item.pose_names || []).map(n =>
      `<span class="pose-assoc-badge">${escapeHtml(n)}</span>`
    ).join('');
    const media = isVideo
      ? `<video src="${item.url}" muted playsinline preload="none" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px 8px 0 0" onmouseover="this.play()" onmouseout="this.pause()"></video>`
      : `<img src="${item.url}" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px 8px 0 0" loading="lazy">`;
    return `<div class="resource-card">
      ${media}
      <div style="padding:12px">
        <div style="font-size:11px;color:#aaa;margin-bottom:6px;word-break:break-all">${escapeHtml(item.url.split('/').pop())}</div>
        <div>${poseNameBadges}</div>
      </div>
    </div>`;
  }).join('');
}
