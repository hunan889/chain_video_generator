<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Workflow 分阶段测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{color:#7c83ff;margin-bottom:30px;text-align:center}
.stage-section{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.stage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.stage-title{color:#7c83ff;font-size:1.2em;font-weight:600}
.stage-status{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.status-idle{background:#333;color:#888}
.status-running{background:#0f3460;color:#7c83ff}
.status-success{background:#1a4a2e;color:#4ade80}
.status-error{background:#4a1a1a;color:#f87171}
.field{margin-bottom:12px}
.field label{display:block;margin-bottom:4px;font-size:13px;color:#aaa}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#7c83ff}
.field input[type=checkbox]{width:auto;margin-right:8px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:200px}
.btn{padding:10px 24px;background:#7c83ff;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#5a62e0}
.btn:disabled{background:#444;cursor:not-allowed}
.btn-secondary{background:#333}
.btn-secondary:hover{background:#444}
.result-box{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:12px;margin-top:12px;display:none}
.result-box.active{display:block}
.result-box pre{color:#4ade80;font-size:12px;white-space:pre-wrap;word-wrap:break-word}
.result-box.error pre{color:#f87171}
.hint{font-size:11px;color:#666;margin-top:4px}
.collapsible{cursor:pointer;user-select:none}
.collapsible-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease-out}
.collapsible-content.active{max-height:2000px;overflow-y:auto}
</style>
</head>
<body>
<div class="container">
<h1>🧪 Advanced Workflow 分阶段测试</h1>

<!-- Stage 1 -->
<div class="stage-section">
<div class="stage-header">
<div class="stage-title">📝 Stage 1: Prompt 分析</div>
<span class="stage-status status-idle" id="s1-status">未运行</span>
</div>
<div class="field">
<label>用户 Prompt</label>
<textarea id="s1-prompt" placeholder="输入测试 prompt...">一个美丽的女孩在海边散步</textarea>
</div>
<div class="row">
<div class="field">
<label><input type="checkbox" id="s1-auto-analyze" checked> 启用分析</label>
</div>
<div class="field">
<label><input type="checkbox" id="s1-auto-lora" checked> 启用 LoRA 推荐</label>
</div>
<div class="field">
<label><input type="checkbox" id="s1-auto-prompt" checked> 启用 Prompt 优化</label>
</div>
</div>
<div class="row">
<div class="field">
<label>Image LoRA Top K</label>
<input type="number" id="s1-top-k-image" value="5" min="1" max="20">
</div>
<div class="field">
<label>Video LoRA Top K</label>
<input type="number" id="s1-top-k-video" value="5" min="1" max="20">
</div>
</div>
<button class="btn" onclick="testStage1()">运行 Stage 1</button>
<button class="btn btn-secondary" onclick="copyToStage2()">复制结果到 Stage 2</button>
<div class="result-box" id="s1-result"></div>
</div>

<!-- Stage 2 -->
<div class="stage-section">
<div class="stage-header">
<div class="stage-title">🖼️ Stage 2: 首帧获取</div>
<span class="stage-status status-idle" id="s2-status">未运行</span>
</div>
<div class="row">
<div class="field">
<label>模式</label>
<select id="s2-mode" onchange="updateStage2Fields()">
<option value="first_frame">首帧（用户上传）</option>
<option value="face_reference">仅换脸</option>
<option value="full_body_reference">全身参考</option>
</select>
</div>
<div class="field">
<label>分辨率</label>
<select id="s2-resolution">
<option value="480p">480p</option>
<option value="720p" selected>720p</option>
<option value="1080p">1080p</option>
</select>
</div>
<div class="field">
<label>宽高比</label>
<select id="s2-aspect-ratio">
<option value="16:9" selected>16:9</option>
<option value="9:16">9:16</option>
<option value="3:4">3:4</option>
<option value="4:3">4:3</option>
</select>
</div>
</div>
<div class="field" id="s2-uploaded-field">
<label>上传首帧 URL</label>
<input type="text" id="s2-uploaded" placeholder="http://...">
<div class="hint">mode=first_frame 时必需</div>
</div>
<div class="field" id="s2-reference-field" style="display:none">
<label>参考图片 URL</label>
<input type="text" id="s2-reference" placeholder="http://...">
<div class="hint">mode=face_reference 或 full_body_reference 时必需</div>
</div>
<div id="s2-generation-fields" style="display:none">
<div class="row">
<div class="field">
<label>首帧来源</label>
<select id="s2-source">
<option value="select_existing" selected>选择已有图片</option>
<option value="generate">T2I 生成</option>
</select>
</div>
</div>
<div class="field">
<label>T2I Prompt</label>
<textarea id="s2-t2i-prompt" placeholder="从 Stage 1 复制或手动输入..."></textarea>
</div>
<div class="row">
<div class="field">
<label>T2I Steps</label>
<input type="number" id="s2-t2i-steps" value="20" min="10" max="50">
</div>
<div class="field">
<label>T2I CFG</label>
<input type="number" id="s2-t2i-cfg" value="7.0" min="1" max="20" step="0.5">
</div>
<div class="field">
<label>T2I Sampler</label>
<select id="s2-t2i-sampler">
<option value="DPM++ 2M Karras" selected>DPM++ 2M Karras</option>
<option value="Euler">Euler</option>
<option value="Euler a">Euler a</option>
</select>
</div>
</div>
<div class="row">
<div class="field">
<label><input type="checkbox" id="s2-face-swap"> 启用首帧换脸</label>
</div>
<div class="field">
<label>换脸强度</label>
<input type="number" id="s2-face-swap-strength" value="1.0" min="0" max="1" step="0.1">
</div>
</div>
</div>
<button class="btn" onclick="testStage2()">运行 Stage 2</button>
<button class="btn btn-secondary" onclick="copyToStage3()">复制结果到 Stage 3</button>
<div class="result-box" id="s2-result"></div>
</div>

<!-- Stage 3 -->
<div class="stage-section">
<div class="stage-header">
<div class="stage-title">✨ Stage 3: SeeDream 编辑</div>
<span class="stage-status status-idle" id="s3-status">未运行</span>
</div>
<div class="row">
<div class="field">
<label>模式</label>
<select id="s3-mode">
<option value="first_frame">首帧（跳过 Stage 3）</option>
<option value="face_reference" selected>仅换脸</option>
<option value="full_body_reference">全身参考</option>
</select>
</div>
<div class="field">
<label><input type="checkbox" id="s3-enabled" checked> 启用 SeeDream</label>
</div>
</div>
<div class="field">
<label>首帧 URL（来自 Stage 2）</label>
<input type="text" id="s3-first-frame" placeholder="http://...">
</div>
<div class="field">
<label>参考图片 URL</label>
<input type="text" id="s3-reference" placeholder="http://...">
</div>
<div class="row">
<div class="field">
<label>编辑模式</label>
<select id="s3-edit-mode">
<option value="face_only">仅面部</option>
<option value="face_wearings" selected>面部+配饰</option>
<option value="full_body">全身</option>
</select>
</div>
<div class="field">
<label><input type="checkbox" id="s3-reactor" checked> 编辑前 Reactor 换脸</label>
</div>
</div>
<div class="field">
<label>SeeDream Prompt（可选）</label>
<textarea id="s3-prompt" placeholder="留空使用默认..."></textarea>
</div>
<div class="row">
<div class="field">
<label>编辑强度</label>
<input type="number" id="s3-strength" value="0.8" min="0" max="1" step="0.1">
</div>
<div class="field">
<label>随机种子</label>
<input type="number" id="s3-seed" placeholder="留空表示随机">
</div>
</div>
<button class="btn" onclick="testStage3()">运行 Stage 3</button>
<button class="btn btn-secondary" onclick="copyToStage4()">复制结果到 Stage 4</button>
<div class="result-box" id="s3-result"></div>
</div>

<!-- Stage 4 -->
<div class="stage-section">
<div class="stage-header">
<div class="stage-title">🎬 Stage 4: 视频生成</div>
<span class="stage-status status-idle" id="s4-status">未运行</span>
</div>
<div class="field">
<label>首帧 URL（来自 Stage 2 或 Stage 3）</label>
<input type="text" id="s4-first-frame" placeholder="http://...">
</div>
<div class="field">
<label>I2V Prompt</label>
<textarea id="s4-prompt" placeholder="从 Stage 1 复制或手动输入..."></textarea>
</div>
<div class="row">
<div class="field">
<label>模式</label>
<select id="s4-mode">
<option value="first_frame">首帧</option>
<option value="face_reference" selected>仅换脸</option>
<option value="full_body_reference">全身参考</option>
</select>
</div>
<div class="field">
<label>时长（秒）</label>
<select id="s4-duration">
<option value="5">5秒</option>
<option value="10" selected>10秒</option>
<option value="15">15秒</option>
</select>
</div>
<div class="field">
<label>分辨率</label>
<select id="s4-resolution">
<option value="480p">480p</option>
<option value="720p" selected>720p</option>
<option value="1080p">1080p</option>
</select>
</div>
<div class="field">
<label>宽高比</label>
<select id="s4-aspect-ratio">
<option value="16:9" selected>16:9</option>
<option value="9:16">9:16</option>
<option value="3:4">3:4</option>
<option value="4:3">4:3</option>
</select>
</div>
</div>
<div class="row">
<div class="field">
<label>模型</label>
<select id="s4-model">
<option value="A14B" selected>A14B</option>
<option value="5B">5B</option>
</select>
</div>
<div class="field">
<label>Steps</label>
<input type="number" id="s4-steps" value="20" min="10" max="50">
</div>
<div class="field">
<label>CFG</label>
<input type="number" id="s4-cfg" value="6.0" min="1" max="20" step="0.5">
</div>
<div class="field">
<label>Shift</label>
<input type="number" id="s4-shift" value="5.0" min="0" max="10" step="0.5">
</div>
</div>
<button class="btn" onclick="testStage4()">运行 Stage 4</button>
<div class="result-box" id="s4-result"></div>
</div>

</div>

<script>
const API_KEY = 'wan22-default-key-change-me';

function updateStage2Fields() {
    const mode = document.getElementById('s2-mode').value;
    const uploadedField = document.getElementById('s2-uploaded-field');
    const referenceField = document.getElementById('s2-reference-field');
    const generationFields = document.getElementById('s2-generation-fields');

    if (mode === 'first_frame') {
        uploadedField.style.display = 'block';
        referenceField.style.display = 'none';
        generationFields.style.display = 'none';
    } else {
        uploadedField.style.display = 'none';
        referenceField.style.display = 'block';
        generationFields.style.display = 'block';
    }
}

function setStatus(stage, status, message = '') {
    const statusEl = document.getElementById(`s${stage}-status`);
    statusEl.className = `stage-status status-${status}`;
    const statusText = {
        idle: '未运行',
        running: '运行中...',
        success: '✅ 成功',
        error: '❌ 失败'
    };
    statusEl.textContent = message || statusText[status];
}

function showResult(stage, data, isError = false) {
    const resultBox = document.getElementById(`s${stage}-result`);
    resultBox.className = `result-box active ${isError ? 'error' : ''}`;
    resultBox.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
}

async function testStage1() {
    setStatus(1, 'running');
    try {
        const response = await fetch('/api/v1/workflow/test/stage1', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': API_KEY
            },
            body: JSON.stringify({
                user_prompt: document.getElementById('s1-prompt').value,
                auto_analyze: document.getElementById('s1-auto-analyze').checked,
                auto_lora: document.getElementById('s1-auto-lora').checked,
                auto_prompt: document.getElementById('s1-auto-prompt').checked,
                top_k_image_loras: parseInt(document.getElementById('s1-top-k-image').value),
                top_k_video_loras: parseInt(document.getElementById('s1-top-k-video').value)
            })
        });

        const result = await response.json();
        if (result.success) {
            setStatus(1, 'success');
            showResult(1, result);
        } else {
            setStatus(1, 'error');
            showResult(1, result, true);
        }
    } catch (error) {
        setStatus(1, 'error');
        showResult(1, { error: error.message }, true);
    }
}

async function testStage2() {
    setStatus(2, 'running');
    try {
        const mode = document.getElementById('s2-mode').value;
        const payload = {
            mode: mode,
            resolution: document.getElementById('s2-resolution').value,
            aspect_ratio: document.getElementById('s2-aspect-ratio').value,
            first_frame_source: document.getElementById('s2-source').value,
            t2i_prompt: document.getElementById('s2-t2i-prompt').value,
            t2i_steps: parseInt(document.getElementById('s2-t2i-steps').value),
            t2i_cfg: parseFloat(document.getElementById('s2-t2i-cfg').value),
            t2i_sampler: document.getElementById('s2-t2i-sampler').value,
            face_swap_enabled: document.getElementById('s2-face-swap').checked,
            face_swap_strength: parseFloat(document.getElementById('s2-face-swap-strength').value)
        };

        if (mode === 'first_frame') {
            payload.uploaded_first_frame = document.getElementById('s2-uploaded').value;
        } else {
            payload.reference_image = document.getElementById('s2-reference').value;
        }

        const response = await fetch('/api/v1/workflow/test/stage2', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': API_KEY
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (result.success) {
            setStatus(2, 'success');
            showResult(2, result);
        } else {
            setStatus(2, 'error');
            showResult(2, result, true);
        }
    } catch (error) {
        setStatus(2, 'error');
        showResult(2, { error: error.message }, true);
    }
}

async function testStage3() {
    setStatus(3, 'running');
    try {
        const response = await fetch('/api/v1/workflow/test/stage3', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': API_KEY
            },
            body: JSON.stringify({
                mode: document.getElementById('s3-mode').value,
                first_frame_url: document.getElementById('s3-first-frame').value,
                reference_image: document.getElementById('s3-reference').value,
                enabled: document.getElementById('s3-enabled').checked,
                edit_mode: document.getElementById('s3-edit-mode').value,
                prompt: document.getElementById('s3-prompt').value || null,
                enable_reactor: document.getElementById('s3-reactor').checked,
                strength: parseFloat(document.getElementById('s3-strength').value),
                seed: document.getElementById('s3-seed').value ? parseInt(document.getElementById('s3-seed').value) : null
            })
        });

        const result = await response.json();
        if (result.success) {
            setStatus(3, 'success');
            showResult(3, result);
        } else {
            setStatus(3, 'error');
            showResult(3, result, true);
        }
    } catch (error) {
        setStatus(3, 'error');
        showResult(3, { error: error.message }, true);
    }
}

async function testStage4() {
    setStatus(4, 'running');
    try {
        const response = await fetch('/api/v1/workflow/test/stage4', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': API_KEY
            },
            body: JSON.stringify({
                mode: document.getElementById('s4-mode').value,
                first_frame_url: document.getElementById('s4-first-frame').value,
                prompt: document.getElementById('s4-prompt').value,
                duration: parseInt(document.getElementById('s4-duration').value),
                resolution: document.getElementById('s4-resolution').value,
                aspect_ratio: document.getElementById('s4-aspect-ratio').value,
                model: document.getElementById('s4-model').value,
                steps: parseInt(document.getElementById('s4-steps').value),
                cfg: parseFloat(document.getElementById('s4-cfg').value),
                shift: parseFloat(document.getElementById('s4-shift').value)
            })
        });

        const result = await response.json();
        if (result.success) {
            setStatus(4, 'success');
            showResult(4, result);
        } else {
            setStatus(4, 'error');
            showResult(4, result, true);
        }
    } catch (error) {
        setStatus(4, 'error');
        showResult(4, { error: error.message }, true);
    }
}

function copyToStage2() {
    try {
        const resultBox = document.getElementById('s1-result');
        const data = JSON.parse(resultBox.querySelector('pre').textContent);
        if (data.optimized_t2i_prompt) {
            document.getElementById('s2-t2i-prompt').value = data.optimized_t2i_prompt;
        }
    } catch (e) {
        alert('无法复制结果：' + e.message);
    }
}

function copyToStage3() {
    try {
        const resultBox = document.getElementById('s2-result');
        const data = JSON.parse(resultBox.querySelector('pre').textContent);
        if (data.first_frame_url) {
            document.getElementById('s3-first-frame').value = data.first_frame_url;
        }
    } catch (e) {
        alert('无法复制结果：' + e.message);
    }
}

function copyToStage4() {
    try {
        const s1Result = document.getElementById('s1-result');
        const s1Data = JSON.parse(s1Result.querySelector('pre').textContent);
        if (s1Data.optimized_i2v_prompt) {
            document.getElementById('s4-prompt').value = s1Data.optimized_i2v_prompt;
        }

        const s3Result = document.getElementById('s3-result');
        const s3Data = JSON.parse(s3Result.querySelector('pre').textContent);
        if (s3Data.edited_frame_url) {
            document.getElementById('s4-first-frame').value = s3Data.edited_frame_url;
        } else if (s3Data.skipped) {
            const s2Result = document.getElementById('s2-result');
            const s2Data = JSON.parse(s2Result.querySelector('pre').textContent);
            if (s2Data.first_frame_url) {
                document.getElementById('s4-first-frame').value = s2Data.first_frame_url;
            }
        }
    } catch (e) {
        alert('无法复制结果：' + e.message);
    }
}

// Initialize
updateStage2Fields();
</script>
</body>
</html>
