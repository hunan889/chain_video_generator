<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>
<link rel="stylesheet" href="/static/css/common.css">
</head>
<body>
<div class="container">
<h1>AI Studio</h1>
<div class="api-key-bar">
<label>API Key:</label>
<input type="password" id="apiKey" value="wan22-default-key-change-me" placeholder="Enter API Key" onchange="localStorage.setItem('wan22_api_key', this.value)">
</div>

<!-- Main Navigation -->
<div class="main-tabs">
<div class="main-tab active" data-main="video">视频生成</div>
<div class="main-tab" data-main="image">图片生成</div>
<div class="main-tab" data-main="workflow">高级工作流</div>
<div class="main-tab" data-main="wf-history">Workflow 历史</div>
<div class="main-tab" data-main="favorites">我的收藏</div>
<div class="main-tab" data-main="annotate">资源管理</div>
<div class="main-tab" data-main="poses">姿势管理</div>
</div>

<!-- Dynamic Module Content (video/image/chat loaded here) -->
<div id="module-content"></div>

<!-- Iframe Sections (lazy-loaded on tab click) -->
<div class="main-section" id="section-workflow">
<iframe id="iframe-workflow" style="width:100%;height:calc(100vh - 200px);border:none;border-radius:8px;"></iframe>
</div>

<div class="main-section" id="section-wf-history">
<iframe id="iframe-wf-history" style="width:100%;height:calc(100vh - 200px);border:none;border-radius:8px;"></iframe>
</div>

<div class="main-section" id="section-favorites">
<iframe id="iframe-favorites" style="width:100%;height:calc(100vh - 200px);border:none;border-radius:8px;background:#0a0a23"></iframe>
</div>

<div class="main-section" id="section-annotate">
<iframe id="iframe-annotate" style="width:100%;height:calc(100vh - 180px);border:none;border-radius:8px"></iframe>
</div>

<div class="main-section" id="section-poses">
<div class="tabs">
<div class="tab active" data-posetab="pose-manager">姿势管理</div>
<div class="tab" data-posetab="pose-recommend">推荐测试</div>
<div class="tab" data-posetab="pose-synonyms">同义词配置</div>
</div>
<div class="panel active" id="panel-pose-manager">
<iframe id="iframe-pose-manager" style="width:100%;height:calc(100vh - 240px);border:none;border-radius:8px"></iframe>
</div>
<div class="panel" id="panel-pose-recommend">
<iframe id="iframe-pose-recommend" style="width:100%;height:calc(100vh - 240px);border:none;border-radius:8px"></iframe>
</div>
<div class="panel" id="panel-pose-synonyms">
<iframe id="iframe-pose-synonyms" style="width:100%;height:calc(100vh - 240px);border:none;border-radius:8px"></iframe>
</div>
</div>

<!-- Prompt Optimize Modal -->
<div id="prompt-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center">
<div style="background:#16213e;border:1px solid #444;border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto">
<h3 style="color:#7c83ff;margin-bottom:12px;font-size:15px">AI Prompt 优化</h3>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">原始 Prompt:</div>
<div id="modal-original" style="background:#0a0a23;padding:10px;border-radius:6px;font-size:13px;margin-bottom:12px;white-space:pre-wrap"></div>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">优化后 Prompt (可编辑):</div>
<textarea id="modal-optimized" style="width:100%;min-height:100px;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;resize:vertical;margin-bottom:12px"></textarea>
<div id="modal-explanation" style="font-size:12px;color:#888;margin-bottom:8px"></div>
<div id="modal-triggers" style="font-size:12px;color:#666;margin-bottom:16px"></div>
<div style="display:flex;gap:10px;justify-content:flex-end">
<button class="btn btn-sm" style="background:#333" onclick="closePromptModal(false)">使用原始</button>
<button class="btn btn-sm" onclick="closePromptModal(true)">使用优化</button>
</div>
</div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:998;align-items:center;justify-content:center;cursor:pointer" onclick="closePreviewModal()">
<div id="preview-modal-content" style="max-width:90vw;max-height:90vh;position:relative" onclick="event.stopPropagation()">
<button onclick="closePreviewModal()" style="position:absolute;top:-12px;right:-12px;background:#333;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;z-index:1">×</button>
</div>
</div>

<!-- Tasks -->
<div class="tasks">
<h2 style="color:#7c83ff;margin-bottom:12px;font-size:1.1em">任务列表</h2>
<div id="task-list"></div>
</div>
</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/module-loader.js"></script>
<script>
// Iframe source URLs (lazy-loaded on first tab click)
const _v = Date.now();
const IFRAME_SRCS = {
  'workflow': '/advanced_workflow_v2.html?v=' + _v,
  'wf-history': '/static/workflow_history.html',
  'favorites': '/static/my_favorites.html',
  'annotate': '/annotate.html',
  'pose-manager': '/pose_manager.html',
  'pose-recommend': '/pose_recommend_test.html',
  'pose-synonyms': '/pose_synonyms_admin.html'
};

// Module tabs load HTML fragments; iframe tabs show iframes
const MODULE_TABS = new Set(['video', 'image']);


// Main tab switching
document.querySelectorAll('.main-tab').forEach(t => {
  t.addEventListener('click', async () => {
    const target = t.dataset.main;

    // Update active tab UI
    document.querySelectorAll('.main-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');

    // Hide all iframe sections
    document.querySelectorAll('.main-section').forEach(x => x.classList.remove('active'));

    if (MODULE_TABS.has(target)) {
      // Show module container, load/show module (DOM cached, scripts run only once)
      document.getElementById('module-content').style.display = '';
      await ModuleLoader.load(target, 'module-content');
    } else {
      // Hide module container
      document.getElementById('module-content').style.display = 'none';

      // Show the iframe section
      const section = document.getElementById('section-' + target);
      if (section) {
        section.classList.add('active');

        // Lazy-load iframe src on first visit
        if (target === 'poses') {
          const activePanel = section.querySelector('.panel.active');
          if (activePanel) {
            const iframe = activePanel.querySelector('iframe');
            if (iframe && !iframe.getAttribute('src')) {
              const tabName = activePanel.id.replace('panel-', '');
              iframe.src = IFRAME_SRCS[tabName] || '';
            }
          }
        } else {
          const iframe = section.querySelector('iframe');
          if (iframe && !iframe.getAttribute('src')) {
            iframe.src = IFRAME_SRCS[target] || '';
          }
        }
      }
    }

    localStorage.setItem('wan22_main_tab', target);
  });
});

// Pose sub-tab switching with lazy iframe loading
document.querySelectorAll('#section-poses [data-posetab]').forEach(t => {
  t.addEventListener('click', () => {
    const target = t.dataset.posetab;
    document.querySelectorAll('#section-poses .tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('#section-poses .panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const panel = document.getElementById('panel-' + target);
    if (panel) {
      panel.classList.add('active');
      const iframe = panel.querySelector('iframe');
      if (iframe && !iframe.getAttribute('src')) {
        iframe.src = IFRAME_SRCS[target] || '';
      }
    }
  });
});

// Initialize: restore saved main tab or default to video
(async function() {
  const savedMain = localStorage.getItem('wan22_main_tab') || 'video';
  const mt = document.querySelector(`.main-tab[data-main="${savedMain}"]`);
  if (mt) {
    mt.click();
  } else {
    // Fallback to video
    document.getElementById('module-content').style.display = '';
    await ModuleLoader.load('video', 'module-content');
  }
})();
</script>
</body>
</html>
