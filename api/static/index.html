<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>
<link rel="stylesheet" href="/static/css/common.css">
</head>
<body>
<div class="container">

<!-- Main Navigation -->
<div class="main-tabs">
<div class="main-tab active" data-main="video">视频生成</div>
<div class="main-tab" data-main="image">图片生成</div>
<div class="main-tab" data-main="vace">VACE 编辑</div>
<div class="main-tab" data-main="workflow">高级工作流</div>
<div class="main-tab" data-main="wf-history">生成历史</div>
<div class="main-tab" data-main="poses">姿势管理</div>
<div class="main-tab" data-main="settings" style="margin-left:auto;color:#888">设置</div>
</div>

<!-- Dynamic Module Content (video/image/chat loaded here) -->
<div id="module-content"></div>

<!-- Iframe Sections (lazy-loaded on tab click) -->
<div class="main-section" id="section-workflow">
<iframe id="iframe-workflow" class="tab-iframe"></iframe>
</div>

<div class="main-section" id="section-wf-history">
<iframe id="iframe-wf-history" class="tab-iframe"></iframe>
</div>


<div class="main-section" id="section-poses">
<div class="tabs">
<div class="tab active" data-posetab="pose-manager">姿势管理</div>
<div class="tab" data-posetab="pose-recommend">推荐测试</div>
<div class="tab" data-posetab="pose-synonyms">同义词配置</div>
</div>
<div class="panel active" id="panel-pose-manager">
<iframe id="iframe-pose-manager" class="tab-iframe tab-iframe-nested"></iframe>
</div>
<div class="panel" id="panel-pose-recommend">
<iframe id="iframe-pose-recommend" class="tab-iframe tab-iframe-nested"></iframe>
</div>
<div class="panel" id="panel-pose-synonyms">
<iframe id="iframe-pose-synonyms" class="tab-iframe tab-iframe-nested"></iframe>
</div>
</div>

<div class="main-section" id="section-settings">
<div style="background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;max-width:500px;margin-bottom:20px">
<h3 style="color:#7c83ff;margin-bottom:16px;font-size:15px">设置</h3>
<div style="margin-bottom:16px">
<label style="display:block;margin-bottom:6px;font-size:13px;color:#aaa">API Key</label>
<input type="password" id="apiKey" value="wan22-default-key-change-me" style="width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px" placeholder="Enter API Key" onchange="localStorage.setItem('wan22_api_key', this.value)">
</div>
<div style="margin-top:16px;padding-top:16px;border-top:1px solid #333">
<h4 style="color:#7c83ff;margin-bottom:12px;font-size:14px">Prompt 优化</h4>
<div style="margin-bottom:10px">
<label style="display:block;margin-bottom:6px;font-size:13px;color:#aaa">短 prompt 自动优化阈值（字符数）</label>
<input type="number" id="promptMinChars" value="20" min="0" max="500" style="width:100px;padding:6px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px">
</div>
<div style="margin-bottom:12px">
<label style="font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;cursor:pointer">
<input type="checkbox" id="promptNonTurbo" checked style="accent-color:#7c83ff"> 非 Turbo 模式自动优化 Prompt
</label>
</div>
<div style="margin-bottom:12px">
<label style="font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;cursor:pointer">
<input type="checkbox" id="injectTriggerPrompt" checked style="accent-color:#7c83ff"> 自动注入 Trigger Prompt
</label>
</div>
<div style="margin-bottom:12px">
<label style="font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;cursor:pointer">
<input type="checkbox" id="injectTriggerWords" checked style="accent-color:#7c83ff"> 自动注入 Trigger Words
</label>
</div>
<button class="btn btn-sm" style="padding:6px 16px;font-size:12px" onclick="savePromptSettings()">保存</button>
<span id="promptSettingsMsg" style="font-size:12px;color:#4caf50;margin-left:8px;display:none">已保存</span>
</div>
</div>

<!-- GPU Monitor -->
<div style="background:#16213e;border:1px solid #333;border-radius:8px;padding:20px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<h3 style="color:#7c83ff;font-size:15px;margin:0">GPU 状态监控</h3>
<div style="display:flex;align-items:center;gap:10px">
<span id="gpu-update-time" style="font-size:11px;color:#666"></span>
<button class="btn btn-sm" style="padding:6px 14px;font-size:12px" onclick="fetchGpuStatus()">刷新</button>
<label style="font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px;cursor:pointer">
<input type="checkbox" id="gpu-auto-refresh" style="accent-color:#7c83ff" checked> 自动刷新
</label>
</div>
</div>
<div id="gpu-container">
<div style="color:#888;font-size:13px;padding:20px;text-align:center">加载中...</div>
</div>
</div>
</div>

<!-- Prompt Optimize Modal -->
<div id="prompt-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center">
<div style="background:#16213e;border:1px solid #444;border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto">
<h3 style="color:#7c83ff;margin-bottom:12px;font-size:15px">AI Prompt 优化</h3>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">原始 Prompt:</div>
<div id="modal-original" style="background:#0a0a23;padding:10px;border-radius:6px;font-size:13px;margin-bottom:12px;white-space:pre-wrap"></div>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">优化后 Prompt (可编辑):</div>
<textarea id="modal-optimized" style="width:100%;min-height:100px;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;resize:vertical;margin-bottom:12px"></textarea>
<div id="modal-explanation" style="font-size:12px;color:#888;margin-bottom:8px"></div>
<div id="modal-triggers" style="font-size:12px;color:#666;margin-bottom:16px"></div>
<div style="display:flex;gap:10px;justify-content:flex-end">
<button class="btn btn-sm" style="background:#333" onclick="closePromptModal(false)">使用原始</button>
<button class="btn btn-sm" onclick="closePromptModal(true)">使用优化</button>
</div>
</div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:998;align-items:center;justify-content:center;cursor:pointer" onclick="closePreviewModal()">
<div id="preview-modal-content" style="max-width:90vw;max-height:90vh;position:relative" onclick="event.stopPropagation()">
<button onclick="closePreviewModal()" style="position:absolute;top:-12px;right:-12px;background:#333;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;z-index:1">×</button>
</div>
</div>

</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/module-loader.js"></script>
<script>
// Iframe source URLs (lazy-loaded on first tab click)
const _v = Date.now();
const IFRAME_SRCS = {
  'workflow': '/advanced_workflow_v2.html?v=' + _v,
  'wf-history': '/static/workflow_history.html?v=' + _v,
  'pose-manager': '/pose_manager.html?v=' + _v,
  'pose-recommend': '/pose_recommend_test.html?v=' + _v,
  'pose-synonyms': '/pose_synonyms_admin.html?v=' + _v
};

// Module tabs load HTML fragments; iframe tabs show iframes
const MODULE_TABS = new Set(['video', 'image', 'vace']);

// Init API Key from localStorage
const _savedKey = localStorage.getItem('wan22_api_key');
if (_savedKey) document.getElementById('apiKey').value = _savedKey;


// Main tab switching
document.querySelectorAll('.main-tab').forEach(t => {
  t.addEventListener('click', async () => {
    const target = t.dataset.main;

    // Update active tab UI
    document.querySelectorAll('.main-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');

    // Hide all iframe sections (only direct children of .container, not module internals)
    document.querySelectorAll('.container > .main-section').forEach(x => x.classList.remove('active'));

    if (MODULE_TABS.has(target)) {
      // Show module container, load/show module (DOM cached, scripts run only once)
      document.getElementById('module-content').style.display = '';
      await ModuleLoader.load(target, 'module-content');
    } else {
      // Hide module container
      document.getElementById('module-content').style.display = 'none';

      // Show the iframe section
      const section = document.getElementById('section-' + target);
      if (section) {
        section.classList.add('active');

        // Lazy-load iframe src on first visit
        if (target === 'poses') {
          const activePanel = section.querySelector('.panel.active');
          if (activePanel) {
            const iframe = activePanel.querySelector('iframe');
            if (iframe && !iframe.getAttribute('src')) {
              const tabName = activePanel.id.replace('panel-', '');
              iframe.src = IFRAME_SRCS[tabName] || '';
            }
          }
        } else {
          const iframe = section.querySelector('iframe');
          if (iframe && !iframe.getAttribute('src')) {
            iframe.src = IFRAME_SRCS[target] || '';
          }
        }
      }
    }

    localStorage.setItem('wan22_main_tab', target);
  });
});

// Pose sub-tab switching with lazy iframe loading
document.querySelectorAll('#section-poses [data-posetab]').forEach(t => {
  t.addEventListener('click', () => {
    const target = t.dataset.posetab;
    document.querySelectorAll('#section-poses .tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('#section-poses .panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const panel = document.getElementById('panel-' + target);
    if (panel) {
      panel.classList.add('active');
      const iframe = panel.querySelector('iframe');
      if (iframe && !iframe.getAttribute('src')) {
        iframe.src = IFRAME_SRCS[target] || '';
      }
    }
  });
});

// Initialize: restore saved main tab or default to video
(async function() {
  const savedMain = localStorage.getItem('wan22_main_tab') || 'video';
  const mt = document.querySelector(`.main-tab[data-main="${savedMain}"]`);
  if (mt) {
    mt.click();
  } else {
    // Fallback to video
    document.getElementById('module-content').style.display = '';
    await ModuleLoader.load('video', 'module-content');
  }
})();

// ========== GPU Status Monitor ==========
let _gpuTimer = null;
const GPU_REFRESH_INTERVAL = 5000;

function _gpuBarColor(pct) {
  if (pct < 50) return '#4ade80';
  if (pct < 80) return '#facc15';
  return '#f87171';
}

function _fmtMem(mb) {
  if (mb == null || mb === 0) return 'N/A';
  return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : mb.toFixed(0) + ' MB';
}

function _bar(pct, label, color) {
  const p = pct != null ? Math.min(100, Math.max(0, pct)) : 0;
  return `<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:3px">
      <span>${label}</span><span style="color:${color || '#e0e0e0'}">${pct != null ? pct.toFixed(1) + '%' : 'N/A'}</span>
    </div>
    <div style="height:6px;background:#333;border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${p}%;background:${color || '#7c83ff'};border-radius:3px;transition:width .5s"></div>
    </div>
  </div>`;
}

function _fmtElapsed(ts) {
  if (!ts) return '';
  const sec = Math.floor(Date.now() / 1000 - ts);
  if (sec < 60) return sec + '秒';
  if (sec < 3600) return Math.floor(sec / 60) + '分' + (sec % 60) + '秒';
  return Math.floor(sec / 3600) + '时' + Math.floor((sec % 3600) / 60) + '分';
}

function renderGpuCards(data) {
  const container = document.getElementById('gpu-container');
  if (!data.gpus || data.gpus.length === 0) {
    container.innerHTML = '<div style="color:#888;font-size:13px;padding:20px;text-align:center">未检测到已注册的 ComfyUI Worker</div>';
    return;
  }

  // Queue info
  const ql = data.queue_lengths || {};
  const queueHtml = (ql.a14b || ql['5b']) ?
    `<div style="margin-bottom:12px;font-size:12px;color:#aaa;display:flex;gap:16px">
      ${ql.a14b ? '<span>A14B 队列: <b style="color:#facc15">' + ql.a14b + '</b> 个任务等待中</span>' : ''}
      ${ql['5b'] ? '<span>5B 队列: <b style="color:#facc15">' + ql['5b'] + '</b> 个任务等待中</span>' : ''}
    </div>` : '';

  const cards = data.gpus.map(gpu => {
    const vramPct = gpu.vram_total_mb ? (gpu.vram_used_mb / gpu.vram_total_mb * 100) : null;
    const torchPct = gpu.torch_vram_total_mb ? (gpu.torch_vram_used_mb / gpu.torch_vram_total_mb * 100) : null;
    const vramColor = _gpuBarColor(vramPct || 0);
    const torchColor = _gpuBarColor(torchPct || 0);

    // Parse GPU name from device_name like "cuda:0 NVIDIA GeForce RTX 4090 : native"
    let gpuName = gpu.device_name || 'Unknown';
    const nameMatch = gpuName.match(/cuda:\d+\s+(.+?)\s*:\s*\w+$/);
    if (nameMatch) gpuName = nameMatch[1];

    // Status badge
    const aliveColor = gpu.alive ? '#4ade80' : '#f87171';
    let statusBadge;
    if (!gpu.alive) {
      statusBadge = '<span style="background:#4a1a1a;color:#f87171;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">离线</span>';
    } else if (gpu.task) {
      statusBadge = '<span style="background:#0f3460;color:#7c83ff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">任务中</span>';
    } else {
      statusBadge = '<span style="background:#1a4a2e;color:#4ade80;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">空闲</span>';
    }

    // Task info section
    let taskHtml = '';
    if (gpu.task) {
      const t = gpu.task;
      const pct = (t.progress * 100).toFixed(1);
      const modeLabel = t.mode === 'i2v' ? '图生视频' : t.mode === 'extend' ? '视频续写' : '文生视频';
      taskHtml = `<div style="margin-top:10px;padding:10px;background:#0f1a3e;border:1px solid #2a3a6a;border-radius:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:11px;color:#7c83ff;font-weight:600">当前任务</span>
          <span style="font-size:10px;color:#888">${modeLabel} | ${t.model ? t.model.toUpperCase() : ''}</span>
        </div>
        <div style="font-size:11px;color:#ccc;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
             title="${(t.prompt || '').replace(/"/g, '&quot;')}">
          ${t.prompt ? t.prompt : '<span style="color:#666">无 prompt 信息</span>'}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:4px;background:#333;border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#7c83ff,#4ade80);border-radius:2px;transition:width .5s"></div>
          </div>
          <span style="font-size:11px;color:#7c83ff;min-width:40px;text-align:right">${pct}%</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:#666">
          <span>ID: ${t.task_id ? t.task_id.substring(0, 8) + '...' : 'N/A'}</span>
          <span>已运行: ${_fmtElapsed(t.created_at)}</span>
        </div>
      </div>`;
    } else if (gpu.alive) {
      taskHtml = `<div style="margin-top:10px;padding:8px;background:#0a1520;border:1px dashed #333;border-radius:6px;text-align:center">
        <span style="font-size:11px;color:#555">无运行中的任务</span>
      </div>`;
    }

    // Version info
    const versionHtml = gpu.comfyui_version ?
      `<span style="font-size:10px;color:#555;margin-left:auto">ComfyUI ${gpu.comfyui_version} | PyTorch ${gpu.pytorch_version}</span>` : '';

    return `<div style="background:#0a0a23;border:1px solid ${gpu.alive ? '#333' : '#4a1a1a'};border-radius:8px;padding:14px;${gpu.alive ? '' : 'opacity:0.7'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <span style="color:#7c83ff;font-weight:600;font-size:13px">${gpu.model_key.toUpperCase()}</span>
          <span style="color:#888;font-size:12px;margin-left:6px">${gpuName}</span>
          <span style="font-size:10px;color:#666;margin-left:4px">${gpu.url}</span>
        </div>
        ${statusBadge}
      </div>
      ${gpu.alive ? _bar(vramPct, 'VRAM (' + _fmtMem(gpu.vram_used_mb) + ' / ' + _fmtMem(gpu.vram_total_mb) + ')', vramColor) : ''}
      ${gpu.alive && gpu.torch_vram_total_mb ? _bar(torchPct, 'Torch 显存 (' + _fmtMem(gpu.torch_vram_used_mb) + ' / ' + _fmtMem(gpu.torch_vram_total_mb) + ')', torchColor) : ''}
      ${!gpu.alive ? '<div style="color:#f87171;font-size:12px;padding:8px 0">Worker 不可达，请检查 ComfyUI 是否运行</div>' : ''}
      <div style="display:flex;align-items:center;margin-top:6px">
        ${versionHtml}
      </div>
      ${taskHtml}
    </div>`;
  }).join('');

  container.innerHTML = queueHtml + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px">' + cards + '</div>';
}

async function fetchGpuStatus() {
  try {
    const key = localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me';
    const resp = await fetch(`${window.location.origin}/api/v1/admin/gpu-status`, {
      headers: { 'X-API-Key': key }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderGpuCards(data);
    document.getElementById('gpu-update-time').textContent = '更新于 ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('gpu-container').innerHTML =
      `<div style="color:#f87171;font-size:13px;padding:20px;text-align:center">获取 GPU 状态失败: ${e.message}</div>`;
  }
}

function _startGpuRefresh() {
  if (_gpuTimer) clearInterval(_gpuTimer);
  if (document.getElementById('gpu-auto-refresh').checked) {
    _gpuTimer = setInterval(() => {
      // Only refresh when settings tab is visible
      const section = document.getElementById('section-settings');
      if (section && section.classList.contains('active')) fetchGpuStatus();
    }, GPU_REFRESH_INTERVAL);
  }
}

document.getElementById('gpu-auto-refresh').addEventListener('change', _startGpuRefresh);

// --- Prompt Optimization Settings ---
async function loadPromptSettings() {
  try {
    const key = document.getElementById('apiKey').value;
    const resp = await fetch(`${window.location.origin}/api/v1/admin/settings`, {
      headers: { 'X-API-Key': key }
    });
    if (!resp.ok) return;
    const data = await resp.json();
    document.getElementById('promptMinChars').value = data.prompt_optimize_min_chars ?? 20;
    document.getElementById('promptNonTurbo').checked = data.prompt_optimize_non_turbo ?? true;
    document.getElementById('injectTriggerPrompt').checked = data.inject_trigger_prompt ?? true;
    document.getElementById('injectTriggerWords').checked = data.inject_trigger_words ?? true;
  } catch (e) { console.warn('Failed to load prompt settings:', e); }
}

async function savePromptSettings() {
  try {
    const key = document.getElementById('apiKey').value;
    const body = {
      prompt_optimize_min_chars: parseInt(document.getElementById('promptMinChars').value) || 20,
      prompt_optimize_non_turbo: document.getElementById('promptNonTurbo').checked,
      inject_trigger_prompt: document.getElementById('injectTriggerPrompt').checked,
      inject_trigger_words: document.getElementById('injectTriggerWords').checked
    };
    const resp = await fetch(`${window.location.origin}/api/v1/admin/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      const msg = document.getElementById('promptSettingsMsg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2000);
    }
  } catch (e) { console.warn('Failed to save prompt settings:', e); }
}

// Fetch GPU status when settings tab is first shown
const _origSettingsClick = () => {
  fetchGpuStatus();
  _startGpuRefresh();
  loadPromptSettings();
};
document.querySelector('.main-tab[data-main="settings"]').addEventListener('click', _origSettingsClick);

// Init on page load: the IIFE at line 229 fires mt.click() before
// _origSettingsClick is registered, so we must call these explicitly.
loadPromptSettings();
if (localStorage.getItem('wan22_main_tab') === 'settings') {
  fetchGpuStatus();
  _startGpuRefresh();
}
</script>
</body>
</html>
