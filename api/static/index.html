<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wan2.2 Video Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{text-align:center;color:#7c83ff;margin-bottom:24px;font-size:1.6em}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 24px;background:#16213e;border:1px solid #333;border-radius:8px 8px 0 0;cursor:pointer;color:#aaa;font-size:14px}
.tab.active{background:#0f3460;border-color:#7c83ff;color:#fff}
.panel{display:none;background:#16213e;border-radius:0 8px 8px 8px;padding:24px;border:1px solid #333}
.panel.active{display:block}
.row{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.field label{display:block;margin-bottom:4px;font-size:13px;color:#aaa}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.field textarea{resize:vertical;min-height:70px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#7c83ff}
.upload-area{border:2px dashed #444;border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;min-height:150px;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden}
.upload-area:hover{border-color:#7c83ff}
.upload-area img{max-width:100%;max-height:200px;border-radius:6px}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.lora-section{margin-top:16px}
.lora-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-top:8px}
.lora-item{display:flex;align-items:center;gap:10px;background:#0a0a23;padding:10px;border-radius:6px;border:1px solid #333}
.lora-item.selected{border-color:#7c83ff;background:#0f1a3e}
.lora-item input[type=checkbox]{accent-color:#7c83ff;width:18px;height:18px}
.lora-item .lora-name{flex:1;font-size:13px}
.lora-item .lora-strength{width:52px;padding:4px 6px;background:#0a0a23;border:1px solid #444;border-radius:4px;color:#7c83ff;font-size:12px;text-align:center}
.lora-item .lora-name{font-size:13px}
.lora-item .lora-name a{color:#7c83ff;text-decoration:none}
.lora-item .lora-name a:hover{text-decoration:underline}
.btn{padding:12px 32px;background:#7c83ff;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#5a62e0}
.btn:disabled{background:#444;cursor:not-allowed}
.btn-sm{padding:8px 20px;font-size:13px}
.btn-row{text-align:center;margin-top:20px}
.tasks{margin-top:30px}
.task-card{background:#16213e;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:12px}
.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.task-id{font-family:monospace;font-size:12px;color:#888}
.status{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.status.queued{background:#444;color:#fff}
.status.running{background:#0f3460;color:#7c83ff}
.status.completed{background:#1a4a2e;color:#4ade80}
.status.failed{background:#4a1a1a;color:#f87171}
.progress-bar{height:6px;background:#333;border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c83ff,#4ade80);transition:width .3s;border-radius:3px}
.video-result{margin-top:10px}
.video-result video{max-width:100%;border-radius:6px;max-height:400px}
.api-key-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center}
.api-key-bar input{flex:1;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px}
.api-key-bar label{font-size:13px;color:#aaa;white-space:nowrap}
.query-row{display:flex;gap:10px;align-items:flex-end}
.query-row input{flex:1}
.dl-item{background:#0a0a23;padding:12px;border-radius:6px;border:1px solid #333;margin-bottom:8px;font-size:13px}
.dl-item .dl-name{color:#7c83ff}
.file-list{margin-top:16px}
.file-item{display:flex;justify-content:space-between;padding:8px 12px;background:#0a0a23;border-radius:6px;margin-bottom:4px;font-size:13px}
.civitai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.civitai-card{background:#0a0a23;border:1px solid #333;border-radius:8px;overflow:hidden;position:relative}
.civitai-card.downloaded{border-color:#4ade80;opacity:.7}
.civitai-card .card-badge{position:absolute;top:6px;right:6px;background:#1a4a2e;color:#4ade80;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;z-index:1}
.civitai-card .card-check{position:absolute;top:6px;left:6px;z-index:1;accent-color:#7c83ff;width:18px;height:18px}
.civitai-card img{width:100%;height:140px;object-fit:cover}
.civitai-card .card-body{padding:8px}
.civitai-card .card-title{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.civitai-card .card-tags{font-size:10px;color:#888;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.civitai-card .card-meta{font-size:10px;color:#666;margin-bottom:4px}
.civitai-card .card-tw{font-size:10px;color:#7c83ff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.civitai-card .card-actions{display:flex;gap:4px;align-items:center}
.civitai-card select{padding:3px 4px;background:#16213e;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:11px;flex:1;min-width:0}
.civitai-batch-bar{display:flex;gap:10px;align-items:center;margin-top:12px;padding:10px;background:#0a0a23;border-radius:6px;border:1px solid #333}
.lora-item .lora-tw{font-size:11px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.lora-item .lora-preview{width:64px;height:64px;border-radius:6px;object-fit:cover;cursor:pointer;flex-shrink:0}
.lora-item .lora-placeholder{width:64px;height:64px;border-radius:6px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;color:#444;font-size:10px;flex-shrink:0}
.prompt-preview{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:10px;margin-top:8px;font-size:13px;color:#ccc;white-space:pre-wrap;display:none;position:relative}
.prompt-preview .preview-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
</style>
</head>
<body>
<div class="container">
<h1>Wan2.2 Video Generator</h1>
<div class="api-key-bar">
<label>API Key:</label>
<input type="password" id="apiKey" value="wan22-default-key-change-me" placeholder="Enter API Key">
</div>
<div class="tabs">
<div class="tab active" data-tab="t2v">T2V 文字生成视频</div>
<div class="tab" data-tab="i2v">I2V 图片生成视频</div>
<div class="tab" data-tab="query">查询任务</div>
<div class="tab" data-tab="dlora">下载 LoRA</div>
<div class="tab" data-tab="civitai">CivitAI</div>
</div>
<!-- T2V Panel -->
<div class="panel active" id="panel-t2v">
<div class="row"><div class="field" style="flex:3"><label>正向提示词</label>
<textarea id="t2v-prompt" placeholder="Describe the video you want to generate..."></textarea>
<div style="margin-top:6px;text-align:right"><button class="btn btn-sm" style="background:#0f3460" onclick="optimizePrompt('t2v', this)">AI 优化 Prompt</button></div>
<div class="prompt-preview" id="t2v-preview">
<div style="font-size:11px;color:#7c83ff;margin-bottom:4px">AI 优化结果：</div>
<div id="t2v-preview-text"></div>
<div id="t2v-preview-explain" style="font-size:11px;color:#888;margin-top:6px"></div>
<div class="preview-actions">
<button class="btn btn-sm" style="background:#333;padding:4px 14px" onclick="dismissPreview('t2v')">忽略</button>
<button class="btn btn-sm" style="padding:4px 14px" onclick="applyPreview('t2v')">采用</button>
</div>
</div>
</div></div>
<div class="row"><div class="field" style="flex:3"><label>负向提示词</label>
<input id="t2v-neg" placeholder="(optional)" value=""></div></div>
<div class="row">
<div class="field"><label>模型</label><select id="t2v-model"><option value="a14b">A14B (高质量)</option><option value="5b">5B (快速)</option></select></div>
<div class="field"><label>大模型预设</label><select id="t2v-preset"></select></div>
<div class="field"><label>宽度</label><input type="number" id="t2v-w" value="832" step="16" onchange="align16(this)"></div>
<div class="field"><label>高度</label><input type="number" id="t2v-h" value="480" step="16" onchange="align16(this)"></div>
<div class="field"><label>时长(秒)</label><input type="number" id="t2v-duration" value="3.3" step="0.1" min="0.5" max="10"></div>
</div>
<div class="row">
<div class="field"><label>FPS</label><input type="number" id="t2v-fps" value="24"></div>
<div class="field"><label>Steps</label><input type="number" id="t2v-steps" value="20"></div>
<div class="field"><label>CFG</label><input type="number" id="t2v-cfg" value="6.0" step="0.5"></div>
<div class="field"><label>Shift</label><input type="number" id="t2v-shift" value="5.0" step="0.5"></div>
</div>
<div class="row">
<div class="field"><label>Seed (-1=随机)</label><input type="number" id="t2v-seed" value="-1"></div>
<div class="field"><label>Scheduler</label><select id="t2v-sched"><option value="unipc">UniPC</option><option value="unipc/beta">UniPC/Beta</option><option value="dpm++">DPM++</option><option value="dpm++/beta">DPM++/Beta</option><option value="euler">Euler</option><option value="euler/beta">Euler/Beta</option><option value="deis">DEIS</option><option value="lcm">LCM</option><option value="res_multistep">Res Multistep</option></select></div>
</div>
<div class="lora-section"><label>LoRA 选择</label><div class="lora-grid" id="t2v-loras"></div></div>
<div class="row" style="margin-top:12px"><div class="field" style="min-width:auto;flex:none"><label><input type="checkbox" id="t2v-upscale" style="accent-color:#7c83ff;width:16px;height:16px;vertical-align:middle;margin-right:6px">超分辨率 (2x upscale)</label></div></div>
<div class="btn-row"><button class="btn" onclick="submitT2V()">生成视频</button></div>
</div>

<!-- I2V Panel -->
<div class="panel" id="panel-i2v">
<div class="row">
<div class="field" style="flex:1;max-width:300px"><label>上传图片</label>
<div class="upload-area" id="i2v-upload-area">
<img id="i2v-img-preview" style="display:none">
<span id="i2v-upload-text">点击或拖拽上传图片</span>
<input type="file" id="i2v-file" accept="image/*">
</div></div>
<div class="field" style="flex:2"><label>正向提示词</label>
<textarea id="i2v-prompt" placeholder="Describe the motion/action..." style="min-height:120px"></textarea>
<div style="margin-top:6px;text-align:right"><button class="btn btn-sm" style="background:#0f3460" onclick="optimizePrompt('i2v', this)">AI 优化 Prompt</button></div>
<div class="prompt-preview" id="i2v-preview">
<div style="font-size:11px;color:#7c83ff;margin-bottom:4px">AI 优化结果：</div>
<div id="i2v-preview-text"></div>
<div id="i2v-preview-explain" style="font-size:11px;color:#888;margin-top:6px"></div>
<div class="preview-actions">
<button class="btn btn-sm" style="background:#333;padding:4px 14px" onclick="dismissPreview('i2v')">忽略</button>
<button class="btn btn-sm" style="padding:4px 14px" onclick="applyPreview('i2v')">采用</button>
</div>
</div>
<div style="margin-top:8px"><label>负向提示词</label>
<input id="i2v-neg" placeholder="(optional)" value=""></div></div>
</div>
<div class="row">
<div class="field"><label>模型</label><select id="i2v-model"><option value="a14b">A14B (高质量)</option><option value="5b">5B (快速)</option></select></div>
<div class="field"><label>大模型预设</label><select id="i2v-preset"></select></div>
<div class="field"><label>宽度</label><input type="number" id="i2v-w" value="832" step="16" onchange="align16(this)"></div>
<div class="field"><label>高度</label><input type="number" id="i2v-h" value="480" step="16" onchange="align16(this)"></div>
<div class="field"><label>时长(秒)</label><input type="number" id="i2v-duration" value="3.3" step="0.1" min="0.5" max="10"></div>
</div>
<div class="row">
<div class="field"><label>FPS</label><input type="number" id="i2v-fps" value="24"></div>
<div class="field"><label>Steps</label><input type="number" id="i2v-steps" value="20"></div>
<div class="field"><label>CFG</label><input type="number" id="i2v-cfg" value="6.0" step="0.5"></div>
<div class="field"><label>Shift</label><input type="number" id="i2v-shift" value="5.0" step="0.5"></div>
</div>
<div class="row">
<div class="field"><label>Seed (-1=随机)</label><input type="number" id="i2v-seed" value="-1"></div>
<div class="field"><label>Scheduler</label><select id="i2v-sched"><option value="unipc">UniPC</option><option value="unipc/beta">UniPC/Beta</option><option value="dpm++">DPM++</option><option value="dpm++/beta">DPM++/Beta</option><option value="euler">Euler</option><option value="euler/beta">Euler/Beta</option><option value="deis">DEIS</option><option value="lcm">LCM</option><option value="res_multistep">Res Multistep</option></select></div>
<div class="field"><label>Noise Aug Strength</label><input type="number" id="i2v-noise" value="0.0" step="0.05" min="0" max="1"></div>
</div>
<div class="row">
<div class="field"><label>Motion Amplitude</label><input type="number" id="i2v-motion" value="0.0" step="0.05" min="0" max="1"></div>
<div class="field"><label>颜色校正</label><select id="i2v-colormatch"><option value="true">开启</option><option value="false">关闭</option></select></div>
<div class="field"><label>校正方法</label><select id="i2v-colormatch-method"><option value="mkl">MKL</option><option value="hm">HM</option><option value="reinhard">Reinhard</option></select></div>
<div class="field"><label>图片适配</label><select id="i2v-resize"><option value="crop_to_new">裁剪适配</option><option value="stretch_to_new">拉伸适配</option><option value="keep_input">保持原比例</option></select></div>
</div>
<div class="lora-section"><label>LoRA 选择</label><div class="lora-grid" id="i2v-loras"></div></div>
<div class="row" style="margin-top:12px"><div class="field" style="min-width:auto;flex:none"><label><input type="checkbox" id="i2v-upscale" style="accent-color:#7c83ff;width:16px;height:16px;vertical-align:middle;margin-right:6px">超分辨率 (2x upscale)</label></div></div>
<div class="btn-row"><button class="btn" onclick="submitI2V()">生成视频</button></div>
</div>

<!-- Query Panel -->
<div class="panel" id="panel-query">
<div class="row query-row">
<div class="field"><label>任务 ID</label><input id="query-id" placeholder="输入任务ID查询单个任务"></div>
<button class="btn btn-sm" onclick="queryTask()">查询</button>
<button class="btn btn-sm" style="margin-left:8px;background:#333" onclick="loadHistory()">刷新历史</button>
</div>
<div id="query-result" style="margin-top:16px"></div>
<h3 style="color:#7c83ff;font-size:14px;margin:20px 0 10px">所有生成历史</h3>
<div id="history-list"></div>
</div>

<!-- Download LoRA Panel -->
<div class="panel" id="panel-dlora">
<div class="row"><div class="field" style="flex:3"><label>CivitAI 下载链接</label>
<input id="dl-url" placeholder="https://civitai.com/api/download/models/..."></div></div>
<div class="row">
<div class="field"><label>文件名 (留空自动获取)</label><input id="dl-filename" placeholder="自动从服务器获取"></div>
<div class="field"><label>CivitAI Token (可选)</label><input id="dl-token" placeholder="API token"></div>
</div>
<div class="btn-row"><button class="btn" onclick="downloadLora()">开始下载</button>
<button class="btn btn-sm" style="margin-left:10px;background:#333" onclick="refreshLoraFiles()">刷新文件列表</button></div>
<div id="dl-status" style="margin-top:16px"></div>
<div class="file-list"><h3 style="color:#7c83ff;font-size:14px;margin-bottom:8px">已有 LoRA 文件</h3><div id="lora-file-list"></div></div>
</div>

<!-- CivitAI Panel -->
<div class="panel" id="panel-civitai">
<div class="row query-row" style="flex-wrap:wrap;gap:8px">
<div class="field" style="min-width:200px"><label>搜索 LoRA</label><input id="civitai-query" value="wan 2.1" placeholder="Search CivitAI..."></div>
<div class="field" style="min-width:120px;flex:0"><label>Base Model</label>
<select id="civitai-basemodel" style="width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px">
<option value="">全部</option>
<option value="Wan Video 2.2 14B">Wan 2.2 14B</option>
<option value="Wan Video 2.2 T2V-A14B">Wan 2.2 T2V-A14B</option>
<option value="Wan Video 2.1 14B">Wan 2.1 14B</option>
<option value="Wan Video 1.3B t2v">Wan 1.3B</option>
<option value="Illustrious">Illustrious</option>
<option value="Pony">Pony</option>
<option value="SDXL 1.0">SDXL</option>
</select></div>
<div class="field" style="min-width:100px;flex:0"><label>排序</label>
<select id="civitai-sort" style="width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px">
<option value="Most Downloaded">下载量</option>
<option value="Highest Rated">评分</option>
<option value="Newest">最新</option>
</select></div>
<div class="field" style="min-width:60px;flex:0;display:flex;align-items:flex-end">
<label style="display:flex;align-items:center;gap:4px;font-size:13px;color:#aaa;padding:8px 0">
<input type="checkbox" id="civitai-nsfw" checked style="accent-color:#7c83ff;width:16px;height:16px"> NSFW</label>
</div>
<div style="display:flex;align-items:flex-end"><button class="btn btn-sm" onclick="searchCivitAI()">搜索</button></div>
</div>
<div class="civitai-batch-bar" id="civitai-batch" style="display:none">
<span style="font-size:13px;color:#aaa">已选 <b id="civitai-sel-count">0</b> 个</span>
<button class="btn btn-sm" onclick="batchDownloadCivitAI()">批量下载</button>
<button class="btn btn-sm" style="background:#333" onclick="clearCivitAISelection()">取消选择</button>
</div>
<div id="civitai-results" style="margin-top:12px"></div>
<div id="civitai-pages" style="text-align:center;margin-top:12px"></div>
<div id="civitai-dl-status" style="margin-top:12px"></div>
</div>

<!-- Prompt Optimize Modal -->
<div id="prompt-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center">
<div style="background:#16213e;border:1px solid #444;border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto">
<h3 style="color:#7c83ff;margin-bottom:12px;font-size:15px">AI Prompt 优化</h3>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">原始 Prompt:</div>
<div id="modal-original" style="background:#0a0a23;padding:10px;border-radius:6px;font-size:13px;margin-bottom:12px;white-space:pre-wrap"></div>
<div style="font-size:13px;color:#aaa;margin-bottom:8px">优化后 Prompt (可编辑):</div>
<textarea id="modal-optimized" style="width:100%;min-height:100px;padding:10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;resize:vertical;margin-bottom:12px"></textarea>
<div id="modal-explanation" style="font-size:12px;color:#888;margin-bottom:8px"></div>
<div id="modal-triggers" style="font-size:12px;color:#666;margin-bottom:16px"></div>
<div style="display:flex;gap:10px;justify-content:flex-end">
<button class="btn btn-sm" style="background:#333" onclick="closePromptModal(false)">使用原始</button>
<button class="btn btn-sm" onclick="closePromptModal(true)">使用优化</button>
</div>
</div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:998;align-items:center;justify-content:center;cursor:pointer" onclick="closePreviewModal()">
<div id="preview-modal-content" style="max-width:90vw;max-height:90vh;position:relative" onclick="event.stopPropagation()">
<button onclick="closePreviewModal()" style="position:absolute;top:-12px;right:-12px;background:#333;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;z-index:1">×</button>
</div>
</div>

<!-- Tasks -->
<div class="tasks">
<h2 style="color:#7c83ff;margin-bottom:12px;font-size:1.1em">任务列表</h2>
<div id="task-list"></div>
</div>
</div>
<script>
const BASE = window.location.origin;
const getKey = () => document.getElementById('apiKey').value;
let allLoras = [];
let activeTasks = {};
let i2vSelectedFile = null;
let modelPresets = [];

function formatDuration(created, completed) {
  if (!created) return '';
  const end = completed || Math.floor(Date.now()/1000);
  const sec = end - created;
  if (sec < 0) return '';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? m + '分' + s + '秒' : s + '秒';
}

// Auto-align width/height to multiple of 16
function align16(el) {
  let v = parseInt(el.value) || 0;
  v = Math.round(v / 16) * 16;
  if (v < 16) v = 16;
  el.value = v;
}

// Duration to frames: align to 4n+1
function durationToFrames(sec, fps) {
  let f = Math.round(sec * fps);
  f = Math.max(f, 1);
  // align to 4n+1
  f = Math.round((f - 1) / 4) * 4 + 1;
  return Math.max(f, 5);
}
function framesToDuration(frames, fps) {
  return (frames / fps).toFixed(1);
}

// Save/restore form params to localStorage
const FORM_FIELDS = {
  t2v: ['t2v-prompt','t2v-neg','t2v-model','t2v-preset','t2v-w','t2v-h','t2v-duration','t2v-fps','t2v-steps','t2v-cfg','t2v-shift','t2v-seed','t2v-sched'],
  i2v: ['i2v-prompt','i2v-neg','i2v-model','i2v-preset','i2v-w','i2v-h','i2v-duration','i2v-fps','i2v-steps','i2v-cfg','i2v-shift','i2v-seed','i2v-sched','i2v-noise','i2v-motion','i2v-colormatch','i2v-colormatch-method','i2v-resize']
};
function saveFormParams(prefix) {
  const data = {};
  FORM_FIELDS[prefix].forEach(id => {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  });
  // Save LoRA selections
  const loraData = [];
  document.querySelectorAll('#' + prefix + '-loras .lora-item').forEach(item => {
    const cb = item.querySelector('input[type=checkbox]');
    const idx = parseInt(cb.dataset.idx);
    const strength = parseFloat(item.querySelector('.lora-strength').value);
    if (cb.checked) loraData.push({idx, strength});
  });
  data._loras = loraData;
  localStorage.setItem('wan22_'+prefix, JSON.stringify(data));
}
function restoreFormParams(prefix) {
  try {
    const data = JSON.parse(localStorage.getItem('wan22_'+prefix));
    if (!data) return;
    FORM_FIELDS[prefix].forEach(id => {
      const el = document.getElementById(id);
      if (el && data[id] !== undefined) el.value = data[id];
    });
    // Restore LoRA selections after loras are loaded
    if (data._loras) {
      window['_pendingLoras_'+prefix] = data._loras;
    }
  } catch(e) {}
}

// Load model presets
async function loadPresets() {
  try {
    const r = await fetch(BASE + '/api/v1/model-presets');
    if (!r.ok) return;
    modelPresets = await r.json();
    ['t2v-preset','i2v-preset'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = modelPresets.map(p =>
        `<option value="${p.name}" ${!p.available?'disabled':''}>${p.name}${p.available?'':' (未下载)'}</option>`
      ).join('');
    });
    // Restore saved preset values after options are populated
    ['t2v','i2v'].forEach(prefix => {
      try {
        const data = JSON.parse(localStorage.getItem('wan22_'+prefix));
        if (data && data[prefix+'-preset']) {
          document.getElementById(prefix+'-preset').value = data[prefix+'-preset'];
        }
      } catch(e) {}
    });
  } catch(e) {}
}

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'dlora') refreshLoraFiles();
    if (t.dataset.tab === 'query') loadHistory();
    if (t.dataset.tab === 'civitai' && !document.getElementById('civitai-results').innerHTML) searchCivitAI();
  });
});

// Image upload - store file in variable to avoid losing it
document.getElementById('i2v-file').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  i2vSelectedFile = file;
  const reader = new FileReader();
  const preview = document.getElementById('i2v-img-preview');
  const text = document.getElementById('i2v-upload-text');
  reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; text.style.display = 'none'; };
  reader.readAsDataURL(file);
});

async function loadLoras() {
  try {
    const r = await fetch(BASE + '/api/v1/loras', {headers: {'X-API-Key': getKey()}});
    if (!r.ok) return;
    allLoras = await r.json();
    renderLoras('t2v-loras');
    renderLoras('i2v-loras');
    restoreLoraSelections('t2v');
    restoreLoraSelections('i2v');
  } catch(e) {}
}

function restoreLoraSelections(prefix) {
  const pending = window['_pendingLoras_'+prefix];
  if (!pending) return;
  delete window['_pendingLoras_'+prefix];
  const container = prefix + '-loras';
  pending.forEach(({idx, strength}) => {
    const item = document.getElementById(container + '-' + idx);
    if (!item) return;
    const cb = item.querySelector('input[type=checkbox]');
    cb.checked = true;
    item.classList.add('selected');
    item.querySelector('.lora-strength').value = strength;
  });
}

function renderLoras(cid) {
  const c = document.getElementById(cid);
  if (!allLoras.length) { c.innerHTML = '<span style="color:#666;font-size:13px">暂无可用 LoRA</span>'; return; }
  c.innerHTML = allLoras.map((l, i) => {
    const twText = (l.trigger_words||[]).join(', ');
    let previewHtml = '';
    if (l.preview_url) {
      const isVideo = /\.(mp4|webm)$/i.test(l.preview_url);
      if (isVideo) {
        previewHtml = `<video class="lora-preview" src="${l.preview_url}" muted autoplay loop playsinline referrerpolicy="no-referrer" onclick="openPreviewModal('${l.preview_url}', true)"></video>`;
      } else {
        previewHtml = `<img class="lora-preview" src="${l.preview_url}" alt="" referrerpolicy="no-referrer" onclick="openPreviewModal('${l.preview_url}', false)">`;
      }
    } else {
      previewHtml = '<div class="lora-placeholder">LoRA</div>';
    }
    const civitaiLink = l.civitai_id ? `<a href="https://civitai.com/models/${l.civitai_id}" target="_blank" rel="noopener" title="${l.file}">${l.name}</a>` : `<span title="${l.file}">${l.name}</span>`;
    return `<div class="lora-item" id="${cid}-${i}">
      <input type="checkbox" data-idx="${i}" onchange="this.parentElement.classList.toggle('selected')">
      ${previewHtml}
      <div style="flex:1;min-width:0">
        <span class="lora-name">${civitaiLink}</span>
        ${twText ? `<div class="lora-tw" title="${twText}">${twText}</div>` : ''}
      </div>
      <input type="number" class="lora-strength" min="0" max="2" step="0.05" value="${l.default_strength}">
    </div>`;
  }).join('');
}

function getSelectedLoras(cid) {
  const loras = [];
  document.querySelectorAll('#' + cid + ' .lora-item').forEach(item => {
    const cb = item.querySelector('input[type=checkbox]');
    if (cb.checked) {
      const idx = parseInt(cb.dataset.idx);
      loras.push({name: allLoras[idx].name, strength: parseFloat(item.querySelector('.lora-strength').value)});
    }
  });
  return loras;
}
async function submitT2V() {
  const seed = parseInt(document.getElementById('t2v-seed').value);
  const fps = parseInt(document.getElementById('t2v-fps').value);
  const duration = parseFloat(document.getElementById('t2v-duration').value);
  let prompt = document.getElementById('t2v-prompt').value;
  if (!prompt) { alert('请输入提示词'); return; }
  const loras = getSelectedLoras('t2v-loras');
  const body = {
    prompt,
    negative_prompt: document.getElementById('t2v-neg').value,
    model: document.getElementById('t2v-model').value,
    width: parseInt(document.getElementById('t2v-w').value),
    height: parseInt(document.getElementById('t2v-h').value),
    num_frames: durationToFrames(duration, fps),
    fps: fps,
    steps: parseInt(document.getElementById('t2v-steps').value),
    cfg: parseFloat(document.getElementById('t2v-cfg').value),
    shift: parseFloat(document.getElementById('t2v-shift').value),
    seed: seed >= 0 ? seed : null,
    scheduler: document.getElementById('t2v-sched').value,
    model_preset: document.getElementById('t2v-preset').value,
    loras: loras,
    upscale: document.getElementById('t2v-upscale').checked
  };
  if (!body.prompt) { alert('请输入提示词'); return; }
  saveFormParams('t2v');
  try {
    const r = await fetch(BASE + '/api/v1/generate', {
      method: 'POST', headers: {'Content-Type':'application/json','X-API-Key':getKey()},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { alert('Error: ' + (d.detail || JSON.stringify(d))); return; }
    addTask(d.task_id, 'T2V', body.prompt);
  } catch(e) { alert('请求失败: ' + e.message); }
}

async function submitI2V() {
  if (!i2vSelectedFile) { alert('请上传图片'); return; }
  let prompt = document.getElementById('i2v-prompt').value;
  if (!prompt) { alert('请输入提示词'); return; }
  const seed = parseInt(document.getElementById('i2v-seed').value);
  const fps = parseInt(document.getElementById('i2v-fps').value);
  const duration = parseFloat(document.getElementById('i2v-duration').value);
  const loras = getSelectedLoras('i2v-loras');
  const params = {
    prompt, negative_prompt: document.getElementById('i2v-neg').value,
    model: document.getElementById('i2v-model').value,
    width: parseInt(document.getElementById('i2v-w').value),
    height: parseInt(document.getElementById('i2v-h').value),
    num_frames: durationToFrames(duration, fps),
    fps: fps,
    steps: parseInt(document.getElementById('i2v-steps').value),
    cfg: parseFloat(document.getElementById('i2v-cfg').value),
    shift: parseFloat(document.getElementById('i2v-shift').value),
    seed: seed >= 0 ? seed : null,
    scheduler: document.getElementById('i2v-sched').value,
    noise_aug_strength: parseFloat(document.getElementById('i2v-noise').value),
    motion_amplitude: parseFloat(document.getElementById('i2v-motion').value),
    color_match: document.getElementById('i2v-colormatch').value === 'true',
    color_match_method: document.getElementById('i2v-colormatch-method').value,
    resize_mode: document.getElementById('i2v-resize').value,
    model_preset: document.getElementById('i2v-preset').value,
    loras: loras,
    upscale: document.getElementById('i2v-upscale').checked
  };
  saveFormParams('i2v');
  const fd = new FormData();
  fd.append('image', i2vSelectedFile);
  fd.append('params', JSON.stringify(params));
  try {
    const r = await fetch(BASE + '/api/v1/generate/i2v', {
      method: 'POST', headers: {'X-API-Key': getKey()}, body: fd
    });
    const d = await r.json();
    if (!r.ok) { alert('Error: ' + (d.detail || JSON.stringify(d))); return; }
    addTask(d.task_id, 'I2V', prompt);
  } catch(e) { alert('请求失败: ' + e.message); }
}

// Task query
async function queryTask() {
  const tid = document.getElementById('query-id').value.trim();
  if (!tid) { alert('请输入任务ID'); return; }
  const box = document.getElementById('query-result');
  box.innerHTML = '<span style="color:#aaa">查询中...</span>';
  try {
    const r = await fetch(BASE + '/api/v1/tasks/' + tid, {headers:{'X-API-Key':getKey()}});
    const d = await r.json();
    if (!r.ok) { box.innerHTML = '<span style="color:#f87171">未找到任务</span>'; return; }
    const pct = Math.round((d.progress || 0) * 100);
    const statusText = {queued:'排队中',running:'生成中',completed:'完成',failed:'失败'}[d.status] || d.status;
    let html = `<div class="task-card"><div class="task-header"><span class="task-id">${d.task_id}</span>
      <span class="status ${d.status}">${statusText}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:#666">${pct}%</div>`;
    if (d.error) html += `<div style="color:#f87171;font-size:13px;margin-top:4px">${d.error}</div>`;
    if (d.video_url) html += `<div class="video-result"><video src="${d.video_url}" controls autoplay loop></video>
      <div style="margin-top:6px"><a href="${d.video_url}" download style="color:#7c83ff;font-size:13px">下载视频</a></div></div>`;
    html += '</div>';
    box.innerHTML = html;
    // Also add to active tasks for polling if still running
    if (d.status === 'running' || d.status === 'queued') {
      activeTasks[d.task_id] = {...(activeTasks[d.task_id]||{type:'?',prompt:'(查询)'}), ...d};
      renderTasks(); pollTask(d.task_id);
    }
  } catch(e) { box.innerHTML = '<span style="color:#f87171">查询失败: ' + e.message + '</span>'; }
}

// Load all task history
async function loadHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '<span style="color:#aaa">加载中...</span>';
  try {
    const r = await fetch(BASE + '/api/v1/tasks', {headers:{'X-API-Key':getKey()}});
    if (!r.ok) { list.innerHTML = '<span style="color:#f87171">加载失败</span>'; return; }
    const tasks = await r.json();
    if (!tasks.length) { list.innerHTML = '<span style="color:#666;font-size:13px">暂无历史任务</span>'; return; }
    // Store for rerun
    window._historyTasks = {};
    tasks.forEach(t => window._historyTasks[t.task_id] = t);
    list.innerHTML = tasks.map(t => {
      const pct = Math.round((t.progress || 0) * 100);
      const statusCls = (t.status || 'queued').toLowerCase();
      const statusText = {queued:'排队中',running:'生成中',completed:'完成',failed:'失败'}[statusCls] || statusCls;
      const modeLabel = {t2v:'T2V',i2v:'I2V'}[t.mode] || t.mode || '';
      const modelLabel = t.model || '';
      const promptText = t.params ? (t.params.prompt||'').substring(0,60) : '';
      const timeStr = t.created_at ? new Date(t.created_at*1000).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      const durStr = t.created_at ? formatDuration(t.created_at, t.completed_at) : '';
      let extra = '';
      if (promptText) extra += `<div style="font-size:12px;color:#aaa;margin:4px 0">${promptText}${(t.params?.prompt||'').length>60?'...':''}</div>`;
      if (t.error) extra += `<div style="color:#f87171;font-size:12px;margin-top:4px">${t.error}</div>`;
      if (t.video_url) extra += `<div class="video-result" style="margin-top:8px"><video src="${t.video_url}" controls loop style="max-width:100%;max-height:300px;border-radius:6px"></video><div style="margin-top:4px"><a href="${t.video_url}" download style="color:#7c83ff;font-size:13px">下载视频</a></div></div>`;
      const rerunBtn = t.params ? `<button class="btn btn-sm" style="margin-left:8px;background:#0f3460;font-size:11px;padding:3px 10px" onclick="rerunTask('${t.task_id}')">重跑</button>` : '';
      const cancelBtn = (statusCls==='queued'||statusCls==='running') ? `<button class="btn btn-sm" style="margin-left:4px;background:#4a1a1a;font-size:11px;padding:3px 10px" onclick="cancelTask('${t.task_id}')">取消</button>` : '';
      return `<div class="task-card">
        <div class="task-header"><span><b>${modeLabel}</b> <span style="color:#888;font-size:12px">${modelLabel}</span> <span style="color:#666;font-size:11px">${timeStr}</span>${durStr ? ` <span style="color:#4ade80;font-size:11px">⏱${durStr}</span>` : ''} <span class="task-id">${t.task_id.substring(0,8)}</span>${rerunBtn}${cancelBtn}</span>
          <span class="status ${statusCls}">${statusText}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:#666">${pct}%</div>
        ${extra}</div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<span style="color:#f87171">加载失败: ' + e.message + '</span>'; }
}

function rerunTask(taskId) {
  const t = window._historyTasks && window._historyTasks[taskId];
  if (!t || !t.params) { alert('无参数信息，无法重跑'); return; }
  const p = t.params;
  const mode = t.mode || 'i2v';
  const prefix = mode === 't2v' ? 't2v' : 'i2v';
  const fps = p.fps || 24;
  const duration = p.num_frames ? framesToDuration(p.num_frames, fps) : '3.3';
  // Fill form fields
  document.getElementById(prefix+'-prompt').value = p.prompt || '';
  document.getElementById(prefix+'-neg').value = p.negative_prompt || '';
  document.getElementById(prefix+'-model').value = p.model || 'a14b';
  document.getElementById(prefix+'-preset').value = p.model_preset || '';
  document.getElementById(prefix+'-w').value = p.width || (mode==='t2v'?848:832);
  document.getElementById(prefix+'-h').value = p.height || 480;
  document.getElementById(prefix+'-duration').value = duration;
  document.getElementById(prefix+'-fps').value = fps;
  document.getElementById(prefix+'-steps').value = p.steps || 20;
  document.getElementById(prefix+'-cfg').value = p.cfg || 6.0;
  document.getElementById(prefix+'-shift').value = p.shift || 5.0;
  document.getElementById(prefix+'-seed').value = p.seed != null ? p.seed : -1;
  document.getElementById(prefix+'-sched').value = p.scheduler || 'unipc';
  if (mode === 'i2v' && document.getElementById('i2v-noise')) {
    document.getElementById('i2v-noise').value = p.noise_aug_strength || 0;
  }
  if (mode === 'i2v') {
    document.getElementById('i2v-motion').value = p.motion_amplitude || 0;
    document.getElementById('i2v-colormatch').value = p.color_match !== false ? 'true' : 'false';
    document.getElementById('i2v-colormatch-method').value = p.color_match_method || 'mkl';
    document.getElementById('i2v-resize').value = p.resize_mode || 'crop_to_new';
  }
  // Select matching LoRAs
  if (p.loras && p.loras.length) {
    const container = prefix + '-loras';
    document.querySelectorAll('#'+container+' .lora-item').forEach(item => {
      const cb = item.querySelector('input[type=checkbox]');
      const idx = parseInt(cb.dataset.idx);
      const match = p.loras.find(l => l.name === allLoras[idx]?.name);
      if (match) {
        cb.checked = true; item.classList.add('selected');
        item.querySelector('.lora-strength').value = match.strength;
      } else {
        cb.checked = false; item.classList.remove('selected');
      }
    });
  }
  // Switch to the right tab
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${mode}"]`).classList.add('active');
  document.getElementById('panel-'+mode).classList.add('active');
}

// LoRA download
async function downloadLora() {
  const url = document.getElementById('dl-url').value.trim();
  const filename = document.getElementById('dl-filename').value.trim();
  const token = document.getElementById('dl-token').value.trim();
  if (!url) { alert('请输入下载链接'); return; }
  const box = document.getElementById('dl-status');
  box.innerHTML = '<div class="dl-item">正在获取文件信息...</div>';
  try {
    const r = await fetch(BASE + '/api/v1/loras/download', {
      method: 'POST', headers: {'Content-Type':'application/json','X-API-Key':getKey()},
      body: JSON.stringify({url, filename, token})
    });
    const d = await r.json();
    if (!r.ok) { box.innerHTML = `<div class="dl-item" style="border-color:#f87171">${d.detail || JSON.stringify(d)}</div>`; return; }
    box.innerHTML = `<div class="dl-item">下载中: <span class="dl-name">${d.filename}</span> (ID: ${d.download_id})</div>`;
    pollDownload(d.download_id, d.filename);
  } catch(e) { box.innerHTML = `<div class="dl-item" style="border-color:#f87171">请求失败: ${e.message}</div>`; }
}

async function pollDownload(dlId, filename) {
  const box = document.getElementById('dl-status');
  const poll = async () => {
    try {
      const r = await fetch(BASE + '/api/v1/loras/download/' + dlId, {headers:{'X-API-Key':getKey()}});
      const d = await r.json();
      if (d.status === 'completed') {
        box.innerHTML = `<div class="dl-item" style="border-color:#4ade80">完成: <span class="dl-name">${filename}</span></div>`;
        refreshLoraFiles();
        return;
      } else if (d.status === 'failed') {
        box.innerHTML = `<div class="dl-item" style="border-color:#f87171">失败: ${d.error}</div>`;
        return;
      }
    } catch(e) {}
    setTimeout(poll, 3000);
  };
  poll();
}

async function refreshLoraFiles() {
  try {
    const r = await fetch(BASE + '/api/v1/loras/files', {headers:{'X-API-Key':getKey()}});
    if (!r.ok) return;
    const files = await r.json();
    const list = document.getElementById('lora-file-list');
    if (!files.length) { list.innerHTML = '<span style="color:#666;font-size:13px">暂无文件</span>'; return; }
    list.innerHTML = files.map(f => `<div class="file-item"><span>${f.name}</span><span style="color:#888">${f.size_mb} MB</span></div>`).join('');
  } catch(e) {}
}

// Task management
function addTask(taskId, type, prompt) {
  activeTasks[taskId] = {type, prompt};
  renderTasks();
  pollTask(taskId);
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const ids = Object.keys(activeTasks).reverse();
  if (!ids.length) { list.innerHTML = '<p style="color:#666;font-size:13px">暂无任务</p>'; return; }
  list.innerHTML = ids.map(id => {
    const t = activeTasks[id];
    const pct = Math.round((t.progress || 0) * 100);
    const statusCls = (t.status || 'queued').toLowerCase();
    const statusText = {queued:'排队中',running:'生成中',completed:'完成',failed:'失败'}[statusCls] || statusCls;
    let videoHtml = '';
    if (t.video_url) {
      videoHtml = `<div class="video-result"><video src="${t.video_url}" controls autoplay loop></video>
        <div style="margin-top:6px"><a href="${t.video_url}" download style="color:#7c83ff;font-size:13px">下载视频</a></div></div>`;
    }
    let errorHtml = t.error ? `<div style="color:#f87171;font-size:13px;margin-top:4px">${t.error}</div>` : '';
    const promptText = (t.prompt||'').substring(0,80) + ((t.prompt||'').length>80?'...':'');
    const durStr = t.created_at ? formatDuration(t.created_at, t.completed_at) : '';
    const cancelBtn = (statusCls==='queued'||statusCls==='running') ? `<button class="btn btn-sm" style="margin-left:8px;background:#4a1a1a;font-size:11px;padding:3px 10px" onclick="cancelTask('${id}')">取消</button>` : '';
    return `<div class="task-card">
      <div class="task-header"><span><b>${t.type||''}</b> <span class="task-id">${id}</span>${durStr ? ` <span style="color:#4ade80;font-size:11px">⏱${durStr}</span>` : ''}${cancelBtn}</span>
        <span class="status ${statusCls}">${statusText}</span></div>
      <div style="font-size:13px;color:#aaa;margin-bottom:6px">${promptText}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:#666">${pct}%</div>
      ${errorHtml}${videoHtml}</div>`;
  }).join('');
}

async function cancelTask(taskId) {
  if (!confirm('确定取消此任务？')) return;
  try {
    const r = await fetch(BASE + '/api/v1/tasks/' + taskId + '/cancel', {
      method: 'POST', headers: {'X-API-Key': getKey()}
    });
    if (r.ok) {
      activeTasks[taskId] = {...activeTasks[taskId], status:'failed', error:'Cancelled by user'};
      renderTasks();
    } else {
      const d = await r.json();
      alert(d.detail || '取消失败');
    }
  } catch(e) { alert('取消失败: ' + e.message); }
}

async function pollTask(taskId) {
  const poll = async () => {
    try {
      const r = await fetch(BASE + '/api/v1/tasks/' + taskId, {headers:{'X-API-Key':getKey()}});
      if (!r.ok) return;
      const d = await r.json();
      activeTasks[taskId] = {...activeTasks[taskId], ...d};
      renderTasks();
      if (d.status === 'completed' || d.status === 'failed') return;
    } catch(e) {}
    setTimeout(poll, 3000);
  };
  poll();
}

// CivitAI search
let civitaiNextCursor = '';
let civitaiLoraFiles = []; // filenames on disk for "downloaded" detection

async function loadCivitaiLoraFiles() {
  try {
    const r = await fetch(BASE + '/api/v1/loras/files', {headers:{'X-API-Key':getKey()}});
    if (r.ok) civitaiLoraFiles = (await r.json()).map(f => f.name.toLowerCase());
  } catch(e) {}
}

function isCivitaiDownloaded(versions) {
  if (!versions || !versions.length) return false;
  for (const v of versions) {
    if (v.download_url) {
      const parts = v.download_url.split('/');
      const fname = (parts[parts.length-1]||'').split('?')[0].toLowerCase();
      if (fname && civitaiLoraFiles.includes(fname)) return true;
    }
    const vname = (v.name||'').toLowerCase().replace(/\s+/g,'');
    if (civitaiLoraFiles.some(f => f.includes(vname) && vname.length > 3)) return true;
  }
  return false;
}

function _buildCivitaiUrl(cursor) {
  const query = document.getElementById('civitai-query').value.trim() || 'wan 2.1';
  const baseModel = document.getElementById('civitai-basemodel').value;
  const sort = document.getElementById('civitai-sort').value;
  const nsfw = document.getElementById('civitai-nsfw').checked;
  let url = BASE + '/api/v1/civitai/search?query=' + encodeURIComponent(query) + '&limit=50&nsfw=' + nsfw + '&sort=' + encodeURIComponent(sort);
  if (baseModel) url += '&base_model=' + encodeURIComponent(baseModel);
  if (cursor) url += '&cursor=' + encodeURIComponent(cursor);
  return url;
}

async function searchCivitAI(cursor) {
  cursor = cursor || '';
  const box = document.getElementById('civitai-results');
  if (!cursor) {
    box.innerHTML = '<span style="color:#aaa">搜索中...</span>';
  }
  await loadCivitaiLoraFiles();
  try {
    const r = await fetch(_buildCivitaiUrl(cursor), {headers:{'X-API-Key':getKey()}});
    if (!r.ok) { box.innerHTML = '<span style="color:#f87171">搜索失败</span>'; return; }
    const data = await r.json();
    civitaiNextCursor = data.next_cursor || '';
    renderCivitAIResults(data, !!cursor);
  } catch(e) { box.innerHTML = '<span style="color:#f87171">搜索失败: ' + e.message + '</span>'; }
}

function renderCivitAIResults(data, append) {
  const box = document.getElementById('civitai-results');
  if (!data.items || !data.items.length) {
    if (!append) box.innerHTML = '<span style="color:#666">无结果</span>';
    return;
  }
  const cardsHtml = data.items.map(m => {
    const downloaded = isCivitaiDownloaded(m.versions);
    const isVideo = m.preview_url && /\.(mp4|webm)$/i.test(m.preview_url);
    const previewClick = m.preview_url ? `onclick="openPreviewModal('${m.preview_url}', ${isVideo})"` : '';
    let previewHtml;
    if (m.preview_url && isVideo) {
      previewHtml = `<video src="${m.preview_url}" muted autoplay loop playsinline referrerpolicy="no-referrer" style="width:100%;height:140px;object-fit:cover;cursor:pointer" ${previewClick}></video>`;
    } else if (m.preview_url) {
      previewHtml = `<img src="${m.preview_url}" alt="${m.name}" loading="lazy" referrerpolicy="no-referrer" style="cursor:pointer" ${previewClick}>`;
    } else {
      previewHtml = '<div style="height:140px;background:#111;display:flex;align-items:center;justify-content:center;color:#444;font-size:12px">No Preview</div>';
    }
    const tags = (m.tags||[]).slice(0,4).join(', ');
    const dl = m.stats ? (m.stats.downloadCount||0).toLocaleString() : '0';
    const versions = m.versions||[];
    const tw = versions.length && versions[0].trained_words ? versions[0].trained_words.slice(0,3).join(', ') : '';
    // Build file options: merge HIGH/LOW pairs
    const allFiles = [];
    versions.forEach(v => {
      (v.files||[]).forEach(f => {
        allFiles.push({name: f.name, url: f.download_url, size: f.size_mb, version: v.name, base: v.base_model});
      });
    });
    // Group: try to pair HIGH/LOW by matching base name
    const groups = [];
    const used = new Set();
    for (let i = 0; i < allFiles.length; i++) {
      if (used.has(i)) continue;
      const f = allFiles[i];
      const isH = /[-_](H|HIGH)[-_.]|[-_](H|HIGH)$/i.test(f.name);
      const isL = /[-_](L|LOW)[-_.]|[-_](L|LOW)$/i.test(f.name);
      if (isH || isL) {
        // Find the counterpart
        const pairRe = isH ? /[-_](L|LOW)[-_.]|[-_](L|LOW)$/i : /[-_](H|HIGH)[-_.]|[-_](H|HIGH)$/i;
        const pairIdx = allFiles.findIndex((g, j) => j !== i && !used.has(j) && pairRe.test(g.name));
        if (pairIdx >= 0) {
          used.add(i); used.add(pairIdx);
          const hFile = isH ? f : allFiles[pairIdx];
          const lFile = isH ? allFiles[pairIdx] : f;
          const baseName = hFile.name.replace(/[-_](H|HIGH)[-_.]/i, '').replace('.safetensors','');
          groups.push({label: baseName + ' (H+L ' + (hFile.size+lFile.size).toFixed(0) + 'MB)', files: [hFile, lFile], base: hFile.base});
          continue;
        }
      }
      used.add(i);
      const label = f.name.replace('.safetensors','');
      groups.push({label: label + ' (' + f.size + 'MB)', files: [f], base: f.base});
    }
    const fileOpts = groups.map((g,i) => `<option value="${i}">${g.label}</option>`).join('');
    const badgeHtml = downloaded ? '<span class="card-badge">已下载</span>' : '';
    const dlCls = downloaded ? ' downloaded' : '';
    return `<div class="civitai-card${dlCls}" data-model-id="${m.id}" data-groups='${JSON.stringify(groups).replace(/'/g,"&#39;")}'>
      <input type="checkbox" class="card-check" data-mid="${m.id}" onchange="updateCivitaiBatch()">
      ${badgeHtml}
      ${previewHtml}
      <div class="card-body">
        <div class="card-title" title="${m.name}">${m.name}</div>
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
        <div class="card-meta">DL: ${dl}${versions[0] ? ' | '+versions[0].base_model : ''}</div>
        ${tw ? `<div class="card-tw" title="${tw}">${tw}</div>` : ''}
        <div class="card-actions">
          <select id="cv-${m.id}">${fileOpts}</select>
          <button class="btn btn-sm" style="padding:3px 10px;font-size:11px" onclick="downloadFromCivitAI(${m.id})">下载</button>
        </div>
      </div>
    </div>`;
  }).join('');

  if (append) {
    // Append to existing grid
    const grid = box.querySelector('.civitai-grid');
    if (grid) {
      grid.insertAdjacentHTML('beforeend', cardsHtml);
    } else {
      box.innerHTML = '<div class="civitai-grid">' + cardsHtml + '</div>';
    }
  } else {
    box.innerHTML = '<div class="civitai-grid">' + cardsHtml + '</div>';
  }
  // Pagination
  const pages = document.getElementById('civitai-pages');
  pages.innerHTML = civitaiNextCursor
    ? `<button class="btn btn-sm" style="background:#333" onclick="searchCivitAI('${civitaiNextCursor}')">加载更多</button>`
    : '';
  updateCivitaiBatch();
}

function updateCivitaiBatch() {
  const checks = document.querySelectorAll('.card-check:checked');
  const bar = document.getElementById('civitai-batch');
  document.getElementById('civitai-sel-count').textContent = checks.length;
  bar.style.display = checks.length > 0 ? 'flex' : 'none';
}

function clearCivitAISelection() {
  document.querySelectorAll('.card-check').forEach(c => c.checked = false);
  updateCivitaiBatch();
}

async function batchDownloadCivitAI() {
  const checks = document.querySelectorAll('.card-check:checked');
  if (!checks.length) return;
  const box = document.getElementById('civitai-dl-status');
  box.innerHTML += `<div class="dl-item">开始批量下载 ${checks.length} 个模型...</div>`;
  for (const cb of checks) {
    const mid = parseInt(cb.dataset.mid);
    await downloadFromCivitAI(mid);
  }
  clearCivitAISelection();
}

async function downloadFromCivitAI(modelId) {
  const card = document.querySelector(`.civitai-card[data-model-id="${modelId}"]`);
  if (!card) return;
  const groups = JSON.parse(card.dataset.groups || '[]');
  const sel = document.getElementById('cv-' + modelId);
  const idx = sel ? parseInt(sel.value) : 0;
  const group = groups[idx];
  if (!group || !group.files.length) return;
  const box = document.getElementById('civitai-dl-status');
  for (const file of group.files) {
    box.innerHTML += `<div class="dl-item">开始下载: <span class="dl-name">${file.name}</span></div>`;
    try {
      const r = await fetch(BASE + '/api/v1/civitai/download', {
        method:'POST', headers:{'Content-Type':'application/json','X-API-Key':getKey()},
        body: JSON.stringify({model_id: modelId, download_url: file.url, filename: file.name})
      });
      const d = await r.json();
      if (!r.ok) { box.innerHTML += `<div class="dl-item" style="border-color:#f87171">${d.detail||JSON.stringify(d)}</div>`; continue; }
      pollCivitAIDl(d.download_id, d.filename);
    } catch(e) { box.innerHTML += `<div class="dl-item" style="border-color:#f87171">${e.message}</div>`; }
  }
}

async function downloadAllFiles(modelId) {
  // Legacy: redirect to downloadFromCivitAI which now handles groups
  await downloadFromCivitAI(modelId);
}

// Preview modal
function openPreviewModal(url, isVideo) {
  const modal = document.getElementById('preview-modal');
  const content = document.getElementById('preview-modal-content');
  if (isVideo) {
    content.innerHTML = `<button onclick="closePreviewModal()" style="position:absolute;top:-12px;right:-12px;background:#333;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;z-index:1">×</button>
      <video src="${url}" controls autoplay loop style="max-width:90vw;max-height:85vh;border-radius:8px" referrerpolicy="no-referrer"></video>`;
  } else {
    content.innerHTML = `<button onclick="closePreviewModal()" style="position:absolute;top:-12px;right:-12px;background:#333;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;z-index:1">×</button>
      <img src="${url}" style="max-width:90vw;max-height:85vh;border-radius:8px" referrerpolicy="no-referrer">`;
  }
  modal.style.display = 'flex';
}

function closePreviewModal() {
  const modal = document.getElementById('preview-modal');
  modal.style.display = 'none';
  const content = document.getElementById('preview-modal-content');
  // Stop video playback
  const vid = content.querySelector('video');
  if (vid) vid.pause();
}

async function pollCivitAIDl(dlId, filename) {
  const box = document.getElementById('civitai-dl-status');
  const poll = async () => {
    try {
      const r = await fetch(BASE + '/api/v1/civitai/download/' + dlId, {headers:{'X-API-Key':getKey()}});
      const d = await r.json();
      if (d.status === 'completed') {
        box.innerHTML = `<div class="dl-item" style="border-color:#4ade80">完成: <span class="dl-name">${filename}</span></div>`;
        loadLoras();
        return;
      } else if (d.status === 'failed') {
        box.innerHTML = `<div class="dl-item" style="border-color:#f87171">失败: ${d.error}</div>`;
        return;
      }
    } catch(e) {}
    setTimeout(poll, 3000);
  };
  poll();
}

// Prompt optimization modal
let _promptModalResolve = null;
let _promptModalOriginal = '';

function openPromptModal(original, optimized, explanation, triggers) {
  document.getElementById('modal-original').textContent = original;
  document.getElementById('modal-optimized').value = optimized;
  document.getElementById('modal-explanation').textContent = explanation || '';
  document.getElementById('modal-triggers').textContent = triggers.length ? 'Trigger words: ' + triggers.join(', ') : '';
  const modal = document.getElementById('prompt-modal');
  modal.style.display = 'flex';
  _promptModalOriginal = original;
  return new Promise(resolve => { _promptModalResolve = resolve; });
}

function closePromptModal(useOptimized) {
  document.getElementById('prompt-modal').style.display = 'none';
  if (_promptModalResolve) {
    _promptModalResolve(useOptimized ? document.getElementById('modal-optimized').value : _promptModalOriginal);
    _promptModalResolve = null;
  }
}

async function maybeOptimizePrompt(prompt, loraNames, mode) {
  try {
    const r = await fetch(BASE + '/api/v1/prompt/optimize', {
      method:'POST', headers:{'Content-Type':'application/json','X-API-Key':getKey()},
      body: JSON.stringify({prompt, lora_names: loraNames, mode})
    });
    if (!r.ok) { const d = await r.json(); alert('优化失败: ' + (d.detail||'')); return prompt; }
    const d = await r.json();
    return await openPromptModal(d.original_prompt, d.optimized_prompt, d.explanation, d.trigger_words_used||[]);
  } catch(e) { alert('优化请求失败: ' + e.message); return prompt; }
}

async function optimizePrompt(mode, btn) {
  const promptEl = document.getElementById(mode + '-prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) { alert('请先输入提示词'); return; }
  const loras = getSelectedLoras(mode + '-loras');
  const duration = parseFloat(document.getElementById(mode + '-duration').value) || 3.3;
  btn.disabled = true; btn.textContent = '优化中...';
  try {
    const body = {prompt, lora_names: loras.map(l=>l.name), mode, duration};
    // For I2V, include the image for scene understanding
    if (mode === 'i2v') {
      const previewImg = document.getElementById('i2v-img-preview');
      if (previewImg && previewImg.src && previewImg.style.display !== 'none') {
        body.image_base64 = previewImg.src;
      }
    }
    const r = await fetch(BASE + '/api/v1/prompt/optimize', {
      method:'POST', headers:{'Content-Type':'application/json','X-API-Key':getKey()},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { alert('优化失败: ' + (d.detail||'')); return; }
    const box = document.getElementById(mode + '-preview');
    document.getElementById(mode + '-preview-text').textContent = d.optimized_prompt;
    const explainEl = document.getElementById(mode + '-preview-explain');
    let explainText = d.explanation || '';
    if (d.trigger_words_used && d.trigger_words_used.length) {
      explainText += (explainText ? '\n' : '') + 'Trigger words: ' + d.trigger_words_used.join(', ');
    }
    explainEl.textContent = explainText;
    box.style.display = 'block';
    box.dataset.optimized = d.optimized_prompt;
  } catch(e) { alert('优化请求失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'AI 优化 Prompt'; }
}

function applyPreview(mode) {
  const box = document.getElementById(mode + '-preview');
  const promptEl = document.getElementById(mode + '-prompt');
  promptEl.value = box.dataset.optimized || '';
  box.style.display = 'none';
}

function dismissPreview(mode) {
  document.getElementById(mode + '-preview').style.display = 'none';
}

// Init
loadPresets();
loadLoras();
restoreFormParams('t2v');
restoreFormParams('i2v');
