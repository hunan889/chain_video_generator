<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高级视频生成</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0}
.container{max-width:1400px;margin:0 auto;padding:20px}
h2{color:#7c83ff;margin-bottom:20px;font-size:1.4em}
.section{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.row{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.field{flex:1;min-width:200px}
.field label{display:block;margin-bottom:6px;font-size:13px;color:#aaa}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.field textarea{resize:vertical;min-height:80px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#7c83ff}
.upload-area{border:2px dashed #444;border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;min-height:150px;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;background:#0a0a23}
.upload-area:hover{border-color:#7c83ff}
.upload-area img{max-width:100%;max-height:200px;border-radius:6px}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area .placeholder{color:#666;font-size:13px}
.btn{padding:12px 32px;background:#7c83ff;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;transition:background .2s}
.btn:hover{background:#5a62e0}
.btn:disabled{background:#444;cursor:not-allowed}
.btn-row{text-align:center;margin-top:20px}
.mode-tabs{display:flex;gap:10px;margin-bottom:20px}
.mode-tab{flex:1;padding:12px;background:#0a0a23;border:1px solid #444;border-radius:6px;cursor:pointer;text-align:center;transition:all .2s;font-size:14px}
.mode-tab:hover{border-color:#7c83ff}
.mode-tab.active{background:#0f3460;border-color:#7c83ff;color:#7c83ff}
.collapsible{cursor:pointer;padding:10px 16px;background:#0f3460;border:1px solid #444;border-radius:6px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;user-select:none;font-size:14px}
.collapsible:hover{background:#16213e}
.collapsible-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease-out}
.collapsible-content.active{max-height:3000px}
.progress-section{display:none;margin-top:20px}
.progress-section.active{display:block}
.stage{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:16px;margin-bottom:12px}
.stage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stage-name{font-weight:600;font-size:14px;color:#7c83ff}
.stage-status{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.stage-status.pending{background:#333;color:#888}
.stage-status.running{background:#0f3460;color:#7c83ff}
.stage-status.completed{background:#1a4a2e;color:#4ade80}
.stage-status.failed{background:#4a1a1a;color:#f87171}
.stage-details{font-size:12px;color:#888;margin-top:8px;white-space:pre-wrap;display:none}
.stage-details.active{display:block}
.stage-toggle{font-size:11px;color:#7c83ff;cursor:pointer;text-decoration:underline}
.result-section{display:none;margin-top:20px}
.result-section.active{display:block}
.result-video{text-align:center}
.result-video video{max-width:100%;border-radius:8px;max-height:500px}
.result-actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#7c83ff;border-radius:50%;animation:spin 0.6s linear infinite;margin-left:8px}
</style>
</head>
<body>
<div class="container">
<h2>🎬 高级视频生成工作流</h2>

<!-- 主要参数 -->
<div class="section">
<div class="field">
<label>提示词 Prompt</label>
<textarea id="prompt" placeholder="描述你想要生成的视频内容..."></textarea>
</div>

<div class="row" style="margin-top:16px">
<div class="field">
<label>上传图片作用</label>
<select id="imageRole">
<option value="first_frame">首帧（直接作为视频第一帧）</option>
<option value="full_body_reference">全身参考（换脸+换装）</option>
<option value="face_reference">仅换脸（只换脸部）</option>
</select>
</div>
<div class="field">
<label>分辨率</label>
<select id="resolution">
<option value="720p">720p</option>
<option value="1080p">1080p</option>
</select>
</div>
<div class="field">
<label>宽高比</label>
<select id="aspectRatio">
<option value="16:9">16:9 横屏</option>
<option value="9:16">9:16 竖屏</option>
<option value="3:4">3:4 竖屏</option>
<option value="4:3">4:3 横屏</option>
</select>
</div>
<div class="field">
<label>时长</label>
<select id="duration">
<option value="5">5秒</option>
<option value="10">10秒</option>
<option value="15">15秒</option>
</select>
</div>
</div>

<div class="row">
<div class="field">
<label>上传图片</label>
<div class="upload-area" id="uploadArea">
<input type="file" id="imageFile" accept="image/*">
<div class="placeholder">点击或拖拽上传图片</div>
<img id="imagePreview" style="display:none">
</div>
</div>
</div>
</div>

<!-- 高级参数（折叠） -->
<div class="collapsible" onclick="toggleCollapsible(this)">
<span>⚙️ 高级内部参数配置</span>
<span>▼</span>
</div>
<div class="collapsible-content">
<div class="section">
<div class="row">
<div class="field">
<label>首帧来源策略</label>
<select id="firstFrameSource">
<option value="generate">T2I生成</option>
<option value="select_existing">选择已有图片</option>
</select>
</div>
<div class="field">
<label>SeeDream编辑模式</label>
<select id="seedreamMode">
<option value="face_wearings">面部+配饰</option>
<option value="face_only">仅面部</option>
<option value="full_body">全身</option>
</select>
</div>
</div>

<div class="row">
<div class="field">
<label>是否启用Reactor换脸</label>
<select id="enableReactor">
<option value="true">启用</option>
<option value="false">禁用</option>
</select>
</div>
<div class="field">
<label>自动分析Prompt</label>
<select id="autoAnalyze">
<option value="true">启用</option>
<option value="false">禁用</option>
</select>
</div>
<div class="field">
<label>自动选择LORA</label>
<select id="autoLora">
<option value="true">启用</option>
<option value="false">禁用</option>
</select>
</div>
<div class="field">
<label>自动优化Prompt</label>
<select id="autoPrompt">
<option value="true">启用</option>
<option value="false">禁用</option>
</select>
</div>
</div>

<div class="row">
<div class="field">
<label>视频生成模型</label>
<select id="videoModel">
<option value="A14B">A14B (高质量)</option>
<option value="5B">5B (快速)</option>
</select>
</div>
<div class="field">
<label>采样步数</label>
<input type="number" id="steps" value="20" min="10" max="50">
</div>
<div class="field">
<label>CFG Scale</label>
<input type="number" id="cfg" value="6.0" min="1" max="20" step="0.5">
</div>
<div class="field">
<label>Shift</label>
<input type="number" id="shift" value="5.0" min="0" max="10" step="0.5">
</div>
</div>

<div class="row">
<div class="field">
<label>T2I采样步数</label>
<input type="number" id="t2iSteps" value="20" min="10" max="50">
</div>
<div class="field">
<label>T2I CFG Scale</label>
<input type="number" id="t2iCfg" value="7.0" min="1" max="20" step="0.5">
</div>
<div class="field">
<label>调度器</label>
<select id="scheduler">
<option value="unipc">UniPC</option>
<option value="euler">Euler</option>
<option value="ddim">DDIM</option>
</select>
</div>
</div>
</div>
</div>

<div class="btn-row">
<button class="btn" id="generateBtn" onclick="generateVideo()">🎬 生成视频</button>
</div>

<!-- 进度展示 -->
<div class="progress-section" id="progressSection">
<div class="section">
<h3 style="color:#7c83ff;margin-bottom:16px">执行进度</h3>
<div id="stagesContainer"></div>
</div>
</div>

<!-- 结果展示 -->
<div class="result-section" id="resultSection">
<div class="section">
<h3 style="color:#4ade80;margin-bottom:16px">✅ 生成完成</h3>
<div class="result-video">
<video id="resultVideo" controls></video>
</div>
<div class="result-actions">
<button class="btn" onclick="downloadVideo()">📥 下载视频</button>
<button class="btn" onclick="resetForm()" style="background:#333">🔄 重新生成</button>
</div>
</div>
</div>

</div>

<script>
let currentWorkflowId = null;
let pollInterval = null;

// 图片上传预览
document.getElementById('imageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('imagePreview');
            preview.src = e.target.result;
            preview.style.display = 'block';
            document.querySelector('.upload-area .placeholder').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

// 折叠面板
function toggleCollapsible(elem) {
    const content = elem.nextElementSibling;
    content.classList.toggle('active');
    const arrow = elem.querySelector('span:last-child');
    arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
}

// 生成视频
async function generateVideo() {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) {
        alert('请输入提示词');
        return;
    }

    const imageFile = document.getElementById('imageFile').files[0];
    const imageRole = document.getElementById('imageRole').value;

    // 如果不是首帧模式，必须上传图片
    if (imageRole !== 'first_frame' && !imageFile) {
        alert('请上传参考图片');
        return;
    }

    // 上传图片到后端获取URL
    let imageUrl = null;
    if (imageFile) {
        try {
            const formData = new FormData();
            formData.append('file', imageFile);

            const uploadResponse = await fetch('/api/v1/upload', {
                method: 'POST',
                headers: {
                    'X-API-Key': localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me'
                },
                body: formData
            });

            if (!uploadResponse.ok) {
                throw new Error('上传图片失败: ' + uploadResponse.statusText);
            }

            const uploadResult = await uploadResponse.json();
            imageUrl = uploadResult.url;
            console.log('图片已上传，URL:', imageUrl);
        } catch (error) {
            alert('上传图片失败: ' + error.message);
            return;
        }
    }

    // 计算分辨率
    const resolution = document.getElementById('resolution').value;
    const aspectRatio = document.getElementById('aspectRatio').value;
    const {width, height} = calculateResolution(resolution, aspectRatio);

    // 构建请求
    const request = {
        mode: imageRole,
        user_prompt: prompt,
        reference_image: imageUrl,  // 用于SeeDream换脸
        uploaded_first_frame: imageUrl,  // 上传的图片URL（首帧模式）
        auto_analyze: document.getElementById('autoAnalyze').value === 'true',
        auto_lora: document.getElementById('autoLora').value === 'true',
        auto_prompt: document.getElementById('autoPrompt').value === 'true',
        seedream_params: {
            edit_mode: document.getElementById('seedreamMode').value,
            enable_reactor_first: document.getElementById('enableReactor').value === 'true'
        },
        video_params: {
            model: document.getElementById('videoModel').value,
            resolution: `${resolution}_${aspectRatio.replace(':', '_')}`,
            duration: document.getElementById('duration').value + 's',
            steps: parseInt(document.getElementById('steps').value),
            cfg: parseFloat(document.getElementById('cfg').value)
        },
        internal_config: {
            first_frame_source: document.getElementById('firstFrameSource').value,
            seedream_mode: document.getElementById('seedreamMode').value,
            enable_reactor: document.getElementById('enableReactor').value === 'true',
            shift: parseFloat(document.getElementById('shift').value),
            scheduler: document.getElementById('scheduler').value,
            t2i_params: {
                steps: parseInt(document.getElementById('t2iSteps').value),
                cfg_scale: parseFloat(document.getElementById('t2iCfg').value),
                width: width,
                height: height
            }
        }
    };

    // 禁用按钮
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '生成中... <span class="spinner"></span>';

    try {
        const response = await fetch('/api/v1/workflow/generate-advanced', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me'
            },
            body: JSON.stringify(request)
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const result = await response.json();
        currentWorkflowId = result.workflow_id;

        // 显示进度区域
        document.getElementById('progressSection').classList.add('active');
        document.getElementById('resultSection').classList.remove('active');

        // 开始轮询状态
        startPolling();

    } catch (error) {
        alert('生成失败: ' + error.message);
        btn.disabled = false;
        btn.innerHTML = '🎬 生成视频';
    }
}

// 轮询状态
function startPolling() {
    if (pollInterval) clearInterval(pollInterval);

    pollInterval = setInterval(async () => {
        try {
            const response = await fetch(`/api/v1/workflow/status/${currentWorkflowId}`, {
                headers: {
                    'X-API-Key': localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me'
                }
            });

            if (!response.ok) return;

            const status = await response.json();
            updateProgress(status);

            if (status.status === 'completed') {
                clearInterval(pollInterval);
                showResult(status);
            } else if (status.status === 'failed') {
                clearInterval(pollInterval);
                alert('生成失败: ' + (status.error || '未知错误'));
                resetForm();
            }
        } catch (error) {
            console.error('轮询失败:', error);
        }
    }, 2000);
}

// 更新进度
function updateProgress(status) {
    const container = document.getElementById('stagesContainer');
    container.innerHTML = '';

    const stageNames = {
        'prompt_analysis': '📝 Prompt分析',
        'first_frame_acquisition': '🖼️ 首帧获取',
        'seedream_edit': '✨ SeeDream编辑',
        'video_generation': '🎬 视频生成'
    };

    status.stages.forEach(stage => {
        const stageDiv = document.createElement('div');
        stageDiv.className = 'stage';

        const statusClass = stage.status;
        const statusText = {
            'pending': '等待中',
            'running': '进行中',
            'completed': '已完成',
            'failed': '失败'
        }[stage.status];

        let detailsHtml = '';
        if (stage.status === 'completed' || stage.status === 'failed') {
            const detailsId = `details-${stage.name}`;
            detailsHtml = `
                <div class="stage-toggle" onclick="toggleDetails('${detailsId}')">查看详情</div>
                <div class="stage-details" id="${detailsId}"></div>
            `;
        }

        stageDiv.innerHTML = `
            <div class="stage-header">
                <div class="stage-name">${stageNames[stage.name] || stage.name}</div>
                <div class="stage-status ${statusClass}">${statusText}</div>
            </div>
            ${stage.error ? `<div style="color:#f87171;font-size:12px;margin-top:4px">${stage.error}</div>` : ''}
            ${detailsHtml}
        `;

        container.appendChild(stageDiv);
    });

    // 填充详情（从status中获取）
    if (status.first_frame_url) {
        const details = document.getElementById('details-first_frame_acquisition');
        if (details) {
            details.textContent = `首帧URL: ${status.first_frame_url}`;
        }
    }
    if (status.edited_frame_url) {
        const details = document.getElementById('details-seedream_edit');
        if (details) {
            details.textContent = `编辑后URL: ${status.edited_frame_url}`;
        }
    }
    if (status.chain_id) {
        const details = document.getElementById('details-video_generation');
        if (details) {
            details.textContent = `Chain ID: ${status.chain_id}`;
        }
    }
}

// 切换详情显示
function toggleDetails(id) {
    const elem = document.getElementById(id);
    if (elem) {
        elem.classList.toggle('active');
    }
}

// 显示结果
function showResult(status) {
    document.getElementById('progressSection').classList.remove('active');
    document.getElementById('resultSection').classList.add('active');

    const video = document.getElementById('resultVideo');
    video.src = status.final_video_url;

    const btn = document.getElementById('generateBtn');
    btn.disabled = false;
    btn.innerHTML = '🎬 生成视频';
}

// 下载视频
function downloadVideo() {
    const video = document.getElementById('resultVideo');
    const a = document.createElement('a');
    a.href = video.src;
    a.download = 'video.mp4';
    a.click();
}

// 重置表单
function resetForm() {
    document.getElementById('progressSection').classList.remove('active');
    document.getElementById('resultSection').classList.remove('active');

    const btn = document.getElementById('generateBtn');
    btn.disabled = false;
    btn.innerHTML = '🎬 生成视频';

    if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
    }
}

// 工具函数
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function calculateResolution(resolution, aspectRatio) {
    const ratios = {
        '16:9': [16, 9],
        '9:16': [9, 16],
        '3:4': [3, 4],
        '4:3': [4, 3]
    };

    const [w, h] = ratios[aspectRatio];
    const baseHeight = resolution === '1080p' ? 1080 : 720;

    if (w > h) {
        // 横屏
        return {width: Math.round(baseHeight * w / h), height: baseHeight};
    } else {
        // 竖屏
        return {width: baseHeight, height: Math.round(baseHeight * h / w)};
    }
}
</script>
</body>
</html>
