<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - Wan2.2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 32px;
      color: #7c83ff;
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .stat-item {
      background: rgba(255,255,255,0.05);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .stat-item strong {
      color: #7c83ff;
      margin-right: 4px;
    }

    .filters {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-group label {
      font-size: 14px;
      color: #aaa;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #2a2a3a;
      background: rgba(255,255,255,0.05);
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #7c83ff;
    }

    .filter-btn.active {
      background: #7c83ff;
      border-color: #7c83ff;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(124,131,255,0.2);
      border-color: #7c83ff;
    }

    .card-media {
      width: 100%;
      aspect-ratio: 1;
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }

    .card-media img,
    .card-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-image { background: #4ade80; color: white; }
    .badge-video { background: #ff9e4a; color: white; }
    .badge-pose { background: #a78bfa; color: white; }

    .card-type {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      background: rgba(0,0,0,0.7);
      color: #aaa;
    }

    .card-body {
      padding: 15px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-prompt {
      font-size: 12px;
      color: #aaa;
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #666;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .card-actions {
      position: absolute;
      bottom: 15px;
      right: 15px;
      display: flex;
      gap: 8px;
    }

    .btn-action {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-action:hover {
      background: #7c83ff;
      transform: scale(1.1);
    }

    .btn-unfavorite {
      background: rgba(239,68,68,0.8);
    }

    .btn-unfavorite:hover {
      background: #ef4444;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #7c83ff;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }

    .page-btn {
      padding: 10px 16px;
      border: 1px solid #2a2a3a;
      background: rgba(255,255,255,0.05);
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
      border-color: #7c83ff;
    }

    .page-btn.active {
      background: #7c83ff;
      border-color: #7c83ff;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>❤️ 我的收藏</h1>
      <div class="stats">
        <div class="stat-item">
          <strong id="totalCount">0</strong> 个收藏
        </div>
        <div class="stat-item">
          <strong id="resourceCount">0</strong> 资源
        </div>
        <div class="stat-item">
          <strong id="poseCount">0</strong> 姿势图片
        </div>
      </div>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label>类型:</label>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="resource">资源</button>
        <button class="filter-btn" data-filter="pose_image">姿势图片</button>
      </div>
      <div class="filter-group">
        <label>媒体:</label>
        <button class="filter-btn active" data-media="all">全部</button>
        <button class="filter-btn" data-media="image">图片</button>
        <button class="filter-btn" data-media="video">视频</button>
      </div>
    </div>

    <div id="grid" class="grid"></div>

    <div id="pagination" class="pagination"></div>
  </div>

  <script>
    const API_KEY = 'wan22-default-key-change-me';
    let allFavorites = [];
    let currentFilter = 'all';
    let currentMedia = 'all';
    let currentPage = 1;
    const pageSize = 50;

    async function loadFavorites() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`/api/v1/favorites/all?page=${currentPage}&page_size=${pageSize}`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        allFavorites = data.favorites || [];
        updateStats();
        renderFavorites();
        renderPagination(data.total, data.page, data.total_pages);
      } catch (error) {
        grid.innerHTML = '<div class="empty">加载失败: ' + error.message + '</div>';
      }
    }

    function updateStats() {
      const resourceCount = allFavorites.filter(f => f.type === 'resource').length;
      const poseCount = allFavorites.filter(f => f.type === 'pose_image').length;

      document.getElementById('totalCount').textContent = allFavorites.length;
      document.getElementById('resourceCount').textContent = resourceCount;
      document.getElementById('poseCount').textContent = poseCount;
    }

    function renderFavorites() {
      const grid = document.getElementById('grid');

      let filtered = allFavorites;

      // 类型过滤
      if (currentFilter !== 'all') {
        filtered = filtered.filter(f => f.type === currentFilter);
      }

      // 媒体过滤
      if (currentMedia !== 'all') {
        filtered = filtered.filter(f => f.resource_type === currentMedia);
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <div>暂无收藏</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(fav => {
        const isVideo = fav.resource_type === 'video';
        const isPose = fav.type === 'pose_image';

        const mediaHtml = isVideo
          ? `<video src="${fav.url}" muted loop playsinline onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
          : `<img src="${fav.url}" loading="lazy">`;

        const title = isPose ? fav.filename : (fav.prompt ? fav.prompt.substring(0, 50) : '无标题');
        const prompt = isPose ? `姿势: ${fav.pose}` : (fav.search_keywords || '');

        return `
          <div class="card">
            <div class="card-media">
              ${mediaHtml}
              <span class="card-badge badge-${fav.resource_type}">${fav.resource_type === 'video' ? '视频' : '图片'}</span>
              <span class="card-type">${isPose ? '姿势图片' : '资源'}</span>
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(title)}</div>
              <div class="card-prompt">${escapeHtml(prompt)}</div>
              <div class="card-meta">
                <span>${new Date(fav.created_at).toLocaleDateString()}</span>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-action btn-unfavorite" onclick="removeFavorite('${fav.type}', ${fav.resource_id || null}, '${fav.resource_path || ''}', ${fav.id})" title="取消收藏">
                ❌
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function removeFavorite(type, resourceId, resourcePath, favoriteId) {
      if (!confirm('确定要取消收藏吗？')) return;

      try {
        if (type === 'resource') {
          await fetch(`/api/v1/favorites/${resourceId}`, {
            method: 'DELETE',
            headers: { 'X-API-Key': API_KEY }
          });
        } else if (type === 'pose_image') {
          await fetch(`/api/v1/favorites/pose-image?resource_path=${encodeURIComponent(resourcePath)}`, {
            method: 'DELETE',
            headers: { 'X-API-Key': API_KEY }
          });
        }

        // 重新加载
        await loadFavorites();
      } catch (error) {
        alert('取消收藏失败: ' + error.message);
      }
    }

    function renderPagination(total, page, totalPages) {
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';

      // 上一页
      html += `<button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">上一页</button>`;

      // 页码
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += `<span style="padding:10px;color:#666">...</span>`;
        }
      }

      // 下一页
      html += `<button class="page-btn" ${page === totalPages ? 'disabled' : ''} onclick="goToPage(${page + 1})">下一页</button>`;

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadFavorites();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 过滤器事件
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderFavorites();
      });
    });

    document.querySelectorAll('.filter-btn[data-media]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-media]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMedia = btn.dataset.media;
        renderFavorites();
      });
    });

    // 初始加载
    loadFavorites();
  </script>
</body>
</html>
