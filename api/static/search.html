<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"="width=device-width, initial-scale=1.0">
    <title>资源搜索 - Wan2.2 Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 20px; color: #fff; }

        .search-panel { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .search-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .search-row label { min-width: 100px; color: #ccc; }
        .tag-input-container { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; background: #2a2a2a; padding: 8px; border-radius: 4px; border: 1px solid #3a3a3a; }
        .tag-chip { background: #4a9eff; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .tag-chip .remove { cursor: pointer; font-weight: bold; }
        .tag-chip .remove:hover { color: #ff4a4a; }
        .tag-input-container input { flex: 1; min-width: 150px; background: transparent; border: none; color: #e0e0e0; outline: none; }

        .search-buttons { display: flex; gap: 10px; }
        .search-buttons button { background: #4a9eff; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .search-buttons button:hover { background: #3a8eef; }
        .search-buttons button.secondary { background: #2a2a2a; }
        .search-buttons button.secondary:hover { background: #3a3a3a; }

        .match-mode { display: flex; gap: 15px; }
        .match-mode label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .match-mode input[type="radio"] { cursor: pointer; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .result-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .result-card:hover { transform: translateY(-4px); }
        .result-media { width: 100%; height: 300px; object-fit: cover; background: #0a0a0a; }
        .result-info { padding: 15px; }
        .result-prompt { font-size: 12px; color: #aaa; margin-bottom: 10px; max-height: 60px; overflow-y: auto; }
        .result-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .result-tags .tag { background: #2a2a2a; padding: 3px 6px; border-radius: 3px; font-size: 10px; }
        .result-actions { display: flex; gap: 8px; }
        .result-actions button { flex: 1; background: #4a9eff; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .result-actions button:hover { background: #3a8eef; }

        .pagination { display: flex; justify-content: center; gap: 10px; align-items: center; margin-top: 20px; }
        .pagination button { background: #2a2a2a; color: #e0e0e0; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { background: #3a3a3a; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { color: #aaa; }

        .loading { text-align: center; padding: 40px; color: #aaa; }
        .stats { color: #aaa; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>资源搜索</h1>

        <div class="search-panel">
            <div class="search-row">
                <label>搜索标签：</label>
                <div class="tag-input-container" id="tagInputContainer">
                    <input type="text" id="tagInput" placeholder="输入标签，按回车添加">
                </div>
            </div>

            <div class="search-row">
                <label>匹配模式：</label>
                <div class="match-mode">
                    <label><input type="radio" name="matchMode" value="all" checked> 精确匹配（必须包含所有标签）</label>
                    <label><input type="radio" name="matchMode" value="any"> 模糊匹配（包含任意标签）</label>
                </div>
            </div>

            <div class="search-row">
                <label>资源类型：</label>
                <select id="resourceType" style="background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 8px 12px; border-radius: 4px;">
                    <option value="">全部</option>
                    <option value="image">图片</option>
                    <option value="video">视频</option>
                    <option value="generated_video">生成视频</option>
                </select>
            </div>

            <div class="search-buttons">
                <button onclick="search()">搜索</button>
                <button class="secondary" onclick="clearSearch()">清空</button>
                <button class="secondary" onclick="window.location.href='/'">返回首页</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>
        <div id="resultsGrid" class="results-grid"></div>

        <div class="pagination">
            <button id="prevBtn" onclick="prevPage()">上一页</button>
            <span id="pageInfo">第 1 页</span>
            <button id="nextBtn" onclick="nextPage()">下一页</button>
        </div>
    </div>

    <script>
        const BASE = '';
        const API_KEY = localStorage.getItem('api_key') || '';
        let currentPage = 1;
        const pageSize = 12;
        let totalPages = 1;
        let selectedTags = [];

        const tagInput = document.getElementById('tagInput');
        const tagContainer = document.getElementById('tagInputContainer');

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && tagInput.value.trim()) {
                e.preventDefault();
                addTag(tagInput.value.trim().toLowerCase());
                tagInput.value = '';
            }
        });

        function addTag(tag) {
            if (selectedTags.includes(tag)) return;
            selectedTags.push(tag);
            renderTags();
        }

        function removeTag(tag) {
            selectedTags = selectedTags.filter(t => t !== tag);
            renderTags();
        }

        function renderTags() {
            const chips = selectedTags.map(tag => `
                <span class="tag-chip">
                    ${tag}
                    <span class="remove" onclick="removeTag('${tag}')">×</span>
                </span>
            `).join('');

            tagContainer.innerHTML = chips + '<input type="text" id="tagInput" placeholder="输入标签，按回车添加">';

            const newInput = document.getElementById('tagInput');
            newInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && newInput.value.trim()) {
                    e.preventDefault();
                    addTag(newInput.value.trim().toLowerCase());
                    newInput.value = '';
                }
            });
        }

        async function search() {
            if (selectedTags.length === 0) {
                alert('请至少输入一个标签');
                return;
            }

            const matchMode = document.querySelector('input[name="matchMode"]:checked').value;
            const resourceType = document.getElementById('resourceType').value;

            const params = new URLSearchParams({
                tags: selectedTags.join(','),
                match_mode: matchMode,
                page: currentPage,
                page_size: pageSize
            });
            if (resourceType) params.append('resource_type', resourceType);

            document.getElementById('resultsGrid').innerHTML = '<div class="loading">搜索中...</div>';

            try {
                const response = await fetch(`${BASE}/api/v1/resources/search?${params}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();

                totalPages = data.total_pages;
                renderResults(data.resources, data.total);
                updatePagination();
            } catch (error) {
                document.getElementById('resultsGrid').innerHTML = '<div class="loading">搜索失败</div>';
            }
        }

        function renderResults(resources, total) {
            document.getElementById('stats').textContent = `找到 ${total} 个结果`;

            const grid = document.getElementById('resultsGrid');
            if (resources.length === 0) {
                grid.innerHTML = '<div class="loading">没有找到匹配的资源</div>';
                return;
            }

            grid.innerHTML = resources.map(r => `
                <div class="result-card">
                    ${r.resource_type === 'video' || r.resource_type === 'generated_video'
                        ? `<video class="result-media" src="${r.url}" controls></video>`
                        : `<img class="result-media" src="${r.url}" alt="Resource">`
                    }
                    <div class="result-info">
                        <div class="result-prompt">${r.prompt || '无 prompt'}</div>
                        <div class="result-tags">
                            ${r.tags.map(t => `<span class="tag">${t.name}</span>`).join('')}
                        </div>
                        <div class="result-actions">
                            <button onclick="copyPrompt('${r.prompt.replace(/'/g, "\\'")}')">复制 Prompt</button>
                            <button onclick="usePrompt('${r.prompt.replace(/'/g, "\\'")}')">使用</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function copyPrompt(prompt) {
            navigator.clipboard.writeText(prompt).then(() => {
                alert('Prompt 已复制到剪贴板');
            });
        }

        function usePrompt(prompt) {
            localStorage.setItem('selected_prompt', prompt);
            window.location.href = '/';
        }

        function clearSearch() {
            selectedTags = [];
            renderTags();
            document.getElementById('resultsGrid').innerHTML = '';
            document.getElementById('stats').textContent = '';
            currentPage = 1;
        }

        function updatePagination() {
            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                search();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                search();
            }
        }
    </script>
</body>
</html>
