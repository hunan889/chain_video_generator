<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源管理 - AI Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{text-align:center;color:#7c83ff;margin-bottom:24px;font-size:1.6em}

/* Unified Card Component */
.resource-card{position:relative;background:#16213e;border:2px solid #333;border-radius:12px;overflow:hidden;transition:all 0.3s ease}
.resource-card:hover{border-color:#7c83ff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,131,255,0.3)}

/* Favorite Button */
.btn-favorite{position:absolute;top:8px;left:8px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.btn-favorite:hover{transform:scale(1.1)}
.btn-favorite[data-favorited="true"]{background:#ff9e4a}
.btn-favorite[data-favorited="true"] .heart-icon{fill:white}
.btn-favorite[data-favorited="false"] .heart-icon{fill:none;stroke:white;stroke-width:2}
.btn-favorite.animating{animation:pulse 0.3s ease-in-out}
.btn-favorite.success{animation:success-pop 0.3s ease-in-out}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes success-pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.heart-icon{width:18px;height:18px}

/* Card Badges */
.card-badges{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px;flex-direction:column;align-items:flex-end}
.badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-image{background:#4ade80;color:#000}
.badge-video{background:#f87171;color:#fff}
.badge-lora{background:#fbbf24;color:#000}
.badge-pose{background:#a78bfa;color:#fff}

/* Card Media */
.card-media{position:relative;width:100%;height:280px;background:#0a0a23;overflow:hidden}
.card-media img,.card-media video{width:100%;height:100%;object-fit:cover}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;gap:12px;opacity:0;transition:opacity 0.2s;pointer-events:none}
.card-media:hover .card-overlay{opacity:1;pointer-events:auto}
.btn-quick-action{width:48px;height:48px;border-radius:50%;background:rgba(124,131,255,0.9);border:none;font-size:20px;cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:center}
.btn-quick-action:hover{transform:scale(1.15);background:#7c83ff}

/* Card Body */
.card-body{padding:12px}
.card-title{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-prompt{font-size:11px;color:#aaa;line-height:1.4;max-height:2.8em;overflow:hidden;margin-bottom:8px}
.card-poses{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.pose-badge{padding:3px 8px;background:#0a0a23;border:1px solid #444;border-radius:4px;font-size:10px;color:#7c83ff}
.pose-badge-more{padding:3px 8px;background:#0a0a23;border:1px solid #444;border-radius:4px;font-size:10px;color:#aaa}

/* Pose Association Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.pose-association-modal{background:#1a1a2e;border:1px solid #333;border-radius:12px;width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:20px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{color:#7c83ff;font-size:1.2em;margin:0}
.modal-close{background:transparent;border:none;color:#aaa;font-size:28px;cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:color 0.2s}
.modal-close:hover{color:#fff}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.pose-search{width:100%;padding:10px 14px;background:#0a0a23;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:16px}
.pose-search:focus{outline:none;border-color:#7c83ff}
.pose-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.pose-card{position:relative;padding:16px;background:#16213e;border:2px solid #333;border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s}
.pose-card:hover{border-color:#7c83ff;transform:translateY(-2px)}
.pose-card.associated{border-color:#4ade80;background:#1a4a2e}
.pose-card-name{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:4px}
.pose-card-key{font-size:11px;color:#aaa}
.check-mark{position:absolute;top:4px;right:4px;width:24px;height:24px;background:#4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:bold}
.pose-options{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.mini-select{width:100%;padding:4px 6px;font-size:11px;background:#0a0a23;border:1px solid #444;color:#e0e0e0;border-radius:4px}
.modal-footer{padding:16px 20px;border-top:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.association-summary{font-size:13px;color:#aaa}
.btn-primary{padding:10px 24px;background:#7c83ff;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:#6b72e0}

.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:10px 24px;background:#16213e;border:1px solid #333;border-radius:8px 8px 0 0;cursor:pointer;color:#aaa;font-size:14px}
.tab.active{background:#0f3460;border-color:#7c83ff;color:#fff}

.sub-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{padding:8px 18px;background:#0a0a23;border:1px solid #444;border-radius:6px;cursor:pointer;color:#aaa;font-size:13px}
.sub-tab.active{background:#16213e;border-color:#7c83ff;color:#7c83ff}

.filters{background:#16213e;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:20px}
.filter-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-row:last-child{margin-bottom:0}
.filter-group{display:flex;gap:8px;align-items:center}
.filter-group label{font-size:13px;color:#aaa;white-space:nowrap}
.filter-group select,.filter-group input[type=text]{padding:6px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:13px;min-width:150px}
.filter-group input[type=checkbox]{width:18px;height:18px;accent-color:#7c83ff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}
.card{background:#16213e;border:1px solid #333;border-radius:8px;overflow:hidden;position:relative}
.card .media-container{width:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center}
.card .media-container.video{aspect-ratio:9/16}
.card .media-container.image{height:280px}
.card .media-container.lora{height:200px}
.card video{width:100%;height:100%;object-fit:contain;cursor:pointer}
.card video:hover{opacity:1}
.card img{max-width:100%;max-height:100%;object-fit:contain}
.card .card-body{padding:12px}
.card .card-title{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:8px;word-break:break-word}
.card .card-prompt{font-size:11px;color:#aaa;margin-bottom:8px;line-height:1.4;max-height:50px;overflow:hidden}

.edit-section{margin-top:10px;padding-top:10px;border-top:1px solid #333}
.edit-field{margin-bottom:10px}
.edit-field label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.edit-field input,.edit-field textarea,.edit-field select{width:100%;padding:6px 8px;background:#0a0a23;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:12px;font-family:inherit}
.edit-field textarea{resize:vertical;min-height:60px;line-height:1.4}
.edit-field input:focus,.edit-field textarea:focus,.edit-field select:focus{outline:none;border-color:#7c83ff}

.tags-section{margin-top:10px}
.tags-section h4{font-size:12px;margin-bottom:6px;color:#ccc}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{background:#0a0a23;padding:3px 7px;border-radius:3px;font-size:10px;display:flex;align-items:center;gap:4px;border:1px solid #444}
.tag.auto{border-left:3px solid #4a9eff}
.tag.manual{border-left:3px solid #ff9e4a}
.tag .remove{cursor:pointer;color:#f87171;font-weight:bold}
.tag .remove:hover{color:#ff6a6a}

.add-tag{display:flex;gap:6px;margin-top:6px}
.add-tag input{flex:1;background:#0a0a23;border:1px solid #444;color:#e0e0e0;padding:5px 7px;border-radius:4px;font-size:11px}
.add-tag select{background:#0a0a23;border:1px solid #444;color:#e0e0e0;padding:5px 7px;border-radius:4px;font-size:11px}
.add-tag button{background:#7c83ff;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.add-tag button:hover{background:#5a62e0}

.btn-save{width:100%;padding:8px;background:#4ade80;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;margin-top:8px}
.btn-save:hover{background:#3ac770}

.badge{position:absolute;top:8px;right:8px;background:#7c83ff;color:#fff;padding:3px 7px;border-radius:3px;font-size:10px;font-weight:600;z-index:5}
.badge.lora{background:#4ade80}
.badge.favorited{background:#ff9e4a}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.toggle-switch{position:relative;width:44px;height:24px;background:#444;border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-switch.active{background:#4ade80}
.toggle-switch:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle-switch.active:before{left:23px}
.btn-ai{background:#16213e;border:1px solid #4ade80;color:#4ade80;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s;white-space:nowrap}
.btn-ai:hover{background:#1a4a2e}
.meta-tag{font-size:10px;padding:3px 8px;border-radius:3px;font-weight:600;display:inline-block;margin-right:6px;margin-bottom:6px}
.meta-tag.mode{background:#1b3d69;color:#7cb3ff}
.meta-tag.noise{background:#1b4d3d;color:#6ee7b7}
.save-indicator{position:absolute;top:10px;left:10px;font-size:11px;padding:3px 8px;border-radius:10px;background:#1a4a2e;color:#4ade80;display:none;z-index:10}
.save-indicator.show{display:block}

.pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:24px}
.pagination button{padding:8px 16px;background:#16213e;border:1px solid #444;border-radius:6px;color:#e0e0e0;cursor:pointer;font-size:13px}
.pagination button:hover:not(:disabled){background:#0f3460;border-color:#7c83ff}
.pagination button:disabled{opacity:0.5;cursor:not-allowed}
.pagination span{font-size:13px;color:#aaa}

.loading{text-align:center;padding:40px;color:#666}
.empty{text-align:center;padding:60px;color:#666}

/* Search Debug Styles */
.search-panel{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.search-row{display:flex;gap:12px;margin-bottom:16px;align-items:flex-end;flex-wrap:wrap}
.search-field{flex:1;min-width:150px}
.search-field label{display:block;margin-bottom:6px;font-size:13px;color:#aaa}
.search-field input,.search-field select,.search-field textarea{width:100%;padding:8px 10px;background:#0a0a23;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:14px}
.search-field textarea{resize:vertical;min-height:80px}
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:#7c83ff;color:#fff}
.btn-primary:hover{background:#5a62e0}
.btn-primary:disabled{background:#444;cursor:not-allowed}
.btn-secondary{background:#16213e;color:#7c83ff;border:1px solid #7c83ff}
.btn-secondary:hover{background:#1a4a7a}
.btn-danger{background:#4a1a1a;color:#f87171;border:1px solid #f87171}
.btn-danger:hover{background:#6a2a2a}
.debug-section{background:#16213e;border:1px solid #333;border-radius:8px;padding:20px;margin-bottom:20px}
.debug-section h2{font-size:16px;color:#7c83ff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.debug-section h2 .badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#0f3460;color:#4ade80;font-weight:600}
.stats-bar{display:flex;gap:20px;padding:12px;background:#0f3460;border-radius:6px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:11px;color:#aaa}
.stat-value{font-size:18px;color:#4ade80;font-weight:600}
.code-block{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;color:#ccc;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.timeline{position:relative;padding-left:30px}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item:before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:#7c83ff;border:2px solid #16213e}
.timeline-item:after{content:'';position:absolute;left:-17px;top:18px;width:2px;height:calc(100% - 12px);background:#333}
.timeline-item:last-child:after{display:none}
.timeline-time{font-size:11px;color:#666;margin-bottom:4px}
.timeline-content{background:#0a0a23;border:1px solid #333;border-radius:6px;padding:10px}
.timeline-title{font-size:13px;color:#7c83ff;margin-bottom:6px;font-weight:600}
.timeline-desc{font-size:12px;color:#aaa}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.result-card{background:#0a0a23;border:1px solid #333;border-radius:8px;padding:14px;transition:border-color .2s}
.result-card:hover{border-color:#7c83ff}
.result-header{display:flex;gap:12px;margin-bottom:10px}
.result-preview{width:80px;height:80px;border-radius:6px;object-fit:cover;background:#1a1a2e;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-title{font-size:14px;font-weight:600;color:#e0e0e0;margin-bottom:4px;word-break:break-word}
.result-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.result-tag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.result-tag.similarity{background:#1b4d3d;color:#6ee7b7}
.result-tag.type{background:#2d1b69;color:#a78bfa}
.result-description{font-size:12px;color:#aaa;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-triggers{font-size:11px;color:#7c83ff;margin-top:8px}
.error{background:#4a1a1a;border:1px solid #f87171;border-radius:6px;padding:16px;color:#f87171;margin-bottom:20px}

/* Keywords Editor Styles */
.keyword-card{background:#0a0a23;border:1px solid #333;border-radius:8px;padding:14px;transition:border-color .2s}
.keyword-card:hover{border-color:#7c83ff}
.keyword-card.new{border-color:#4ade80}
.kw-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.kw-title{font-size:15px;font-weight:600;color:#7c83ff}
.kw-actions{display:flex;gap:8px}
.btn-icon{background:transparent;border:none;color:#aaa;cursor:pointer;font-size:16px;padding:4px 8px;transition:color .2s}
.btn-icon:hover{color:#7c83ff}
.btn-icon.delete:hover{color:#f87171}
.kw-field{margin-bottom:10px}
.kw-field label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.kw-field input,.kw-field textarea{width:100%;padding:6px 8px;background:#16213e;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:12px;font-family:inherit}
.kw-field textarea{resize:vertical;min-height:50px}
.kw-field input:focus,.kw-field textarea:focus{outline:none;border-color:#7c83ff}
.kw-tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.kw-tag{background:#16213e;padding:3px 8px;border-radius:3px;font-size:10px;border:1px solid #444;display:flex;align-items:center;gap:4px}
.kw-tag .remove{cursor:pointer;color:#f87171;font-weight:bold}
.kw-tag .remove:hover{color:#ff6a6a}
.kw-add-tag{display:flex;gap:4px;margin-top:6px}
.kw-add-tag input{flex:1;padding:4px 6px;background:#16213e;border:1px solid #444;border-radius:3px;color:#e0e0e0;font-size:11px}
.kw-add-tag button{padding:4px 10px;background:#7c83ff;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px}
.kw-add-tag button:hover{background:#5a62e0}
.success-msg{background:#1a4a2e;border:1px solid #4ade80;border-radius:6px;padding:12px;color:#4ade80;margin-bottom:16px}
.error-msg{background:#4a1a1a;border:1px solid #f87171;border-radius:6px;padding:12px;color:#f87171;margin-bottom:16px}

</style>
</head>
<body>
<div class="container">

<!-- 一级TAB: 所有/已收藏 -->
<div class="tabs">
<div class="tab active" data-mode="all" onclick="switchMode('all')">所有</div>
<div class="tab" data-mode="favorited" onclick="switchMode('favorited')">已收藏</div>
</div>

<!-- 二级TAB: 图片/视频/图片LORA/视频LORA/姿势图片 -->
<div class="sub-tabs">
<div class="sub-tab active" data-type="image" onclick="switchType('image')">图片</div>
<div class="sub-tab" data-type="video" onclick="switchType('video')">视频</div>
<div class="sub-tab" data-type="image_lora" onclick="switchType('image_lora')">图片LORA</div>
<div class="sub-tab" data-type="video_lora" onclick="switchType('video_lora')">视频LORA</div>
<div class="sub-tab" data-type="pose_images" onclick="switchType('pose_images')">姿势图片</div>
</div>

<!-- 筛选区域 -->
<div class="filters">
<div class="filter-row">
<div class="filter-group">
<label>搜索:</label>
<input type="text" id="searchQuery" placeholder="搜索名称、描述、触发词...">
</div>
<div class="filter-group" id="tagFilterGroup" style="display:none">
<label>标签:</label>
<select id="tagFilter">
<option value="">全部标签</option>
</select>
</div>
<div class="filter-group" id="categoryFilterGroup" style="display:none">
<label>分类:</label>
<select id="categoryFilter">
<option value="">全部分类</option>
</select>
</div>
<div class="filter-group" id="disabledFilterGroup" style="display:none">
<input type="checkbox" id="showDisabled" checked>
<label for="showDisabled">显示已禁用</label>
</div>
</div>
</div>

<div id="contentGrid" class="grid"></div>
<div id="pagination" class="pagination"></div>


<!-- 姿势图片区域 -->
<div id="poseImagesSection" style="display:none">
<div class="filters">
<div class="filter-row">
<div class="filter-group">
<label>姿势:</label>
<select id="poseFilterSelect">
<option value="all">全部姿势</option>
</select>
</div>
<div class="filter-group">
<label>类型:</label>
<select id="poseTypeFilter">
<option value="all">全部类型</option>
<option value="realistic">仅真人</option>
<option value="anime">仅动漫</option>
<option value="unknown">未分类</option>
<option value="video">仅视频</option>
</select>
</div>
<div class="filter-group">
<label>收藏:</label>
<select id="poseFavoriteFilter">
<option value="all">全部</option>
<option value="favorited">仅已收藏</option>
</select>
</div>
<div class="filter-group">
<label>搜索:</label>
<input type="text" id="poseSearchInput" placeholder="搜索关键词/prompt..." style="min-width:250px;">
</div>
</div>
</div>

<div class="stats-bar" style="margin-bottom:20px">
<div class="stat">
<div class="stat-label">总数</div>
<div class="stat-value" id="poseTotalCount">0</div>
</div>
<div class="stat">
<div class="stat-label">当前显示</div>
<div class="stat-value" id="poseDisplayCount">0</div>
</div>
<div class="stat">
<div class="stat-label">姿势</div>
<div class="stat-value" id="posePoseCount">0</div>
</div>
<div class="stat">
<div class="stat-label">真人</div>
<div class="stat-value" id="poseRealisticCount">0</div>
</div>
<div class="stat">
<div class="stat-label">动漫</div>
<div class="stat-value" id="poseAnimeCount">0</div>
</div>
</div>

<div id="poseImagesGrid" class="grid"></div>
</div>

</div>

<script>
const API_KEY = localStorage.getItem('wan22_api_key') || 'wan22-default-key-change-me';
let currentMode = 'all'; // all or favorited
let currentType = 'image'; // image, video, image_lora, video_lora, pose_images
let currentPage = 1;
const pageSize = 12;
let totalPages = 1;

// Pose images data
let allPoseImages = [];
let poseFavoriteStatus = new Map(); // 存储姿势图片的收藏状态 {url: boolean}
let currentPoseImagesPage = 0;
const POSE_ITEMS_PER_PAGE = 50;

// 保存重建任务ID
let rebuildTaskIds = {
  favorites: null,
  loras: null
};

const categories = ['position', 'body_parts', 'action', 'modifier', 'scene', 'clothing', 'expression'];
const loraCategories = ['action', 'body', 'scene', 'style', 'modifier', 'position'];

function switchMode(mode) {
  currentMode = mode;
  currentPage = 1;

  document.querySelectorAll('.tab').forEach(t => {
    if (t.dataset.mode === mode) {
      t.classList.add('active');
    } else {
      t.classList.remove('active');
    }
  });

  loadData();
}

function switchType(type) {
  currentType = type;
  currentPage = 1;

  document.querySelectorAll('.sub-tab').forEach(t => {
    if (t.dataset.type === type) {
      t.classList.add('active');
    } else {
      t.classList.remove('active');
    }
  });

  // Show/hide sections based on type
  const filters = document.querySelector('.filters');
  const contentGrid = document.getElementById('contentGrid');
  const pagination = document.getElementById('pagination');
  const searchDebug = document.getElementById('searchDebugSection');
  const keywordsEditor = document.getElementById('keywordsEditorSection');
  const poseImages = document.getElementById('poseImagesSection');

  if (type === 'pose_images') {
    if (currentMode === 'favorited') {
      // 已收藏模式：使用统一的 contentGrid
      if (filters) filters.style.display = 'none';
      if (contentGrid) contentGrid.style.display = 'grid';
      if (pagination) pagination.style.display = 'flex';
      if (searchDebug) searchDebug.style.display = 'none';
      if (keywordsEditor) keywordsEditor.style.display = 'none';
      if (poseImages) poseImages.style.display = 'none';
      loadData();
    } else {
      // 所有模式：使用独立的姿势图片区域
      if (filters) filters.style.display = 'none';
      if (contentGrid) contentGrid.style.display = 'none';
      if (pagination) pagination.style.display = 'none';
      if (searchDebug) searchDebug.style.display = 'none';
      if (keywordsEditor) keywordsEditor.style.display = 'none';
      if (poseImages) poseImages.style.display = 'block';
      loadPoseImages();
    }
  } else {
    if (filters) filters.style.display = 'block';
    if (contentGrid) contentGrid.style.display = 'grid';
    if (pagination) pagination.style.display = 'flex';
    if (searchDebug) searchDebug.style.display = 'none';
    if (keywordsEditor) keywordsEditor.style.display = 'none';
    if (poseImages) poseImages.style.display = 'none';
    updateFilterVisibility();
    loadData();
  }
}

function updateFilterVisibility() {
  const isLora = currentType.includes('lora');
  const isMedia = currentType === 'image' || currentType === 'video';

  document.getElementById('tagFilterGroup').style.display = isMedia ? 'flex' : 'none';
  document.getElementById('categoryFilterGroup').style.display = isLora ? 'flex' : 'none';
  document.getElementById('disabledFilterGroup').style.display = (isLora && currentMode === 'all') ? 'flex' : 'none';
}

async function loadData() {
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '<div class="loading">加载中...</div>';

  try {
    if (currentMode === 'favorited') {
      // 已收藏模式
      if (currentType === 'image' || currentType === 'video') {
        // 图片/视频：使用统一的 favorites/all API
        await loadFavorites();
      } else if (currentType === 'image_lora' || currentType === 'video_lora') {
        // LORA：使用 loadLoras() 但只显示 enabled 的
        await loadLoras();
      } else if (currentType === 'pose_images') {
        // 姿势图片：使用统一的 favorites/all API
        await loadFavorites();
      }
    } else {
      // 所有模式：从各自的 API 加载
      if (currentType === 'image' || currentType === 'video') {
        await loadMediaResources();
      } else if (currentType === 'image_lora' || currentType === 'video_lora') {
        await loadLoras();
      }
    }
  } catch (error) {
    grid.innerHTML = `<div class="empty">加载失败: ${error.message}</div>`;
  }
}

async function loadMediaResources() {
  const searchQuery = document.getElementById('searchQuery').value.trim();
  const tagFilter = document.getElementById('tagFilter').value;

  // Load all resources
  const url = '/api/v1/resources';
  const params = new URLSearchParams({
    page: currentPage,
    page_size: pageSize
  });
  if (currentType === 'image') params.append('resource_type', 'image');
  else if (currentType === 'video') params.append('resource_type', 'video,generated_video');
  if (tagFilter) params.append('tag', tagFilter);
  if (searchQuery) params.append('search', searchQuery);

  const response = await fetch(`${url}?${params}`, {
    headers: { 'X-API-Key': API_KEY }
  });

  const data = await response.json();
  const resources = data.resources;
  totalPages = data.total_pages;

  renderMediaResources(resources);
  updatePagination();
}

async function loadFavorites() {
  const params = new URLSearchParams({
    page: currentPage,
    page_size: pageSize,
    favorite_type: currentType
  });

  const response = await fetch(`/api/v1/favorites/all?${params}`, {
    headers: { 'X-API-Key': API_KEY }
  });

  const data = await response.json();
  totalPages = data.total_pages;

  renderFavorites(data.favorites);
  updatePagination();
}

function renderFavorites(favorites) {
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';

  if (favorites.length === 0) {
    grid.innerHTML = '<div class="empty">暂无收藏</div>';
    return;
  }

  favorites.forEach(fav => {
    if (fav.type === 'resource') {
      // 普通资源（图片/视频）
      grid.appendChild(createResourceCard(fav));
    } else if (fav.type === 'pose_image') {
      // 姿势图片
      grid.appendChild(createPoseImageCard(fav));
    } else if (fav.type === 'image_lora' || fav.type === 'video_lora') {
      // LORA
      grid.appendChild(createLoraCard(fav));
    }
  });
}

function createResourceCard(resource) {
  const card = document.createElement('div');
  card.className = 'resource-card';

  const isVideo = resource.resource_type === 'video' || resource.resource_type === 'generated_video';
  const mediaHtml = isVideo
    ? `<video src="${escapeHtml(resource.url)}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
    : `<img src="${escapeHtml(resource.url)}" alt="Resource">`;

  card.innerHTML = `
    <button class="btn-favorite" data-resource-id="${resource.resource_id}" data-favorited="true" onclick="toggleFavorite(${resource.resource_id}, event)">
      <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
    <div class="card-badges">
      <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
    </div>
    <div class="card-media">${mediaHtml}</div>
    <div class="card-body">
      <div class="card-title">Resource #${resource.resource_id}</div>
      <div class="card-prompt">${escapeHtml(resource.prompt || '')}</div>
    </div>
  `;

  return card;
}

function createPoseImageCard(poseImage) {
  const card = document.createElement('div');
  card.className = 'resource-card';

  const isVideo = poseImage.resource_type === 'video';
  const mediaHtml = isVideo
    ? `<video src="${escapeHtml(poseImage.url)}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
    : `<img src="${escapeHtml(poseImage.url)}" alt="Pose">`;

  card.innerHTML = `
    <button class="btn-favorite" data-resource-path="${escapeHtml(poseImage.resource_path)}" data-favorited="true" onclick="togglePoseFavorite('${escapeHtml(poseImage.resource_path)}', event)">
      <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
    <div class="card-badges">
      <span class="badge badge-pose">POSE</span>
      <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
    </div>
    <div class="card-media">${mediaHtml}</div>
    <div class="card-body">
      <div class="card-title">${escapeHtml(poseImage.pose)}</div>
      <div class="card-prompt">${escapeHtml(poseImage.filename)}</div>
    </div>
  `;

  return card;
}

function createLoraCard(lora) {
  const card = document.createElement('div');
  card.className = 'resource-card';

  const isVideo = lora.lora_type === 'video';
  const previewHtml = lora.preview_url
    ? (lora.preview_url.endsWith('.mp4')
      ? `<video src="${escapeHtml(lora.preview_url)}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
      : `<img src="${escapeHtml(lora.preview_url)}" alt="LORA Preview">`)
    : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">No Preview</div>`;

  card.innerHTML = `
    <button class="btn-favorite" data-lora-id="${lora.lora_id}" data-lora-type="${lora.lora_type}" data-favorited="true" onclick="toggleLoraFavorite(${lora.lora_id}, '${lora.lora_type}', event)">
      <svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
    <div class="card-badges">
      <span class="badge badge-lora">LORA</span>
      <span class="badge ${isVideo ? 'badge-video' : 'badge-image'}">${isVideo ? 'VIDEO' : 'IMAGE'}</span>
    </div>
    <div class="card-media">${previewHtml}</div>
    <div class="card-body">
      <div class="card-title">${escapeHtml(lora.name || `LORA #${lora.lora_id}`)}</div>
      <div class="card-prompt">${escapeHtml(lora.description || lora.trigger_prompt || '')}</div>
    </div>
  `;

  return card;
}

async function loadLoras() {
  const searchQuery = document.getElementById('searchQuery').value.toLowerCase().trim();
  const categoryFilter = document.getElementById('categoryFilter').value;
  const showDisabled = document.getElementById('showDisabled').checked;

  const loraType = currentType === 'image_lora' ? 'image' : 'video';

  const params = new URLSearchParams();
  params.append('lora_type', loraType);
  if (categoryFilter) params.append('category', categoryFilter);

  const response = await fetch(`/api/v1/admin/loras?${params}`, {
    headers: { 'X-API-Key': API_KEY }
  });

  let loras = await response.json();

  // Filter by mode and enabled status
  if (currentMode === 'favorited') {
    // 已收藏模式：只显示 enabled 的 LORA
    loras = loras.filter(l => l.enabled === true || l.enabled === 1);
  } else if (!showDisabled) {
    // 所有模式：根据 showDisabled 选项过滤
    loras = loras.filter(l => l.enabled !== false && l.enabled !== 0);
  }

  // Apply search filter
  if (searchQuery) {
    loras = loras.filter(l =>
      l.name.toLowerCase().includes(searchQuery) ||
      (l.description && l.description.toLowerCase().includes(searchQuery)) ||
      (l.trigger_prompt && l.trigger_prompt.toLowerCase().includes(searchQuery)) ||
      (false)
    );
  }

  // Update category filter
  updateCategoryFilter(loras);

  // Pagination
  totalPages = Math.ceil(loras.length / pageSize);
  const startIdx = (currentPage - 1) * pageSize;
  const pageData = loras.slice(startIdx, startIdx + pageSize);

  renderLoras(pageData);
  updatePagination();
}

function updateCategoryFilter(loras) {
  const categories = new Set();
  loras.forEach(l => { if (l.category) categories.add(l.category); });

  const select = document.getElementById('categoryFilter');
  const currentValue = select.value;
  select.innerHTML = '<option value="">全部分类</option>';

  Array.from(categories).sort().forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    if (cat === currentValue) option.selected = true;
    select.appendChild(option);
  });
}

function renderMediaResources(resources) {
  const grid = document.getElementById('contentGrid');

  if (resources.length === 0) {
    grid.innerHTML = '<div class="empty">没有找到资源</div>';
    return;
  }

  grid.innerHTML = resources.map(r => renderResourceCard(r, 'resource')).join('');

  // Load favorites status and pose associations
  resources.forEach(async (r) => {
    await loadFavoriteStatus(r.id);
    const associations = await getResourcePoseAssociations(r.id);
    updatePoseBadges(r.id, associations);
  });
}

function renderResourceCard(resource, type) {
  const isVideo = resource.resource_type === 'video' || resource.resource_type === 'generated_video';
  const typeLabel = isVideo ? '视频' : '图片';
  const typeBadge = isVideo ? 'video' : 'image';

  const mediaHtml = isVideo
    ? `<video src="${resource.url}" preload="metadata"></video>`
    : `<img src="${resource.url}" alt="Resource">`;

  const tagsHtml = resource.tags ? resource.tags.map(t =>
    `<span class="tag ${t.source}">
      ${t.name} (${t.category})
      <span class="remove" onclick="removeTag(${resource.id}, ${t.tag_id})">×</span>
    </span>`
  ).join('') : '';

  return `
    <div class="resource-card" data-resource-id="${resource.id}" data-type="${type}">
      <button class="btn-favorite" data-resource-id="${resource.id}" data-favorited="false" onclick="toggleFavorite(${resource.id}, event)">
        <svg class="heart-icon" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>

      <div class="card-badges">
        <span class="badge badge-${typeBadge}">${typeLabel}</span>
      </div>

      <div class="card-media" onclick="viewResource(${resource.id})" style="cursor:pointer">
        ${mediaHtml}
        <div class="card-overlay">
          <button class="btn-quick-action" onclick="event.stopPropagation(); editResource(${resource.id})" title="编辑">✏️</button>
          <button class="btn-quick-action" onclick="event.stopPropagation(); openPoseAssociationModal(${resource.id}, '${type}')" title="关联姿势">🎭</button>
        </div>
      </div>

      <div class="card-body">
        <div class="card-title">${resource.filename || `资源 #${resource.id}`}</div>
        <div class="card-prompt">${resource.prompt || '无 prompt'}</div>

        <div class="card-poses" id="pose-badges-${resource.id}"></div>

        <div class="edit-section" style="margin-top:12px">
          <div class="edit-field">
            <label>搜索关键词</label>
            <textarea id="search-keywords-${resource.id}" placeholder="关键词或自然语言描述...">${resource.search_keywords || ''}</textarea>
          </div>
          <button class="btn-ai" onclick="getResourceSuggestion(${resource.id})" style="width:100%;margin-top:8px">AI生成关键词</button>
        </div>

        <div class="tags-section" style="margin-top:12px">
          <h4>标签</h4>
          <div class="tags">${tagsHtml}</div>
          <div class="add-tag">
            <input type="text" id="newTag-${resource.id}" placeholder="新标签">
            <select id="newCategory-${resource.id}">
              ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
            <button onclick="addTag(${resource.id})">添加</button>
          </div>
        </div>

        <button class="btn-save" onclick="saveResource(${resource.id})" style="margin-top:12px">保存</button>
      </div>
    </div>
  `;
}

function renderLoras(loras) {
  const grid = document.getElementById('contentGrid');

  if (loras.length === 0) {
    grid.innerHTML = '<div class="empty">没有找到LORA</div>';
    return;
  }

  grid.innerHTML = loras.map(l => renderLoraCard(l)).join('');

  // Load favorites status and pose associations
  loras.forEach(async (l) => {
    await loadFavoriteStatus(l.id);
    const associations = await getLoraPoseAssociations(l.id);
    updatePoseBadges(l.id, associations);
  });
}

function renderLoraCard(lora) {
  const isImageLora = lora.lora_type === 'image';
  const loraId = isImageLora ? `'${lora.id}'` : lora.id;

  let previewHtml;
  if (lora.preview_url) {
    const isVideoPreview = lora.preview_url.match(/\.(mp4|webm|mov)$/i);
    if (isImageLora || !isVideoPreview) {
      previewHtml = `<img src="${lora.preview_url}" alt="${lora.name}">`;
    } else {
      previewHtml = `<video src="${lora.preview_url}" preload="metadata" muted loop onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime=0;"></video>`;
    }
  } else {
    previewHtml = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666">No Preview</div>`;
  }

  const categoryOptions = loraCategories.map(cat =>
    `<option value="${cat}" ${lora.category === cat ? 'selected' : ''}>${cat}</option>`
  ).join('');

  const typeLabel = isImageLora ? '图片LORA' : '视频LORA';

  return `
    <div class="resource-card" data-resource-id="${lora.id}" data-type="lora">
      <button class="btn-favorite" data-resource-id="${lora.id}" data-favorited="false" onclick="toggleFavorite(${lora.id}, event)">
        <svg class="heart-icon" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>

      <div class="card-badges">
        <span class="badge badge-lora">${typeLabel}</span>
      </div>

      <div class="card-media" onclick="viewLora(${loraId})" style="cursor:pointer">
        ${previewHtml}
        <div class="card-overlay">
          <button class="btn-quick-action" onclick="event.stopPropagation(); editLora(${loraId})" title="编辑">✏️</button>
          <button class="btn-quick-action" onclick="event.stopPropagation(); openPoseAssociationModal(${lora.id}, 'lora')" title="关联姿势">🎭</button>
        </div>
      </div>

      <div class="card-body">
        <div class="card-title">${lora.name}</div>
        <div class="card-prompt">${lora.description || ''}</div>

        <div style="margin-top:8px;margin-bottom:8px">
          <span class="meta-tag mode">${lora.mode || 'image'}</span>
          ${lora.noise_stage ? `<span class="meta-tag noise">${lora.noise_stage}</span>` : ''}
          <div class="toggle-switch ${lora.enabled === true || lora.enabled === 1 ? 'active' : ''}"
               onclick="toggleEnabled(${loraId})" id="toggle-${lora.id}" style="display:inline-block;margin-left:8px"></div>
        </div>

        <div class="card-poses" id="pose-badges-${lora.id}"></div>

        <div class="edit-section" style="margin-top:12px">
          <div class="edit-field">
            <label>分类</label>
            <select id="category-${lora.id}" onchange="autoSaveLora(${loraId})">
              <option value="">未分类</option>
              ${categoryOptions}
            </select>
          </div>
          <div class="edit-field">
            <label>质量评分 (1-10)</label>
            <input type="number" id="quality-${lora.id}" min="1" max="10"
                   value="${lora.quality_score || ''}" placeholder="1-10"
                   onchange="autoSaveLora(${loraId})">
          </div>
          <div class="edit-field">
            <label>搜索关键词</label>
            <textarea id="search-keywords-${lora.id}" placeholder="关键词或自然语言描述...">${lora.search_keywords || ''}</textarea>
          </div>
          <div class="edit-field">
            <label>触发提示词</label>
            <textarea id="trigger-prompt-${lora.id}" placeholder="用于生成的完整描述...">${lora.trigger_prompt || ''}</textarea>
          </div>
          <button class="btn-ai" onclick="getLoraSuggestion(${loraId})" style="width:100%;margin-top:8px">AI生成关键词和提示词</button>
        </div>

        <button class="btn-save" onclick="saveLora(${loraId})" style="margin-top:12px">保存</button>
        <div class="save-indicator" id="save-${lora.id}">已保存</div>
      </div>
    </div>
  `;
}

async function saveResource(resourceId) {
  const value = document.getElementById(`search-keywords-${resourceId}`).value.trim();

  try {
    const res = await fetch(`/api/v1/admin/resources/${resourceId}`, {
      method: 'PATCH',
      headers: {
        'X-API-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ search_keywords: value })
    });

    if (!res.ok) throw new Error('Failed to save');
    alert('保存成功');
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

async function saveLora(loraId) {
  const searchKeywords = document.getElementById(`search-keywords-${loraId}`).value.trim();
  const triggerPrompt = document.getElementById(`trigger-prompt-${loraId}`).value.trim();
  const category = document.getElementById(`category-${loraId}`).value;
  const quality = document.getElementById(`quality-${loraId}`).value;

  const body = {};
  if (searchKeywords) body.search_keywords = searchKeywords;
  if (triggerPrompt) body.trigger_prompt = triggerPrompt;
  if (category) body.category = category;
  if (quality) body.quality_score = parseInt(quality);

  try {
    const res = await fetch(`/api/v1/admin/loras/${loraId}`, {
      method: 'PATCH',
      headers: {
        'X-API-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error('Failed to save');
    showSaveIndicator(loraId);
    alert('保存成功');
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

async function autoSaveLora(loraId) {
  const category = document.getElementById(`category-${loraId}`).value;
  const quality = document.getElementById(`quality-${loraId}`).value;

  const body = {};
  if (category !== undefined) body.category = category || null;
  if (quality) body.quality_score = parseInt(quality);

  if (Object.keys(body).length === 0) return;

  try {

let searchStartTime = 0;
let searchData = null;

function addTimelineItem(title, description, data = null) {
  const timeline = document.getElementById('processTimeline');

  }

async function executeSearch() {
  const prompt = document.getElementById('searchPrompt').value.trim();
  const mode = document.getElementById('searchMode').value;
  const topK = parseInt(document.getElementById('topK').value);
  const onlyEnabled = document.getElementById('onlyEnabled').checked;
  const minSimilarity = parseFloat(document.getElementById('minSimilarity').value);
  const nameWeight = parseFloat(document.getElementById('nameWeight').value);
  const keywordBoost = parseFloat(document.getElementById('keywordBoost').value);

  if (!prompt) {
    showError('请输入搜索Prompt');
    return;
  }

  searchStartTime = Date.now();
  document.getElementById('processTimeline').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '<div class="loading">搜索中...</div>';
  document.getElementById('rawData').textContent = '搜索中...';
  document.getElementById('errorBox').style.display = 'none';

  addTimelineItem('🚀 开始搜索', `Prompt: "${prompt}"\n模式: ${mode || '全部'}\nTop-K: ${topK}\n相似度阈值: ${minSimilarity}\n名称权重: ${nameWeight}\n关键词加权: ${keywordBoost}\n仅已启用: ${onlyEnabled ? '是' : '否'}`);

  try {
    const endpoint = '/recommend';
    const body = {
      prompt: prompt,
      mode: mode || null,
      include_images: true,
      include_loras: true,
      top_k_images: topK,
      top_k_loras: topK,
      only_enabled: onlyEnabled,
      min_similarity: minSimilarity,
      name_weight: nameWeight,
      keyword_boost: keywordBoost
    };
    addTimelineItem('📡 调用API', `POST /api/v1${endpoint}`, body);

    const response = await fetch('/api/v1' + endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': API_KEY
      },
      body: JSON.stringify(body)
    });

    addTimelineItem('📥 收到响应', `状态码: ${response.status}\nContent-Type: ${response.headers.get('content-type')}`);

    if (!response.ok) {
      let errorMessage = `HTTP ${response.status} ${response.statusText}`;
      try {
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          const error = await response.json();
          errorMessage = error.detail || errorMessage;
        } else {
          const text = await response.text();
          if (text) {
            errorMessage += `\n响应内容: ${text.substring(0, 200)}`;
          }
        }
      } catch (parseErr) {
        // 无法解析响应体，使用默认错误消息
      }
      throw new Error(errorMessage);
    }

    const data = await response.json();
    searchData = data;

    addTimelineItem('✅ 解析成功', `返回数据类型: ${Array.isArray(data) ? 'Array' : 'Object'}\n数据大小: ${JSON.stringify(data).length} bytes`);

    addTimelineItem('🔍 处理推荐结果', `图片: ${data.images?.length || 0}个\n视频LORA: ${data.video_loras?.length || 0}个\n图片LORA: ${data.image_loras?.length || 0}个`);
    renderRecommendResults(data);

    document.getElementById('rawData').textContent = JSON.stringify(data, null, 2);

    addTimelineItem('🎉 搜索完成', `总耗时: ${Date.now() - searchStartTime}ms`);

  } catch (err) {
    console.error(err);
    addTimelineItem('❌ 搜索失败', err.message);
    showError(err.message);
    document.getElementById('resultsGrid').innerHTML = '<div class="empty">搜索失败</div>';
    document.getElementById('rawData').textContent = 'Error: ' + err.message;
  }
}

function renderRecommendResults(data) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  const stats = document.getElementById('resultsStats');
  stats.style.display = 'flex';
  stats.innerHTML = `
    <div class="stat">
      <div class="stat-label">相似图片</div>
      <div class="stat-value">${data.images?.length || 0}</div>
    </div>
    <div class="stat">
      <div class="stat-label">推荐LORA</div>
      <div class="stat-value">${(data.video_loras?.length || 0) + (data.image_loras?.length || 0)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">平均相似度</div>
      <div class="stat-value">${calculateAvgSimilarity(data)}%</div>
    </div>
  `;

  document.getElementById('resultCount').textContent = (data.images?.length || 0) + (data.video_loras?.length || 0) + (data.image_loras?.length || 0);

  if (data.images && data.images.length > 0) {
    data.images.forEach(img => {
      grid.appendChild(createResourceCard(img));
    });
  }

  if (data.video_loras && data.video_loras.length > 0) {
    data.video_loras.forEach(lora => {
      grid.appendChild(createLoraCard(lora));
    });
  }

  if (data.image_loras && data.image_loras.length > 0) {
    data.image_loras.forEach(lora => {
      grid.appendChild(createLoraCard(lora));
    });
  }

  if (grid.children.length === 0) {
    grid.innerHTML = '<div class="empty">无推荐结果</div>';
  }
}

function createResourceCard(resource) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const isVideo = resource.url && (resource.url.endsWith('.mp4') || resource.url.endsWith('.webm') || resource.url.includes('/video/'));
  const previewHtml = isVideo
    ? `<video class="result-preview" src="${resource.url}" loop muted playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>`
    : `<img class="result-preview" src="${resource.url}" crossorigin="anonymous" onerror="this.src='/static/placeholder.svg'" alt="Resource">`;

  card.innerHTML = `
    <div class="result-header">
      ${previewHtml}
      <div class="result-info">
        <div class="result-title">资源 #${resource.resource_id}</div>
        <div class="result-meta">
          <span class="result-tag similarity">相似度: ${(resource.similarity * 100).toFixed(1)}%</span>
          ${resource.resource_type ? `<span class="result-tag type">${resource.resource_type}</span>` : '<span class="result-tag type">Resource</span>'}
        </div>
      </div>
    </div>
    ${resource.prompt ? `<div class="result-description" style="margin-bottom:8px">Prompt: ${resource.prompt}</div>` : ''}
    <div class="edit-field" style="margin-bottom:8px">
      <label>搜索关键词</label>
      <textarea id="search-keywords-res-${resource.resource_id}" placeholder="输入搜索关键词" style="min-height:60px">${resource.search_keywords || ''}</textarea>
    </div>
    <button class="btn-save" onclick="saveResourceKeywords(${resource.resource_id})">保存</button>
  `;
  return card;
}

function createLoraCard(lora) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const triggerWords = Array.isArray(lora.trigger_words) ? lora.trigger_words.join(', ') : '';
  const tags = Array.isArray(lora.tags) ? lora.tags.join(', ') : '';

  const isVideo = lora.preview_url && (lora.preview_url.endsWith('.mp4') || lora.preview_url.endsWith('.webm'));
  const previewHtml = isVideo
    ? `<video class="result-preview" src="${lora.preview_url}" loop muted playsinline onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>`
    : `<img class="result-preview" src="${lora.preview_url || '/static/placeholder.svg'}" onerror="this.src='/static/placeholder.svg'" alt="${lora.name}">`;

  const loraId = lora.id || lora.lora_id;

  card.innerHTML = `
    <div class="result-header">
      ${previewHtml}
      <div class="result-info">
        <div class="result-title">${lora.name}</div>
        <div class="result-meta">
          <span class="result-tag similarity">相似度: ${(lora.similarity * 100).toFixed(1)}%</span>
          <span class="result-tag type">LORA</span>
        </div>
      </div>
    </div>
    ${lora.description ? `<div class="result-description" style="margin-bottom:8px">描述: ${lora.description}</div>` : ''}
    ${triggerWords ? `<div style="font-size:11px;color:#7c83ff;margin-bottom:8px">触发词: ${triggerWords}</div>` : ''}
    ${tags ? `<div style="font-size:11px;color:#a78bfa;margin-bottom:8px">🏷️ Tags: ${tags}</div>` : ''}
    <div class="edit-field" style="margin-bottom:8px">
      <label>搜索关键词</label>
      <textarea id="search-keywords-lora-${loraId}" placeholder="输入搜索关键词" style="min-height:60px">${lora.search_keywords || ''}</textarea>
    </div>
    <div class="edit-field" style="margin-bottom:8px">
      <label>触发提示词</label>
      <textarea id="trigger-prompt-lora-${loraId}" placeholder="输入触发提示词" style="min-height:60px">${lora.trigger_prompt || ''}</textarea>
    </div>
    <button class="btn-save" onclick="saveLoraKeywords('${loraId}')">保存</button>
  `;
  return card;
}

function calculateAvgSimilarity(data) {
  let total = 0;
  let count = 0;

  if (data.images) {
    data.images.forEach(img => {
      total += img.similarity;
      count++;
    });
  }

  if (data.video_loras) {
    data.video_loras.forEach(lora => {
      total += lora.similarity;
      count++;
    });
  }

  if (data.image_loras) {
    data.image_loras.forEach(lora => {
      total += lora.similarity;
      count++;
    });
  }

  return count > 0 ? ((total / count) * 100).toFixed(1) : 0;
}

    showError(err.message);
    alert('重建索引失败: ' + err.message);

async function checkRebuildProgress() {
  console.log('checkRebuildProgress called');

  if (!rebuildTaskIds.favorites && !rebuildTaskIds.loras) {
    alert('没有正在进行的重建任务\n\n请先点击"🔄 重建索引"按钮启动重建任务。');
    return;
  }

  switchDebugTab('process');
  addTimelineItem('📈 查询重建进度', '正在查询任务状态...');

  try {
    let progressInfo = '重建进度\n\n';

    // 查询收藏资源任务
    if (rebuildTaskIds.favorites) {
      const favResponse = await fetch(`/api/v1/admin/embeddings/tasks/${rebuildTaskIds.favorites}`, {
        headers: { 'X-API-Key': API_KEY }
      });

      if (favResponse.ok) {
        const favTask = await favResponse.json();
        const favProgress = favTask.progress ? (favTask.progress * 100).toFixed(1) : 0;
        progressInfo += `📁 收藏资源:\n`;
        progressInfo += `  状态: ${favTask.status === 'running' ? '进行中' : favTask.status === 'completed' ? '已完成' : '失败'}\n`;
        progressInfo += `  进度: ${favTask.processed || 0}/${favTask.total || 0} (${favProgress}%)\n`;
        if (favTask.error) {
          progressInfo += `  错误: ${favTask.error}\n`;
        }
        progressInfo += '\n';

        addTimelineItem('📁 收藏资源进度', `${favTask.processed}/${favTask.total} (${favProgress}%)`, favTask);
      }
    }

    // 查询LORA任务
    if (rebuildTaskIds.loras) {
      const loraResponse = await fetch(`/api/v1/admin/embeddings/tasks/${rebuildTaskIds.loras}`, {
        headers: { 'X-API-Key': API_KEY }
      });

      if (loraResponse.ok) {
        const loraTask = await loraResponse.json();
        const loraProgress = loraTask.progress ? (loraTask.progress * 100).toFixed(1) : 0;
        progressInfo += `🎨 LORA:\n`;
        progressInfo += `  状态: ${loraTask.status === 'running' ? '进行中' : loraTask.status === 'completed' ? '已完成' : '失败'}\n`;
        progressInfo += `  进度: ${loraTask.processed || 0}/${loraTask.total || 0} (${loraProgress}%)\n`;
        if (loraTask.error) {
          progressInfo += `  错误: ${loraTask.error}\n`;
        }

        addTimelineItem('🎨 LORA进度', `${loraTask.processed}/${loraTask.total} (${loraProgress}%)`, loraTask);
      }
    }

    alert(progressInfo);

  } catch (err) {
    console.error('Error in checkRebuildProgress:', err);
    addTimelineItem('❌ 查询失败', err.message);
    alert('查询进度失败: ' + err.message);
  }
}

const ANIME_KW = ['score_9','score_8','score_7','source_anime','anime','manga','hentai','cartoon','1girl','1boy','2girls','masterpiece','best quality','illustration','lineart','cel shading'];
const REAL_KW = ['realistic','photorealistic','photo','hyperrealistic','raw photo','dslr','film grain','bokeh','skin texture','skin pores','8k uhd','real','ulzzang'];
const REAL_MODELS = ['realistic','photon','juggernaut','epicrealism','realdream','realvis','cyberrealistic','absolutereality','photopedia','korean','taiwan','doll'];

function classifyPoseImage(img) {
  const prompt = (img.prompt || '').toLowerCase();
  const model = (img.model || '').toLowerCase();

  const hasRealisticTag = /\brealistic\s*:\s*[\d.]+/.test(prompt) || /\(realistic/.test(prompt);
  const hasOriginalTag = /\boriginal\s*:\s*[\d.]+/.test(prompt);
  const hasRealisticWord = prompt.includes('realistic') || prompt.includes('photorealism') || prompt.includes('photorealistic');

  const animeScore = ANIME_KW.filter(k => prompt.includes(k)).length;
  const realScore = REAL_KW.filter(k => prompt.includes(k)).length;
  const modelReal = REAL_MODELS.some(k => model.includes(k));

  if (hasRealisticTag || hasOriginalTag || hasRealisticWord || realScore >= 1 || modelReal) {
    return 'realistic';
  }
  if (animeScore >= 2) return 'anime';
  return 'unknown';
}

async function loadPoseImages() {
  const grid = document.getElementById('poseImagesGrid');
  grid.innerHTML = '<div class="loading">加载中...</div>';

  try {

function updatePoseStats(images) {

  document.getElementById('poseDisplayCount').textContent = images.length;

function buildPoseFilter() {
  const poses = [...new Set(allPoseImages.map(i => i.pose))].sort();
  const sel = document.getElementById('poseFilterSelect');
  sel.innerHTML = '<option value="all">全部姿势</option>';
  poses.forEach(p => {
    const count = allPoseImages.filter(i => i.pose === p).length;
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = `${p} (${count})`;
    sel.appendChild(opt);
  });
}

function getFilteredPoseImages() {
  const pose = document.getElementById('poseFilterSelect').value;
  const type = document.getElementById('poseTypeFilter').value;
  const favorite = document.getElementById('poseFavoriteFilter').value;
  const search = document.getElementById('poseSearchInput').value.toLowerCase();

  return allPoseImages.filter(img => {
    if (pose !== 'all' && img.pose !== pose) return false;
    if (type === 'realistic' && img.category !== 'realistic') return false;
    if (type === 'anime' && img.category !== 'anime') return false;
    if (type === 'unknown' && img.category !== 'unknown') return false;
    if (type === 'video' && img.type !== 'video') return false;
    if (favorite === 'favorited' && !poseFavoriteStatus.get(img.url)) return false;
    if (search) {
      const hay = `${img.filename} ${img.prompt} ${img.model} ${img.search_tag} ${img.pose}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

    const globalIdx = start + idx;
    const isVideo = img.type === 'video';

    card.className = 'resource-card';

    const typeBadge = isVideo ? 'video' : 'image';

    let categoryBadge = '';

    else if (img.category === 'anime') categoryBadge = '<span class="badge badge-anime" style="top:40px;background:#ff9e4a">动漫</span>';

    const model = img.model || '';

        <svg class="heart-icon" viewBox="0 0 24 24">

        </svg>
      </button>

      <div class="card-badges">
        <span class="badge badge-${typeBadge}">${typeLabel}</span>
      </div>

        <div class="card-poses" id="pose-badges-${img.id || globalIdx}"></div>

            <div style="font-size:11px;color:#888;padding:8px;background:rgba(255,255,255,0.05);border-radius:4px">
              <div><strong>姿势:</strong> ${escapeHtml(img.pose)}</div>
              <div><strong>分类:</strong> ${img.category === 'realistic' ? '真人' : img.category === 'anime' ? '动漫' : '未分类'}</div>
              <div><strong>大小:</strong> ${escapeHtml(img.size)}</div>

  currentPoseImagesPage++;

    const scrollHeight = document.documentElement.scrollHeight;

    if (scrollHeight - scrollTop - clientHeight < 200) {

async function toggleFavorite(resourceId, event) {
  event.stopPropagation();

  const btn = event.currentTarget;
  const isFavorited = btn.dataset.favorited === 'true';

  // Optimistic UI update
  btn.dataset.favorited = !isFavorited;
  btn.classList.add('animating');

  try {
    if (isFavorited) {
      await fetch(`/api/v1/favorites/${resourceId}`, {
        method: 'DELETE',
        headers: { 'X-API-Key': API_KEY }
      });
    } else {
      await fetch(`/api/v1/favorites/${resourceId}`, {
        method: 'POST',
        headers: {
          'X-API-Key': API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ note: null })
      });
    }

    btn.classList.remove('animating');
    btn.classList.add('success');
    setTimeout(() => btn.classList.remove('success'), 300);

  } catch (error) {
    // Revert on error
    btn.dataset.favorited = isFavorited;
    btn.classList.remove('animating');
    alert('操作失败，请重试');
  }
}

    console.log('Loading poses...');
    await loadAllPoses();
    console.log('Poses loaded:', allPoses.length);
  }

  // Get current associations
  let associations = [];
  try {
    const endpoint = resourceType === 'resource'
      ? `/api/v1/admin/resources/${resourceId}/pose-associations`
      : `/api/v1/admin/loras/${resourceId}/pose-associations`;

    console.log('Fetching associations from:', endpoint);
    const response = await fetch(endpoint, {
      headers: { 'X-API-Key': API_KEY }
    });
    const data = await response.json();
    associations = data.associations || [];
    console.log('Associations loaded:', associations.length);
  } catch (error) {
    console.error('Failed to load associations:', error);
  }

  // Create modal
  console.log('Creating modal...');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'poseAssociationModal';
  modal.innerHTML = `
    <div class="pose-association-modal">
      <div class="modal-header">
        <h3>关联姿势</h3>
        <button class="modal-close" onclick="closePoseAssociationModal()">&times;</button>
      </div>

      <div class="modal-body">
        <input type="text"
               class="pose-search"
               id="poseModalSearch"
               placeholder="搜索姿势..."
               oninput="filterModalPoses(this.value)">

        <div class="pose-grid" id="poseModalGrid">
          ${renderPoseCards(allPoses, associations, resourceId, resourceType)}
        </div>
      </div>

      <div class="modal-footer">
        <div class="association-summary">
          已关联: <span id="associatedCount">${associations.length}</span> 个姿势
        </div>
        <button class="btn-primary" onclick="closePoseAssociationModal()">完成</button>
      </div>
    </div>
  `;

  modal.onclick = (e) => {
    if (e.target.classList.contains('modal-overlay')) {
      closePoseAssociationModal();
    }
  };

  document.body.appendChild(modal);
  setTimeout(() => modal.classList.add('active'), 10);
}

function renderPoseCards(poses, associations, resourceId, resourceType) {
  const associatedMap = new Map(associations.map(a => [a.pose_id, a]));

  return poses.map(pose => {
    const association = associatedMap.get(pose.id);
    const isAssociated = !!association;

    return `
      <div class="pose-card ${isAssociated ? 'associated' : ''}"
           data-pose-id="${pose.id}"
           data-association-id="${association?.id || ''}"
           onclick="togglePoseAssociation(${pose.id}, this)">
        <div class="pose-card-name">${pose.name_cn}</div>
        <div class="pose-card-key">${pose.pose_key}</div>

        ${isAssociated ? '<div class="check-mark">✓</div>' : ''}

        ${isAssociated && resourceType === 'resource' ? `
          <div class="pose-options">
            <select class="mini-select"
                    data-field="angle"
                    onclick="event.stopPropagation()"
                    onchange="updateAssociationMetadata(${association.id}, 'angle', this.value)">
              <option value="">角度</option>
              <option value="pov" ${association.angle === 'pov' ? 'selected' : ''}>POV</option>
              <option value="front" ${association.angle === 'front' ? 'selected' : ''}>正面</option>
              <option value="back" ${association.angle === 'back' ? 'selected' : ''}>背面</option>
              <option value="side" ${association.angle === 'side' ? 'selected' : ''}>侧面</option>
              <option value="top" ${association.angle === 'top' ? 'selected' : ''}>俯视</option>
              <option value="close" ${association.angle === 'close' ? 'selected' : ''}>特写</option>
            </select>
            <select class="mini-select"
                    data-field="style"
                    onclick="event.stopPropagation()"
                    onchange="updateAssociationMetadata(${association.id}, 'style', this.value)">
              <option value="">风格</option>
              <option value="realistic" ${association.style === 'realistic' ? 'selected' : ''}>真人</option>
              <option value="anime" ${association.style === 'anime' ? 'selected' : ''}>动漫</option>
            </select>
          </div>
        ` : ''}

        ${isAssociated && resourceType === 'lora' ? `
          <div class="pose-options">
            <select class="mini-select"
                    data-field="noise_stage"
                    onclick="event.stopPropagation()"
                    onchange="updateAssociationMetadata(${association.id}, 'noise_stage', this.value)">
              <option value="">噪声</option>
              <option value="high" ${association.noise_stage === 'high' ? 'selected' : ''}>High</option>
              <option value="low" ${association.noise_stage === 'low' ? 'selected' : ''}>Low</option>
            </select>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function filterModalPoses(searchTerm) {
  const cards = document.querySelectorAll('#poseModalGrid .pose-card');
  const term = searchTerm.toLowerCase();

  cards.forEach(card => {
    const name = card.querySelector('.pose-card-name').textContent.toLowerCase();
    const key = card.querySelector('.pose-card-key').textContent.toLowerCase();

    if (name.includes(term) || key.includes(term)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

async function togglePoseAssociation(poseId, cardEl) {
  const isAssociated = cardEl.classList.contains('associated');
  const associationId = cardEl.dataset.associationId;

  // Optimistic UI
  cardEl.classList.toggle('associated');
  updateAssociationCount();

  try {
    if (isAssociated) {
      // Remove association
      const endpoint = currentAssociationType === 'resource'
        ? `/api/v1/admin/poses/reference-images/${associationId}`
        : `/api/v1/admin/poses/loras/${associationId}`;

      await fetch(endpoint, {
        method: 'DELETE',
        headers: { 'X-API-Key': API_KEY }
      });

      cardEl.dataset.associationId = '';
      const checkMark = cardEl.querySelector('.check-mark');
      if (checkMark) checkMark.remove();
      const options = cardEl.querySelector('.pose-options');
      if (options) options.remove();

    } else {
      // Add association
      let endpoint, body;

      if (currentAssociationType === 'resource') {
        endpoint = '/api/v1/admin/poses/reference-images';
        body = {
          pose_id: poseId,
          resource_id: currentAssociationResource,
          angle: null,
          style: null,
          is_default: false
        };
      } else {
        const loraType = currentType === 'image_lora' ? 'image' : 'video';
        endpoint = '/api/v1/admin/poses/loras';
        body = {
          pose_id: poseId,
          lora_id: currentAssociationResource,
          lora_type: loraType,
          noise_stage: null,
          is_default: false
        };
      }

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'X-API-Key': API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      const result = await response.json();
      cardEl.dataset.associationId = result.id;

      // Add check mark and options
      cardEl.insertAdjacentHTML('beforeend', '<div class="check-mark">✓</div>');

      if (currentAssociationType === 'resource') {
        cardEl.insertAdjacentHTML('beforeend', `
          <div class="pose-options">
            <select class="mini-select" data-field="angle" onclick="event.stopPropagation()" onchange="updateAssociationMetadata(${result.id}, 'angle', this.value)">
              <option value="">角度</option>
              <option value="pov">POV</option>
              <option value="front">正面</option>
              <option value="back">背面</option>
              <option value="side">侧面</option>
              <option value="top">俯视</option>
              <option value="close">特写</option>
            </select>
            <select class="mini-select" data-field="style" onclick="event.stopPropagation()" onchange="updateAssociationMetadata(${result.id}, 'style', this.value)">
              <option value="">风格</option>
              <option value="realistic">真人</option>
              <option value="anime">动漫</option>
            </select>
          </div>
        `);
      } else {
        cardEl.insertAdjacentHTML('beforeend', `
          <div class="pose-options">
            <select class="mini-select" data-field="noise_stage" onclick="event.stopPropagation()" onchange="updateAssociationMetadata(${result.id}, 'noise_stage', this.value)">
              <option value="">噪声</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
        `);
      }
    }

    // Update pose badges on the main card
    await refreshPoseBadges(currentAssociationResource);

  } catch (error) {
    // Revert on error
    cardEl.classList.toggle('associated');
    updateAssociationCount();
    alert('操作失败: ' + error.message);
  }
}

async function updateAssociationMetadata(associationId, field, value) {
  try {
    const endpoint = currentAssociationType === 'resource'
      ? `/api/v1/admin/poses/reference-images/${associationId}`
      : `/api/v1/admin/poses/loras/${associationId}`;

    await fetch(endpoint, {
      method: 'PATCH',
      headers: {
        'X-API-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ [field]: value || null })
    });

  } catch (error) {
    console.error('Failed to update association metadata:', error);
    alert('更新失败');
  }
}

function updateAssociationCount() {
  const associated = document.querySelectorAll('#poseModalGrid .pose-card.associated').length;
  const countEl = document.getElementById('associatedCount');
  if (countEl) {
    countEl.textContent = associated;
  }
}

function closePoseAssociationModal() {
  const modal = document.getElementById('poseAssociationModal');
  if (modal) {
    modal.classList.remove('active');
    setTimeout(() => modal.remove(), 200);
  }
  currentAssociationResource = null;
  currentAssociationType = null;
}

async function refreshPoseBadges(resourceId) {
  let associations = [];
  try {
    const endpoint = currentAssociationType === 'resource'
      ? `/api/v1/admin/resources/${resourceId}/pose-associations`
      : `/api/v1/admin/loras/${resourceId}/pose-associations`;

    const response = await fetch(endpoint, {
      headers: { 'X-API-Key': API_KEY }
    });
    const data = await response.json();
    associations = data.associations || [];
  } catch (error) {
    console.error('Failed to refresh associations:', error);
  }

  updatePoseBadges(resourceId, associations);
}

function updatePoseBadges(resourceId, associations) {
  const container = document.getElementById(`pose-badges-${resourceId}`);
  if (!container) return;

  if (!associations || associations.length === 0) {
    container.innerHTML = '';
    return;
  }

  const display = associations.slice(0, 3);
  const remaining = associations.length - 3;

  container.innerHTML = display.map(a =>
    `<span class="pose-badge" title="${a.pose_key}">${a.name_cn}</span>`
  ).join('') + (remaining > 0 ? `<span class="pose-badge-more">+${remaining}</span>` : '');
}

// Helper functions for quick actions
function viewResource(resourceId) {
  console.log('View resource:', resourceId);

  // Find the resource data
  const card = document.querySelector(`.resource-card[data-resource-id="${resourceId}"]`);
  if (!card) return;

  const mediaEl = card.querySelector('.card-media img, .card-media video');
  const titleEl = card.querySelector('.card-title');
  const promptEl = card.querySelector('.card-prompt');

  if (!mediaEl) return;

  const isVideo = mediaEl.tagName === 'VIDEO';
  const url = mediaEl.src;
  const title = titleEl ? titleEl.textContent : `资源 #${resourceId}`;
  const prompt = promptEl ? promptEl.textContent : '';

  // Create modal
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.id = 'viewResourceModal';
  modal.style.zIndex = '2000';

  const mediaHtml = isVideo
    ? `<video src="${url}" controls autoplay loop style="max-width:90vw;max-height:85vh;border-radius:10px;"></video>`
    : `<img src="${url}" style="max-width:90vw;max-height:85vh;border-radius:10px;">`;

  modal.innerHTML = `
    <div style="max-width:95vw;width:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 20px">
        <h3 style="color:#7c83ff;margin:0;font-size:1.2em">${title}</h3>
        <button onclick="closeViewModal()" style="background:transparent;border:none;color:#aaa;font-size:32px;cursor:pointer;padding:0;width:40px;height:40px">&times;</button>
      </div>
      <div style="text-align:center;margin-bottom:16px">
        ${mediaHtml}
      </div>
      ${prompt ? `<div style="padding:0 20px;color:#aaa;font-size:13px;max-width:800px;margin:0 auto">${prompt}</div>` : ''}
    </div>
  `;

  modal.onclick = (e) => {
    if (e.target.id === 'viewResourceModal') closeViewModal();
  };

  // Close on ESC key
  const escHandler = (e) => {
    if (e.key === 'Escape') {
      closeViewModal();
      document.removeEventListener('keydown', escHandler);
    }
  };
  document.addEventListener('keydown', escHandler);

  document.body.appendChild(modal);
}

function closeViewModal() {
  const modal = document.getElementById('viewResourceModal');
  if (modal) {
    const video = modal.querySelector('video');
    if (video) video.pause();
    modal.remove();
  }
}

function editResource(resourceId) {
  console.log('Edit resource:', resourceId);
  // Scroll to the card and expand edit section
  const card = document.querySelector(`.resource-card[data-resource-id="${resourceId}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
