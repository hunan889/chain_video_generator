<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源标注 - Wan2.2 Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 20px; color: #fff; }

        .filters { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input { background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; }
        .filters button { background: #4a9eff; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .filters button:hover { background: #3a8eef; }

        .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .resource-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .resource-media { width: 100%; height: 300px; object-fit: cover; background: #0a0a0a; }
        .resource-info { padding: 15px; }
        .resource-prompt { font-size: 12px; color: #aaa; margin-bottom: 10px; max-height: 60px; overflow-y: auto; }

        .tags-section { margin-top: 10px; }
        .tags-section h4 { font-size: 13px; margin-bottom: 8px; color: #ccc; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag { background: #2a2a2a; padding: 4px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 4px; }
        .tag.auto { border-left: 3px solid #4a9eff; }
        .tag.manual { border-left: 3px solid #ff9e4a; }
        .tag .remove { cursor: pointer; color: #ff4a4a; font-weight: bold; }
        .tag .remove:hover { color: #ff6a6a; }

        .add-tag { display: flex; gap: 6px; margin-top: 8px; }
        .add-tag input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
        .add-tag select { background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
        .add-tag button { background: #4a9eff; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .add-tag button:hover { background: #3a8eef; }

        .pagination { display: flex; justify-content: center; gap: 10px; align-items: center; margin-top: 20px; }
        .pagination button { background: #2a2a2a; color: #e0e0e0; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { background: #3a3a3a; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { color: #aaa; }

        .loading { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>资源标注</h1>

        <div class="filters">
            <select id="resourceType">
                <option value="">全部类型</option>
                <option value="image">图片</option>
                <option value="video">视频</option>
                <option value="generated_video">生成视频</option>
            </select>
            <select id="tagFilter">
                <option value="">全部标签</option>
            </select>
            <input type="text" id="searchPrompt" placeholder="搜索 prompt...">
            <button onclick="loadResources()">搜索</button>
            <button onclick="window.location.href='/'">返回首页</button>
        </div>

        <div id="resourceGrid" class="resource-grid"></div>

        <div class="pagination">
            <button id="prevBtn" onclick="prevPage()">上一页</button>
            <span id="pageInfo">第 1 页</span>
            <button id="nextBtn" onclick="nextPage()">下一页</button>
        </div>
    </div>

    <script>
        const BASE = '';
        const API_KEY = localStorage.getItem('api_key') || '';
        let currentPage = 1;
        const pageSize = 12;
        let totalPages = 1;

        const categories = ['position', 'body_parts', 'action', 'modifier', 'scene', 'clothing', 'expression'];

        async function loadResources() {
            const resourceType = document.getElementById('resourceType').value;
            const tagFilter = document.getElementById('tagFilter').value;
            const searchPrompt = document.getElementById('searchPrompt').value;

            const params = new URLSearchParams({
                page: currentPage,
                page_size: pageSize
            });
            if (resourceType) params.append('resource_type', resourceType);
            if (tagFilter) params.append('tag', tagFilter);
            if (searchPrompt) params.append('prompt', searchPrompt);

            document.getElementById('resourceGrid').innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${BASE}/api/v1/resources?${params}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();

                totalPages = data.total_pages;
                renderResources(data.resources);
                updatePagination();
            } catch (error) {
                document.getElementById('resourceGrid').innerHTML = '<div class="loading">加载失败</div>';
            }
        }

        function renderResources(resources) {
            const grid = document.getElementById('resourceGrid');
            if (resources.length === 0) {
                grid.innerHTML = '<div class="loading">没有找到资源</div>';
                return;
            }

            grid.innerHTML = resources.map(r => `
                <div class="resource-card">
                    ${r.resource_type === 'video' || r.resource_type === 'generated_video'
                        ? `<video class="resource-media" src="${r.url}" controls></video>`
                        : `<img class="resource-media" src="${r.url}" alt="Resource">`
                    }
                    <div class="resource-info">
                        <div class="resource-prompt">${r.prompt || '无 prompt'}</div>

                        <div class="tags-section">
                            <h4>标签</h4>
                            <div class="tags" id="tags-${r.id}">
                                ${r.tags.map(t => `
                                    <span class="tag ${t.source}">
                                        ${t.name} (${t.category})
                                        <span class="remove" onclick="removeTag(${r.id}, ${t.tag_id})">×</span>
                                    </span>
                                `).join('')}
                            </div>

                            <div class="add-tag">
                                <input type="text" id="newTag-${r.id}" placeholder="新标签">
                                <select id="newCategory-${r.id}">
                                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                                </select>
                                <button onclick="addTag(${r.id})">添加</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addTag(resourceId) {
            const tagName = document.getElementById(`newTag-${resourceId}`).value.trim().toLowerCase();
            const category = document.getElementById(`newCategory-${resourceId}`).value;

            if (!tagName) return;

            try {
                const response = await fetch(`${BASE}/api/v1/resources/${resourceId}/tags`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ tag_name: tagName, category: category })
                });

                if (response.ok) {
                    document.getElementById(`newTag-${resourceId}`).value = '';
                    loadResources();
                }
            } catch (error) {
                alert('添加标签失败');
            }
        }

        async function removeTag(resourceId, tagId) {
            if (!confirm('确定删除此标签？')) return;

            try {
                const response = await fetch(`${BASE}/api/v1/resources/${resourceId}/tags/${tagId}`, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': API_KEY }
                });

                if (response.ok) {
                    loadResources();
                }
            } catch (error) {
                alert('删除标签失败');
            }
        }

        function updatePagination() {
            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadResources();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadResources();
            }
        }

        async function loadTags() {
            try {
                const response = await fetch(`${BASE}/api/v1/tags`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const tags = await response.json();

                const select = document.getElementById('tagFilter');
                select.innerHTML = '<option value="">全部标签</option>' +
                    tags.map(t => `<option value="${t.name}">${t.name} (${t.usage_count})</option>`).join('');
            } catch (error) {
                console.error('加载标签失败', error);
            }
        }

        // 初始化
        loadTags();
        loadResources();
    </script>
</body>
</html>
